<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Progression Entry ver1.3.13</title>
<style>
  :root{
    --text:#111; --muted:#666; --line:#ddd; --bg:#fff; --card:#fff;
    --blue:#1d4ed8; --warn:#b91c1c; --btn-radius:14px; --tap-min-h:44px;
  }
  body{font-family:-apple-system,system-ui,"Segoe UI",sans-serif;margin:16px;color:var(--text);background:var(--bg);padding-bottom:120px;}
  h2{margin:0 0 10px;font-size:20px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .card{border:1px solid var(--line);border-radius:16px;padding:12px;background:var(--card);margin:10px 0;}
  label{font-size:13px;color:var(--muted);display:block;margin:8px 0 4px;}
  input,select{width:100%;font-size:16px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;min-height:var(--tap-min-h);box-sizing:border-box;background:#fff;}
  .btn{min-height:var(--tap-min-h);padding:10px 12px;border-radius:var(--btn-radius);border:1px solid var(--line);background:#fff;font-size:16px;cursor:pointer;}
  .btn.primary{border:2px solid var(--blue);color:var(--blue);font-weight:700;}
  .btn.warn{border:2px solid var(--warn);color:var(--warn);font-weight:700;}
  .btn.small{font-size:14px;padding:8px 10px;min-height:40px;}
  .muted{color:var(--muted);font-size:13px;}
  .grid{display:grid;grid-template-columns:1fr;gap:6px;}
  .bar{display:grid;grid-template-columns:46px 1fr 1fr;gap:6px;align-items:stretch;}
  .bar .idx{display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:10px;background:#fafafa;font-weight:700;font-size:14px;min-height:26px;}
  .slot{border:2px solid var(--line);border-radius:10px;padding:4px 8px;min-height:26px;display:flex;align-items:center;justify-content:space-between;gap:6px;background:#fff;}
  .slot.active{border-color:var(--blue);box-shadow:0 0 0 2px rgba(29,78,216,0.12);}
  .slot.playing{border-color:#111;background:#f6f6f6;}
  .slot .txt{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .badge{font-size:11px;color:var(--muted);border:1px solid var(--line);padding:1px 6px;border-radius:999px;background:#f7f7f7;line-height:1.2;}
  .kbd{display:flex;gap:8px;flex-wrap:wrap;}
  .metaGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
  .metaItem{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fafafa;}
  .metaItem .k{font-size:12px;color:var(--muted);}
  .metaItem .v{font-size:15px;font-weight:600;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .toneBox{margin-top:8px;border:1px solid var(--line);border-radius:12px;padding:8px 10px;background:#fafafa;}
  .toneTitle{font-size:12px;color:var(--muted);margin-bottom:4px;}
  .toneValue{font-size:15px;font-weight:600;min-height:20px;}
</style>
</head>

<body>

<h2>Progression Entry ver1.3.13</h2>
<div class="muted">ERA/Rank/Part → 取得 → コード入力 → 視聴 / 反映。</div>

<div class="card">
  <div class="row">
    <button class="btn small" onclick="location.href='./index.html'">ゲームへ戻る</button>
    <button class="btn small" onclick="location.href='./songs.html'">楽曲リスト</button>
    <button class="btn small" onclick="location.href='../../index.html'">ポータル</button>
  </div>

  <div class="row">
    <div style="flex:1; min-width:180px;">
      <label>ERA</label>
      <select id="inEra">
        <option value="1970">1970</option>
        <option value="1980" selected>1980</option>
        <option value="1990">1990</option>
        <option value="2000">2000</option>
        <option value="2010">2010</option>
        <option value="2020">2020</option>
      </select>
    </div>
    <div style="flex:1; min-width:140px;">
      <label>Rank</label>
      <input id="inRank" inputmode="numeric" placeholder="例：150" />
    </div>
    <div style="flex:1; min-width:160px;">
      <label>Part</label>
      <select id="inPart">
        <option value="intro">intro</option>
        <option value="Aメロ">Aメロ</option>
        <option value="Bメロ">Bメロ</option>
        <option value="サビ">サビ</option>
      </select>
    </div>
  </div>

  <div class="row" style="margin-top:8px;">
    <button class="btn primary" id="btnLookup">取得</button>
    <span class="muted" id="statusMsg"></span>
  </div>
</div>

<div class="card">
  <div class="muted">取得したメタ情報（表示のみ）</div>
  <div class="metaGrid" id="metaGrid"></div>
</div>

<div class="card">
  <div class="row" style="justify-content:space-between;">
    <div class="muted">小節入力：前半(A)／後半(B)</div>
    <div class="row">
      <button class="btn small" id="btn4barRep">4barRep.</button>
      <button class="btn small" id="btnPreview">視聴</button>
      <button class="btn small primary" id="btnUpdate">反映（更新）</button>
      <button class="btn small warn" id="btnClearBar">選択小節クリア</button>
    </div>
  </div>
  <div class="toneBox">
    <div class="toneTitle">構成音</div>
    <div class="toneValue" id="toneView">（停止中）</div>
  </div>
  <div class="grid" id="barGrid" style="margin-top:8px;"></div>
</div>

<div class="card">
  <div class="row">
    <div style="flex:1;">
      <div class="muted">①ルート（押すと即上書き）</div>
      <div class="kbd" id="rootPad"></div>
    </div>
  </div>
  <div style="height:10px;"></div>
  <div class="row">
    <div style="flex:1;">
      <div class="muted">②クオリティ（押すと即上書き）</div>
      <div class="kbd" id="qualPad"></div>
    </div>
  </div>
  <div style="height:10px;"></div>
  <div class="row">
    <button class="btn" id="btnBassMode">オンベース入力（/）</button>
    <button class="btn warn" id="btnBassClear">オンベース解除</button>
    <button class="btn warn" id="btnQualClear">クオリティ解除</button>
  </div>
  <div class="muted">オンベース：押す→次にルートで /Root（例：C/E）</div>
</div>

<script>
/* ===== 設定 ===== */
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwLyrVpKlQSAWCJXRufi1HIRBfJYVrXg1NGCeCtP9lRqM0N-8TyevnsNKoV0n8UMb1D/exec";
const ctx = new (window.AudioContext || window.webkitAudioContext)();

/* ===== audio ===== */
function urlForFetch(url){
  return String(url).replaceAll("#","%23");
}

async function loadBuffer(url){
  const r = await fetch(urlForFetch(url));
  if(!r.ok) throw new Error(`fetch failed: ${url}`);
  const a = await r.arrayBuffer();
  return await ctx.decodeAudioData(a);
}

let buf = {};
let bufferErrors = {};
let activeSources = [];

function markBufferError(name){
  bufferErrors[name] = true;
}

async function safeLoadBuffer(key, url){
  try{
    buf[key] = await loadBuffer(url);
  }catch(e){
    console.error(e);
    markBufferError(key);
    buf[key] = null;
  }
}

async function loadAll(){
  if(buf.__loaded) return;

  await safeLoadBuffer("drum", "./audio/Drum_loop.wav");

  await safeLoadBuffer("A#0_Bass", "./audio/A#0_Bass.wav");
  await safeLoadBuffer("A0_Bass",  "./audio/A0_Bass.wav");
  await safeLoadBuffer("B0_Bass",  "./audio/B0_Bass.wav");
  await safeLoadBuffer("C#1_Bass", "./audio/C#1_Bass.wav");
  await safeLoadBuffer("C1_Bass",  "./audio/C1_Bass.wav");
  await safeLoadBuffer("D#1_Bass", "./audio/D#1_Bass.wav");
  await safeLoadBuffer("D1_Bass",  "./audio/D1_Bass.wav");
  await safeLoadBuffer("E0_Bass",  "./audio/E0_Bass.wav");
  await safeLoadBuffer("F#0_Bass", "./audio/F#0_Bass.wav");
  await safeLoadBuffer("F0_Bass",  "./audio/F0_Bass.wav");
  await safeLoadBuffer("G#0_Bass", "./audio/G#0_Bass.wav");
  await safeLoadBuffer("G0_Bass",  "./audio/G0_Bass.wav");

  const pcs = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  for(let o=2;o<=4;o++){
    for(const n of pcs){
      await safeLoadBuffer(`${n}${o}`, `./audio/${n}${o}.wav`);
    }
  }
  await safeLoadBuffer("C5", "./audio/C5.wav");

  buf.__loaded = true;
}

function play(buffer,time,fade=false,stopAfterSec=null){
  if(!buffer) return null;
  const s = ctx.createBufferSource();
  const g = ctx.createGain();
  s.buffer = buffer;
  s.connect(g);
  g.connect(ctx.destination);

  if(fade){
    g.gain.setValueAtTime(1, time);
    g.gain.setValueAtTime(1, time + 2.1);
    g.gain.linearRampToValueAtTime(0, time + 2.2);
  }

  s.start(time);

  if(stopAfterSec!=null){
    const end = time + stopAfterSec;
    try{ s.stop(end); }catch(_e){}
  }

  activeSources.push(s);
  return s;
}

function stopAllPlaying(){
  for(const s of activeSources){
    try{ s.stop(0); }catch(_e){}
  }
  activeSources = [];
}

function piano(notes,time,fade=false){
  notes.forEach(n=>{ play(buf[n],time,fade); });
}

function bass(note,time,fade=false){
  play(buf[note],time,fade);
}

function bassSplitFirstHalf(note,time,durationSec){
  const buffer = buf[note];
  if(!buffer) return;
  const s = ctx.createBufferSource();
  const g = ctx.createGain();
  s.buffer = buffer;
  s.connect(g);
  g.connect(ctx.destination);

  const fadeSec = 0.1;
  const fadeStart = time + Math.max(0, durationSec - fadeSec);
  g.gain.setValueAtTime(1, time);
  g.gain.setValueAtTime(1, fadeStart);
  g.gain.linearRampToValueAtTime(0, time + durationSec);

  s.start(time);
  try{ s.stop(time + durationSec); }catch(_e){}
  activeSources.push(s);
}

function drum(time,fade=false){
  play(buf.drum,time,fade);
}

async function prepareAudioForGesture(){
  if(ctx.state === "suspended"){
    await ctx.resume();
  }
  await loadAll();
}

/* ===== State ===== */
const PLAY_BARS = 8;
const state = Array.from({length: PLAY_BARS}, () => ({ A:{root:"",qual:"",bass:""}, B:{root:"",qual:"",bass:""} }));
let selectedBar=1, selectedHalf="A", bassMode=false;
let lastLookup=null;
let requestSeq=0;
let previewRunId=0;
let currentPlayingBar=0;
let currentPlayingHalf="";
let lastConditionKey="";
let previewUiTimers=[];

function $(id){ return document.getElementById(id); }
function val(id){ return String($(id)?.value||"").trim(); }
function setStatus(msg){ const el=$("statusMsg"); if(el) el.textContent=msg||""; }

function toast(msg){
  const d=document.createElement("div");
  d.textContent=msg;
  d.style.position="fixed"; d.style.left="50%"; d.style.bottom="24px";
  d.style.transform="translateX(-50%)"; d.style.background="#111"; d.style.color="#fff";
  d.style.padding="10px 14px"; d.style.borderRadius="999px"; d.style.fontSize="14px";
  d.style.opacity="0.95"; d.style.zIndex="9999";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1400);
}

function esc(s){
  return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">", "&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#39;");
}
function slot(){ return state[selectedBar-1][selectedHalf]; }

function currentConditionKey(){
  return [val("inEra"), val("inRank"), val("inPart")].join("|");
}

function cloneSlot_(src){
  return {
    root: String(src.root || ""),
    qual: String(src.qual || ""),
    bass: String(src.bass || "")
  };
}

function resetStateData_(){
  for(let i=0;i<PLAY_BARS;i++){
    state[i].A={root:"",qual:"",bass:""};
    state[i].B={root:"",qual:"",bass:""};
  }
  lastLookup=null;
  bassMode=false;
  selectedBar=1;
  selectedHalf="A";
  stopPreview();
  setToneView("（停止中）");
  renderAll();
}

function maybeResetByConditionChange_(){
  const nowKey=currentConditionKey();
  if(lastConditionKey!=="" && lastConditionKey!==nowKey){
    resetStateData_();
    setStatus("");
  }
  lastConditionKey=nowKey;
}

function setToneView(text){
  $("toneView").textContent=text || "";
}

function buildChordString(s){
  const r=(s.root||"").trim(), q=(s.qual||"").trim(), b=(s.bass||"").trim();
  if(!r) return "";
  let out=r+q;
  if(b) out += "/" + b;
  return out;
}
function buildBarChord(i){
  const a=buildChordString(state[i].A), b=buildChordString(state[i].B);
  if(a && b) return `${a}│${b}`;
  if(a) return a;
  if(b) return b;
  return "";
}

function renderBars(){
  const grid=$("barGrid"); if(!grid) return;
  grid.innerHTML="";
  for(let i=1;i<=PLAY_BARS;i++){
    const row=document.createElement("div"); row.className="bar";
    const idx=document.createElement("div"); idx.className="idx"; idx.textContent=i;

    const aStr=buildChordString(state[i-1].A);
    const bStr=buildChordString(state[i-1].B);

    const slotA=document.createElement("div");
    slotA.className="slot"+(selectedBar===i && selectedHalf==="A" ? " active":"")+(currentPlayingBar===i && currentPlayingHalf==="A" ? " playing":"");
    slotA.onclick=()=>{selectedBar=i;selectedHalf="A";bassMode=false;renderAll();};
    slotA.innerHTML=`<div class="txt">${esc(aStr||"（前半）")}</div><div class="badge">A</div>`;

    const slotB=document.createElement("div");
    slotB.className="slot"+(selectedBar===i && selectedHalf==="B" ? " active":"")+(currentPlayingBar===i && currentPlayingHalf==="B" ? " playing":"");
    slotB.onclick=()=>{selectedBar=i;selectedHalf="B";bassMode=false;renderAll();};
    slotB.innerHTML=`<div class="txt">${esc(bStr||"（後半）")}</div><div class="badge">B</div>`;

    row.appendChild(idx); row.appendChild(slotA); row.appendChild(slotB);
    grid.appendChild(row);
  }
}

function renderMeta(){
  const g=$("metaGrid"); if(!g) return;
  g.innerHTML="";
  if(!lastLookup || !lastLookup.ok){
    g.innerHTML=`<div class="muted">（未取得）</div>`;
    return;
  }
  const m=lastLookup.meta||{};
  const items=[["Artist",m.Artist],["title",m.title],["words",m.words],["music",m.music],["arrange",m.arrange],["Year",m.Year],["original_key",m.original_key],["Quiz_key",m.Quiz_key],["row",lastLookup.rowIndex]];
  for(const [k,v] of items){
    const div=document.createElement("div");
    div.className="metaItem";
    div.innerHTML=`<div class="k">${esc(k)}</div><div class="v">${esc(v||"")}</div>`;
    g.appendChild(div);
  }
}

function renderPads(){
  const rootPad=$("rootPad");
  const qualPad=$("qualPad");
  if(!rootPad || !qualPad) return;

  const roots=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B","D♭","E♭","G♭","A♭","B♭"];
  rootPad.innerHTML="";
  roots.forEach(r=>{
    const b=document.createElement("button");
    b.className="btn";
    b.textContent=r;
    b.onclick=()=>applyRoot(r);
    rootPad.appendChild(b);
  });

  const quals=["","m","7","m7","maj7","mM7","dim","aug","sus4","m7-5","add9","9","6","m6"];
  qualPad.innerHTML="";
  quals.forEach(q=>{
    const b=document.createElement("button");
    b.className="btn";
    b.textContent=(q===""?"（なし）":q);
    b.onclick=()=>applyQuality(q);
    qualPad.appendChild(b);
  });
}

function renderAll(){
  renderBars();
  renderMeta();
  document.title="Progression Entry ver1.3.13";
}

/* actions */
function clearSelected(){ state[selectedBar-1][selectedHalf]={root:"",qual:"",bass:""}; bassMode=false; renderAll(); }
function toggleBassMode(){ bassMode=!bassMode; toast(bassMode?"オンベース：次にルート":"オンベース解除"); }
function clearBass(){ slot().bass=""; bassMode=false; renderAll(); }
function clearQuality(){ slot().qual=""; renderAll(); }
function applyRoot(root){ const s=slot(); if(bassMode){ s.bass=root; bassMode=false; } else { s.root=root; } renderAll(); }
function applyQuality(q){ slot().qual=q; renderAll(); }
function fourBarRepeat(){
  for(let i=0;i<4;i++){
    state[i+4].A = cloneSlot_(state[i].A);
    state[i+4].B = cloneSlot_(state[i].B);
  }
  toast("1〜4小節を5〜8小節へコピー");
  renderAll();
}

function parseToSlot_(chord, slotObj){
  const s=String(chord||"").trim();
  const slash=s.split("/");
  const head=(slash[0]||"").trim();
  const bass=(slash[1]||"").trim();
  const m=head.match(/^([A-G](?:#|♭|b)?)(.*)$/);
  slotObj.root = m ? m[1].replaceAll("b","♭") : "";
  slotObj.qual = m ? (m[2]||"") : "";
  slotObj.bass = bass ? bass.replaceAll("b","♭") : "";
}

function fillFromExistingAuto_(payload){
  const arr=(payload.originalChords||[]).concat(["","","","","","","",""]).slice(0,8);
  for(let i=0;i<8;i++){
    state[i].A={root:"",qual:"",bass:""};
    state[i].B={root:"",qual:"",bass:""};
    const raw=String(arr[i]||"").trim();
    if(!raw) continue;
    const parts=raw.split("│").map(x=>x.trim()).filter(Boolean);
    if(parts.length>=2){
      parseToSlot_(parts[0],state[i].A);
      parseToSlot_(parts[1],state[i].B);
    }else{
      parseToSlot_(raw,state[i].A);
    }
  }
}

function cleanupJsonp_(callbackName, scriptEl){
  try{ if(scriptEl && scriptEl.parentNode) scriptEl.parentNode.removeChild(scriptEl); }catch(_e){}
  try{ delete window[callbackName]; }catch(_e){ window[callbackName]=undefined; }
}

function jsonpRequest_(params, onDone){
  requestSeq += 1;
  const callbackName = "__grc_jsonp_" + requestSeq;
  const url = new URL(WEBAPP_URL);
  Object.keys(params).forEach(key => url.searchParams.set(key, params[key]));
  url.searchParams.set("callback", callbackName);
  url.searchParams.set("_", String(Date.now()));

  const script = document.createElement("script");

  window[callbackName] = function(payload){
    cleanupJsonp_(callbackName, script);
    onDone(payload);
  };

  script.onerror = function(){
    cleanupJsonp_(callbackName, script);
    onDone({ ok:false, error:"network error" });
  };

  script.src = url.toString();
  document.body.appendChild(script);
}

/* data flow */
function lookup(){
  const era=val("inEra"), rank=val("inRank"), part=val("inPart");
  if(!era || !rank || !part){ toast("ERA/Rank/Part"); return; }

  setStatus("取得中...");
  jsonpRequest_(
    { action:"lookup_jsonp", era, rank, part },
    function(payload){
      if(payload && payload.ok && payload.action==="lookup"){
        lastLookup = payload;
        fillFromExistingAuto_(payload);
        toast(`取得OK（行 ${payload.rowIndex}）`);
        setStatus(`取得OK（行 ${payload.rowIndex}）`);
      }else{
        toast(payload && payload.error ? `ERROR: ${payload.error}` : "ERROR");
        setStatus(payload && payload.error ? `ERROR: ${payload.error}` : "ERROR");
      }
      renderAll();
    }
  );
}

function applyUpdate(){
  if(!lastLookup || !lastLookup.ok){ toast("先に取得"); return; }

  const era=val("inEra"), rank=val("inRank"), part=val("inPart");
  const params={ action:"update_jsonp", era, rank, part };
  for(let i=1;i<=8;i++) params["c"+i]=buildBarChord(i-1);

  setStatus("反映中...");
  jsonpRequest_(
    params,
    function(payload){
      if(payload && payload.ok && payload.action==="update"){
        toast(`反映OK（行 ${payload.updatedRow}）`);
        setStatus(`反映OK（行 ${payload.updatedRow}）`);
      }else{
        toast(payload && payload.error ? `ERROR: ${payload.error}` : "ERROR");
        setStatus(payload && payload.error ? `ERROR: ${payload.error}` : "ERROR");
      }
      renderAll();
    }
  );
}

/* ===== preview logic ===== */
function pcIndex(name){
  const pcs = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  return pcs.indexOf(name);
}

function idxToPc(i){
  const pcs = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  return pcs[(i%12+12)%12];
}

function normalizeAccidentalRoot(root){
  const map = {
    "Cb":"B",
    "Db":"C#", "D♭":"C#",
    "Eb":"D#", "E♭":"D#",
    "Fb":"E",
    "Gb":"F#", "G♭":"F#",
    "Ab":"G#", "A♭":"G#",
    "Bb":"A#", "B♭":"A#",
    "E#":"F",
    "B#":"C"
  };
  return map[root] || root;
}

function parseChordSymbol(sym){
  sym = String(sym||"").trim();
  const slashSplit = sym.split("/");
  const baseSym = (slashSplit[0]||"").trim();
  const slashBass = slashSplit[1] ? String(slashSplit[1]).trim() : "";
  const m = baseSym.match(/^([A-G](?:[#b♭])?)(.*)$/);
  const root = m ? m[1] : "C";
  const rest = m ? m[2] : "";

  let quality = "maj";
  if(rest.startsWith("m") && !rest.startsWith("maj")) quality = "min";
  if(rest.startsWith("dim")) quality = "dim";
  if(rest.startsWith("aug")) quality = "aug";

  let seventh = null;
  if(/mM7/.test(rest)) seventh = "maj7";
  else if(/maj7|M7/.test(rest)) seventh = "maj7";
  else if(/m7/.test(rest)) seventh = "m7";
  else if(/(^|[^a-zA-Z])7/.test(rest)) seventh = "7";

  const sixth = /6/.test(rest);
  const ninth = /9/.test(rest);
  const bassRoot = slashBass ? slashBass : root;

  return {root, bassRoot, quality, seventh, sixth, ninth};
}

function chordToPitchClasses(sym){
  const p = parseChordSymbol(sym);
  const rootNorm = normalizeAccidentalRoot(p.root);
  const r = pcIndex(rootNorm);
  if(r<0) return ["C","E","G"];

  let third = 4;
  let fifth = 7;
  if(p.quality==="min"){ third = 3; fifth = 7; }
  if(p.quality==="aug"){ third = 4; fifth = 8; }
  if(p.quality==="dim"){ third = 3; fifth = 6; }

  const pcs = [ idxToPc(r), idxToPc(r+third), idxToPc(r+fifth) ];
  if(p.sixth) pcs.push(idxToPc(r+9));
  if(p.seventh==="7") pcs.push(idxToPc(r+10));
  if(p.seventh==="maj7") pcs.push(idxToPc(r+11));
  if(p.seventh==="m7") pcs.push(idxToPc(r+10));
  if(p.ninth) pcs.push(idxToPc(r+14));

  const uniq = [];
  for(const x of pcs){
    if(!uniq.includes(x)) uniq.push(x);
  }
  return uniq;
}

function bassBufferName(rootPc){
  if(rootPc==="C") return "C1_Bass";
  if(rootPc==="C#" || rootPc==="D" || rootPc==="D#") return rootPc + "1_Bass";
  return rootPc + "0_Bass";
}

function pianoVoicing(sym){
  const p = parseChordSymbol(sym);
  const rootNorm = normalizeAccidentalRoot(p.root);
  const rootIdx = pcIndex(rootNorm);
  let pcs = chordToPitchClasses(sym);

  if(p.ninth){
    const n9 = idxToPc(rootIdx+14);
    pcs = pcs.filter(x=>x!==n9);
    pcs.push(n9);
  }
  if(p.seventh){
    const sev = p.seventh==="maj7" ? idxToPc(rootIdx+11) : idxToPc(rootIdx+10);
    pcs = pcs.filter(x=>x!==sev);
    pcs.push(sev);
  }

  while(pcs.length<3){ pcs.push(idxToPc(rootIdx+7)); }
  if(pcs.length>4){
    if(p.ninth){
      pcs = [pcs[0], pcs[1], pcs[2], idxToPc(rootIdx+14)];
    }else if(p.seventh){
      const sev = p.seventh==="maj7" ? idxToPc(rootIdx+11) : idxToPc(rootIdx+10);
      pcs = [pcs[0], pcs[1], pcs[2], sev];
    }else{
      pcs = pcs.slice(0,4);
    }
  }

  return pcs.slice(0,4).map(x=>x+"3");
}

function getBarSegments(chordText){
  const raw = String(chordText||"");
  const parts = raw.split("│").map(x=>x.trim()).filter(Boolean);
  if(parts.length>=2){
    return [
      {raw:parts[0], offset:0.0, duration:1.0, half:"A"},
      {raw:parts[1], offset:1.0, duration:1.0, half:"B"}
    ];
  }
  return [{raw:raw.trim(), offset:0.0, duration:2.0, half:(raw.trim() ? "A" : "")}];
}

function toneNamesFromSym_(sym){
  const pcs = chordToPitchClasses(sym);
  return pcs.join(" / ");
}

function clearPreviewUiTimers_(){
  previewUiTimers.forEach(id=>clearTimeout(id));
  previewUiTimers = [];
}

function schedulePreviewUi_(runId, delayMs, barNo, half, sym){
  const id = setTimeout(()=>{
    if(runId!==previewRunId) return;
    currentPlayingBar = barNo;
    currentPlayingHalf = half;
    setToneView(sym ? toneNamesFromSym_(sym) : "（停止中）");
    renderAll();
  }, Math.max(0, delayMs));
  previewUiTimers.push(id);
}

function getLastFilledBarIndex_(){
  for(let i=PLAY_BARS-1;i>=0;i--){
    if(String(buildBarChord(i)||"").trim()) return i;
  }
  return -1;
}

function stopPreview(){
  previewRunId += 1;
  clearPreviewUiTimers_();
  stopAllPlaying();
  currentPlayingBar=0;
  currentPlayingHalf="";
  setToneView("（停止中）");
  renderAll();
  $("btnPreview").textContent="視聴";
}

async function previewPlay(){
  const lastFilledBar = getLastFilledBarIndex_();
  if(lastFilledBar < 0){
    toast("コード未入力");
    return;
  }

  if($("btnPreview").textContent==="停止"){
    stopPreview();
    return;
  }

  await prepareAudioForGesture();
  stopPreview();

  const runId = ++previewRunId;
  $("btnPreview").textContent="停止";

  let t = ctx.currentTime + 0.1;
  let bar = 2.0;

  for(let i=0;i<=lastFilledBar;i++){
    const baseTime = t + bar*i;
    const isLastBar = (i===lastFilledBar);
    const barText = buildBarChord(i);
    const segs = getBarSegments(barText);

    if(!String(barText||"").trim()) continue;

    drum(baseTime, isLastBar);

    for(let j=0;j<segs.length;j++){
      const seg = segs[j];
      if(!seg.raw) continue;

      const segTime = baseTime + seg.offset;
      const segFade = (isLastBar && j===segs.length-1);

      const rootPc = normalizeAccidentalRoot(parseChordSymbol(seg.raw).bassRoot);
      const bname = bassBufferName(rootPc);

      if(segs.length>=2 && j===0){
        bassSplitFirstHalf(bname, segTime, 1.3);
      }else{
        bass(bname, segTime, segFade);
      }

      piano(pianoVoicing(seg.raw), segTime, segFade);

      schedulePreviewUi_(
        runId,
        (segTime - ctx.currentTime) * 1000,
        i + 1,
        seg.half,
        seg.raw
      );
    }
  }

  schedulePreviewUi_(runId, ((bar * (lastFilledBar + 1)) + 0.15) * 1000, 0, "", "");
  const stopId = setTimeout(()=>{
    if(runId!==previewRunId) return;
    stopPreview();
  }, ((bar * (lastFilledBar + 1)) + 0.2) * 1000);
  previewUiTimers.push(stopId);
}

/* ===== init (DOM完成後) ===== */
document.addEventListener("DOMContentLoaded", () => {
  $("btnLookup").onclick = lookup;
  $("btnUpdate").onclick = applyUpdate;
  $("btnPreview").onclick = previewPlay;
  $("btn4barRep").onclick = fourBarRepeat;

  $("btnClearBar").onclick = clearSelected;

  $("btnBassMode").onclick = toggleBassMode;
  $("btnBassClear").onclick = clearBass;
  $("btnQualClear").onclick = clearQuality;

  $("inEra").addEventListener("change", maybeResetByConditionChange_);
  $("inRank").addEventListener("change", maybeResetByConditionChange_);
  $("inRank").addEventListener("input", maybeResetByConditionChange_);
  $("inPart").addEventListener("change", maybeResetByConditionChange_);

  renderPads();
  lastConditionKey=currentConditionKey();
  renderAll();
});
</script>
