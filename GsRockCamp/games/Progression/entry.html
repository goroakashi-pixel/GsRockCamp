<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GoRockCamp DB Entry ver1.0.1</title>

  <!-- SheetJS (xlsx) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.20.2/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --text:#111;
      --muted:#666;
      --line:#ddd;
      --bg:#fff;
      --card:#fff;
      --blue:#1d4ed8;
      --warn:#b91c1c;
      --ok:#0f766e;
      --btn-bg:#fff;
      --radius:14px;
      --tap:44px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --sans: -apple-system, system-ui, "Segoe UI", sans-serif;
    }
    body{
      font-family:var(--sans);
      margin:16px;
      color:var(--text);
      background:var(--bg);
      padding-bottom:140px;
    }
    h1{
      font-size:18px;
      margin:0 0 8px 0;
      font-weight:700;
    }
    .muted{ color:var(--muted); font-size:13px; }
    .wrap{ max-width: 980px; margin:0 auto; }
    .card{
      border:1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      padding:14px;
      margin:12px 0;
    }
    .row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }
    @media (max-width: 780px){
      .row{ grid-template-columns: 1fr; }
    }
    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:0 0 6px 0;
    }
    input, select, textarea{
      width:100%;
      box-sizing:border-box;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius: 12px;
      font-size:14px;
      min-height: var(--tap);
      background:#fff;
      color:var(--text);
    }
    textarea{
      min-height: 84px;
      resize: vertical;
    }
    input[readonly], textarea[readonly]{
      background:#fafafa;
      color:#333;
    }
    .btns{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:10px;
    }
    button{
      min-height: var(--tap);
      padding:10px 14px;
      border-radius: 999px;
      border:1px solid var(--line);
      background: var(--btn-bg);
      cursor:pointer;
      font-weight:600;
    }
    button.primary{
      border:2px solid var(--blue);
    }
    button.ok{
      border:2px solid var(--ok);
    }
    button.warn{
      border:2px solid var(--warn);
      color: var(--warn);
    }
    .status{
      font-family:var(--mono);
      font-size:12px;
      white-space:pre-wrap;
      color:#222;
      background:#fafafa;
      border:1px dashed var(--line);
      border-radius:12px;
      padding:10px 12px;
      margin-top:10px;
    }
    .grid3{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:12px;
    }
    @media (max-width: 780px){
      .grid3{ grid-template-columns: 1fr; }
    }
    .pill{
      font-family:var(--mono);
      font-size:12px;
      padding:2px 8px;
      border:1px solid var(--line);
      border-radius:999px;
      display:inline-block;
      margin-left:8px;
      color:#333;
      background:#fafafa;
    }
    .smallnote{ font-size:12px; color:var(--muted); margin-top:6px;}
    .hr{
      height:1px; background:var(--line); margin:10px 0;
    }
    .k{ font-family:var(--mono); font-size:12px; }
  </style>
</head>

<body>
<div class="wrap">
  <h1>DB Entry <span class="pill">ver1.0.1</span></h1>
  <div class="muted">
    検索キーは <b>ERA + Rank + Part</b>。IDは既存行が見つかった場合 <b>不変</b>（再生成しません）。
  </div>

  <div class="card">
    <div class="row">
      <div>
        <label>① DBファイル（.xlsx）を読み込み</label>
        <input id="file" type="file" accept=".xlsx" />
        <div class="smallnote">最初のシートを読み込みます（ヘッダ行＝1行目想定）。</div>
      </div>

      <div>
        <label>シート名 / 行数</label>
        <input id="meta" type="text" readonly value="未読込" />
        <div class="smallnote">読み込み後、フォーム項目はヘッダに合わせて自動生成されます。</div>
      </div>
    </div>

    <div class="hr"></div>

    <div class="grid3">
      <div>
        <label>Rank（B列想定）</label>
        <input id="rank" type="text" placeholder="例: 18" />
      </div>
      <div>
        <label>ERA（J列想定）</label>
        <input id="era" type="text" placeholder="例: 1990 / 1970s など" />
      </div>
      <div>
        <label>number（1〜4）→ Part入力補助</label>
        <select id="number">
          <option value="">未選択</option>
          <option value="1">1 = intro</option>
          <option value="2">2 = Aメロ</option>
          <option value="3">3 = Bメロ</option>
          <option value="4">4 = サビ</option>
        </select>
      </div>
    </div>

    <div class="row" style="margin-top:12px;">
      <div>
        <label>Part（M列想定 / 検索キーの一部）</label>
        <input id="part" type="text" placeholder="例: Aメロ" />
        <div class="smallnote">numberを選ぶと自動で上書きされます（必要なら直接編集も可）。</div>
      </div>
      <div>
        <label>ID（DB側で採番済み / 不偏）</label>
        <input id="id" type="text" readonly placeholder="検索で既存行を拾うと表示されます" />
      </div>
    </div>

    <div class="btns">
      <button id="btnSearch" class="primary">検索（ERA+Rank+Part）</button>
      <button id="btnClear" class="">クリア（フォーム）</button>
      <button id="btnSave" class="ok">保存（IDは触らない）</button>
      <button id="btnExport" class="primary">XLSXを書き出し（ダウンロード）</button>
      <button id="btnExportJson" class="">JSONを書き出し</button>
      <button id="btnExportCsv" class="">CSVを書き出し</button>
    </div>

    <div id="status" class="status">status: 未読込</div>
  </div>

  <div class="card">
    <div class="muted" style="margin-bottom:10px;">
      ここから下は、読み込んだヘッダに合わせて編集項目を自動生成します（キー列は上でも編集できます）。
    </div>
    <div id="dynamicForm"></div>
  </div>
</div>

<script>
(() => {
  const VER = "1.0.1";

  // number → Part は「入力補助」
  const PART_BY_NUMBER = {
    1: "intro",
    2: "Aメロ",
    3: "Bメロ",
    4: "サビ",
  };

  const el = {
    file: document.getElementById("file"),
    meta: document.getElementById("meta"),
    rank: document.getElementById("rank"),
    era: document.getElementById("era"),
    number: document.getElementById("number"),
    part: document.getElementById("part"),
    id: document.getElementById("id"),
    btnSearch: document.getElementById("btnSearch"),
    btnClear: document.getElementById("btnClear"),
    btnSave: document.getElementById("btnSave"),
    btnExport: document.getElementById("btnExport"),
    btnExportJson: document.getElementById("btnExportJson"),
    btnExportCsv: document.getElementById("btnExportCsv"),
    status: document.getElementById("status"),
    dynamicForm: document.getElementById("dynamicForm"),
  };

  // in-memory DB
  let workbook = null;
  let sheetName = null;
  let headers = [];
  let rows = [];        // array of objects (header -> value)
  let currentIndex = -1; // found row index by ERA+Rank+Part

  function log(msg){
    el.status.textContent = `status: ${msg}`;
  }

  function norm(s){
    return String(s ?? "").trim();
  }

  function findHeaderCI(target){
    // case-insensitive / whitespace-insensitive match against headers
    const t = norm(target).toLowerCase();
    return headers.find(h => norm(h).toLowerCase() === t) ?? null;
  }

  function findHeaderAny(candidates){
    for (const c of candidates){
      const h = findHeaderCI(c);
      if (h) return h;
    }
    return null;
  }

  function keyHeaders(){
    // "Rank", "ERA", "Part", "ID", "number" の実ヘッダを推定
    const hRank  = findHeaderAny(["Rank", "RANK", "rank"]);
    const hEra   = findHeaderAny(["ERA", "Era", "era"]);
    const hPart  = findHeaderAny(["Part", "PART", "part"]);
    const hId    = findHeaderAny(["ID", "Id", "id"]);
    const hNum   = findHeaderAny(["number", "Number", "NUMBER", "num", "Num"]);
    return { hRank, hEra, hPart, hId, hNum };
  }

  function syncPartFromNumber(){
    const n = parseInt(el.number.value, 10);
    if (!Number.isFinite(n)) return;
    const p = PART_BY_NUMBER[n];
    if (p) el.part.value = p;

    // 動的フォーム内のPartにも反映
    const { hPart } = keyHeaders();
    if (hPart){
      const inp = document.querySelector(`[data-col="${cssEscape(hPart)}"]`);
      if (inp) inp.value = p;
    }

    // number列があるならそれも反映
    const { hNum } = keyHeaders();
    if (hNum){
      const inpNum = document.querySelector(`[data-col="${cssEscape(hNum)}"]`);
      if (inpNum) inpNum.value = String(n);
    }
  }

  // CSS.escape fallback
  function cssEscape(str){
    if (window.CSS && CSS.escape) return CSS.escape(str);
    return String(str).replace(/["\\]/g, "\\$&");
  }

  function buildDynamicForm(){
    el.dynamicForm.innerHTML = "";
    if (!headers.length){
      el.dynamicForm.innerHTML = `<div class="muted">未読込です。</div>`;
      return;
    }

    const { hRank, hEra, hPart, hId, hNum } = keyHeaders();

    const frag = document.createDocumentFragment();
    const wrap = document.createElement("div");
    wrap.className = "row";

    // 2カラムで並べる：左・右に交互配置
    const colA = document.createElement("div");
    const colB = document.createElement("div");

    headers.forEach((h, i) => {
      const box = document.createElement("div");
      box.style.marginBottom = "12px";

      const lab = document.createElement("label");
      lab.textContent = h;

      let input;
      // 長文っぽい列名はtextareaに
      const hn = norm(h).toLowerCase();
      const useTextarea =
        hn.includes("note") || hn.includes("memo") || hn.includes("comment") || hn.includes("lyrics") || hn.includes("chord");

      if (useTextarea){
        input = document.createElement("textarea");
      } else {
        input = document.createElement("input");
        input.type = "text";
      }

      input.dataset.col = h;
      input.placeholder = h;

      // キー列は上段フォームと連動
      if (h === hRank){
        input.addEventListener("input", () => el.rank.value = input.value);
      }
      if (h === hEra){
        input.addEventListener("input", () => el.era.value = input.value);
      }
      if (h === hPart){
        input.addEventListener("input", () => el.part.value = input.value);
      }
      if (h === hId){
        input.readOnly = true; // IDは不偏（entry側でいじらない）
      }

      box.appendChild(lab);
      box.appendChild(input);

      (i % 2 === 0 ? colA : colB).appendChild(box);
    });

    wrap.appendChild(colA);
    wrap.appendChild(colB);
    frag.appendChild(wrap);

    el.dynamicForm.appendChild(frag);

    // 上段の number/part/rank/era/id を動的フォームへ初期反映
    el.rank.dispatchEvent(new Event("input"));
    el.era.dispatchEvent(new Event("input"));
    el.part.dispatchEvent(new Event("input"));
    // id は読み取り専用なので触らない
  }

  function setDynamicValue(header, value){
    const inp = document.querySelector(`[data-col="${cssEscape(header)}"]`);
    if (inp) inp.value = value ?? "";
  }

  function getDynamicValue(header){
    const inp = document.querySelector(`[data-col="${cssEscape(header)}"]`);
    return inp ? inp.value : "";
  }

  function clearForm(keepKeys=true){
    // dynamic inputs
    headers.forEach(h => {
      const { hId } = keyHeaders();
      if (h === hId) return; // IDは保持しない（検索結果に依存）
      const inp = document.querySelector(`[data-col="${cssEscape(h)}"]`);
      if (inp) inp.value = "";
    });

    if (!keepKeys){
      el.rank.value = "";
      el.era.value = "";
      el.part.value = "";
      el.number.value = "";
    } else {
      // keyは残すなら、上段は触らない
    }
    el.id.value = "";
    currentIndex = -1;
  }

  function findRowIndexByKey(era, rank, part){
    const { hRank, hEra, hPart } = keyHeaders();
    if (!hRank || !hEra || !hPart) return -1;

    const e = norm(era);
    const r = norm(rank);
    const p = norm(part);

    return rows.findIndex(row =>
      norm(row[hEra])  === e &&
      norm(row[hRank]) === r &&
      norm(row[hPart]) === p
    );
  }

  function populateFormFromRow(row){
    const { hId, hRank, hEra, hPart, hNum } = keyHeaders();

    headers.forEach(h => setDynamicValue(h, row[h]));
    // 上段キーも同期
    if (hRank) el.rank.value = row[hRank] ?? "";
    if (hEra)  el.era.value  = row[hEra] ?? "";
    if (hPart) el.part.value = row[hPart] ?? "";
    if (hId)   el.id.value   = row[hId] ?? "";

    // number列があるなら、number UIも寄せる（存在しない/不正ならそのまま）
    if (hNum){
      const n = parseInt(row[hNum], 10);
      if (Number.isFinite(n) && n >= 1 && n <= 4){
        el.number.value = String(n);
      }
    } else {
      // number列が無い場合でも、partから逆引きできるときだけ合わせる
      const p = norm(el.part.value);
      const inv = Object.entries(PART_BY_NUMBER).find(([k,v]) => v === p);
      if (inv) el.number.value = String(inv[0]);
    }
  }

  function buildRowFromFormPreserveId(existingRow){
    const { hRank, hEra, hPart, hId, hNum } = keyHeaders();

    const out = { ...(existingRow ?? {}) };

    // まず、フォームの値を全部反映
    headers.forEach(h => {
      // IDは既存がある場合は絶対保持（不偏）
      if (hId && h === hId){
        if (existingRow && norm(existingRow[hId]) !== ""){
          out[hId] = existingRow[hId];
        } else {
          // 新規の場合：ユーザーがDB側で採番する方針なら空のまま
          // （ここで生成しない）
          out[hId] = existingRow?.[hId] ?? out[hId] ?? "";
        }
        return;
      }
      out[h] = getDynamicValue(h);
    });

    // 上段キーは動的フォームより優先して確実に書き込む
    if (hRank) out[hRank] = norm(el.rank.value);
    if (hEra)  out[hEra]  = norm(el.era.value);
    if (hPart) out[hPart] = norm(el.part.value);

    // number列が存在するなら、number UIの値を反映（補助）
    if (hNum){
      const n = norm(el.number.value);
      if (n) out[hNum] = n;
    }

    // 既存行があるならIDを最優先で固定
    if (hId && existingRow && norm(existingRow[hId]) !== ""){
      out[hId] = existingRow[hId];
    }

    return out;
  }

  function writeBackToWorkbook(){
    if (!workbook || !sheetName) return false;

    // rows -> worksheet
    const ws = XLSX.utils.json_to_sheet(rows, { header: headers });
    // ヘッダ順を強制したいので !ref を調整（json_to_sheetで作られる）
    workbook.Sheets[sheetName] = ws;
    return true;
  }

  function downloadBlob(filename, blob){
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 800);
  }

  function exportXlsx(){
    if (!workbook) { log("XLSX未読込"); return; }
    writeBackToWorkbook();
    const out = XLSX.write(workbook, { bookType:"xlsx", type:"array" });
    downloadBlob(`GoRockCampDB_updated_ver${VER}.xlsx`, new Blob([out], { type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" }));
    log("XLSXを書き出しました");
  }

  function exportJson(){
    const out = JSON.stringify({ headers, rows }, null, 2);
    downloadBlob(`GoRockCampDB_updated_ver${VER}.json`, new Blob([out], { type:"application/json" }));
    log("JSONを書き出しました");
  }

  function exportCsv(){
    if (!headers.length) { log("未読込"); return; }
    // RFC4180簡易
    const esc = (v) => {
      const s = String(v ?? "");
      if (/[",\n\r]/.test(s)) return `"${s.replace(/"/g,'""')}"`;
      return s;
    };
    const lines = [];
    lines.push(headers.map(esc).join(","));
    for (const row of rows){
      lines.push(headers.map(h => esc(row[h])).join(","));
    }
    downloadBlob(`GoRockCampDB_updated_ver${VER}.csv`, new Blob([lines.join("\n")], { type:"text/csv;charset=utf-8" }));
    log("CSVを書き出しました");
  }

  // events
  el.number.addEventListener("change", syncPartFromNumber);

  el.part.addEventListener("input", () => {
    const { hPart } = keyHeaders();
    if (hPart) setDynamicValue(hPart, el.part.value);
  });
  el.rank.addEventListener("input", () => {
    const { hRank } = keyHeaders();
    if (hRank) setDynamicValue(hRank, el.rank.value);
  });
  el.era.addEventListener("input", () => {
    const { hEra } = keyHeaders();
    if (hEra) setDynamicValue(hEra, el.era.value);
  });

  el.file.addEventListener("change", async (ev) => {
    const f = ev.target.files?.[0];
    if (!f){ return; }

    try{
      const buf = await f.arrayBuffer();
      workbook = XLSX.read(buf, { type:"array" });

      sheetName = workbook.SheetNames?.[0] ?? null;
      if (!sheetName){
        log("シートが見つかりませんでした");
        return;
      }

      const ws = workbook.Sheets[sheetName];
      const json = XLSX.utils.sheet_to_json(ws, { defval:"", raw:false });

      rows = json;

      // headers: 1行目ヘッダを優先しつつ、無い場合はjsonのキー集合
      const range = XLSX.utils.decode_range(ws["!ref"]);
      const firstRow = [];
      for (let c = range.s.c; c <= range.e.c; c++){
        const cell = ws[XLSX.utils.encode_cell({ r: range.s.r, c })];
        firstRow.push(cell ? String(cell.v ?? "").trim() : "");
      }
      const headerFromSheet = firstRow.filter(x => x !== "");
      if (headerFromSheet.length){
        headers = headerFromSheet;
      } else {
        // fallback
        const set = new Set();
        rows.forEach(r => Object.keys(r).forEach(k => set.add(k)));
        headers = Array.from(set);
      }

      // ヘッダ順に各rowを整形（欠けを埋める）
      rows = rows.map(r => {
        const out = {};
        headers.forEach(h => out[h] = (h in r) ? r[h] : "");
        return out;
      });

      // キー列必須チェック
      const { hRank, hEra, hPart, hId } = keyHeaders();
      const missing = [];
      if (!hRank) missing.push("Rank");
      if (!hEra) missing.push("ERA");
      if (!hPart) missing.push("Part");
      if (!hId) missing.push("ID（任意だが推奨）");

      el.meta.value = `${sheetName} / ${rows.length} rows / ${headers.length} cols`;
      buildDynamicForm();

      log(
        `読み込みOK: ${sheetName}\n` +
        `列: Rank=${hRank ?? "?"}, ERA=${hEra ?? "?"}, Part=${hPart ?? "?"}, ID=${hId ?? "?"}\n` +
        (missing.length ? `注意: 主要列が見つからない可能性 → ${missing.join(", ")}\n` : "") +
        `検索キー=ERA+Rank+Part / IDは既存行があれば不変`
      );

    } catch (e){
      console.error(e);
      log("読み込みエラー: " + (e?.message ?? e));
    }
  });

  el.btnSearch.addEventListener("click", () => {
    if (!rows.length){ log("未読込"); return; }

    const era = el.era.value;
    const rank = el.rank.value;
    const part = el.part.value;

    const idx = findRowIndexByKey(era, rank, part);
    currentIndex = idx;

    if (idx >= 0){
      populateFormFromRow(rows[idx]);
      log(`ヒット: index=${idx}\n（ERA+Rank+Partで一致）\nIDは不変で維持します`);
    } else {
      // 見つからない場合：キーを残して他をクリア（新規入力を想定）
      clearForm(true);
      // キーは再投入（clearFormでdynamicも消えてるので戻す）
      el.era.value = norm(era);
      el.rank.value = norm(rank);
      el.part.value = norm(part);
      el.era.dispatchEvent(new Event("input"));
      el.rank.dispatchEvent(new Event("input"));
      el.part.dispatchEvent(new Event("input"));
      log(`未ヒット: ERA+Rank+Partが見つかりません\n新規として入力→保存できます（IDは生成しません）`);
    }
  });

  el.btnClear.addEventListener("click", () => {
    clearForm(false);
    log("フォームをクリアしました");
  });

  el.btnSave.addEventListener("click", () => {
    if (!rows.length){ log("未読込"); return; }

    const era = norm(el.era.value);
    const rank = norm(el.rank.value);
    const part = norm(el.part.value);

    if (!era || !rank || !part){
      log("保存できません: ERA / Rank / Part は必須です（検索キー）");
      return;
    }

    // まず現状のキーで再検索（currentIndexが古い可能性があるため）
    const idx = findRowIndexByKey(era, rank, part);

    if (idx >= 0){
      // update
      const existing = rows[idx];
      const updated = buildRowFromFormPreserveId(existing);
      rows[idx] = updated;

      // フォームへ再反映（ID固定が効いてることを見せる）
      populateFormFromRow(rows[idx]);
      currentIndex = idx;

      log(`更新しました: index=${idx}\n検索キー=ERA+Rank+Part\nIDは既存のまま保持`);
    } else {
      // create
      const created = buildRowFromFormPreserveId(null);

      // 重複キー最終チェック（念のため）
      const again = findRowIndexByKey(created[keyHeaders().hEra], created[keyHeaders().hRank], created[keyHeaders().hPart]);
      if (again >= 0){
        log("保存中に重複が検出されました（ERA+Rank+Part）。検索し直してから更新してください。");
        return;
      }

      rows.push(created);
      currentIndex = rows.length - 1;

      // IDは空のままの可能性がある（DB側で採番する前提）
      populateFormFromRow(created);
      log(`新規追加しました: index=${currentIndex}\nIDは生成していません（不偏方針）`);
    }
  });

  el.btnExport.addEventListener("click", exportXlsx);
  el.btnExportJson.addEventListener("click", exportJson);
  el.btnExportCsv.addEventListener("click", exportCsv);

  // 初期
  log(`未読込\nver=${VER}`);
})();
</script>
</body>
</html>
