<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Progression Entry ver1.0.2</title>
<style>
  :root{
    --text:#111;
    --muted:#666;
    --line:#ddd;
    --bg:#fff;
    --card:#fff;
    --blue:#1d4ed8;
    --warn:#b91c1c;
    --btn-radius:14px;
    --tap-min-h:44px;
  }
  body{
    font-family:-apple-system, system-ui, "Segoe UI", sans-serif;
    margin:16px;
    color:var(--text);
    background:var(--bg);
    padding-bottom:120px;
  }
  h2{ margin:0 0 10px; font-size:20px; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .card{
    border:1px solid var(--line);
    border-radius:16px;
    padding:12px;
    background:var(--card);
    margin:10px 0;
  }
  label{ font-size:13px; color:var(--muted); display:block; margin:8px 0 4px; }
  input, select, textarea{
    width:100%;
    font-size:16px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:12px;
    min-height:var(--tap-min-h);
    box-sizing:border-box;
    background:#fff;
  }
  textarea{ min-height:80px; }
  .grid{
    display:grid;
    grid-template-columns: 1fr;
    gap:8px;
  }
  .bar{
    display:grid;
    grid-template-columns: 60px 1fr 1fr;
    gap:8px;
    align-items:stretch;
  }
  .bar .idx{
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid var(--line);
    border-radius:12px;
    background:#fafafa;
    font-weight:700;
  }
  .slot{
    border:2px solid var(--line);
    border-radius:12px;
    padding:10px 10px;
    min-height:var(--tap-min-h);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    background:#fff;
  }
  .slot.active{
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(29,78,216,0.12);
  }
  .slot .txt{
    font-size:16px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .badge{
    font-size:12px;
    color:var(--muted);
    border:1px solid var(--line);
    padding:2px 8px;
    border-radius:999px;
    background:#f7f7f7;
  }
  .kbd{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .btn{
    min-height:var(--tap-min-h);
    padding:10px 12px;
    border-radius:var(--btn-radius);
    border:1px solid var(--line);
    background:#fff;
    font-size:16px;
    cursor:pointer;
  }
  .btn.primary{
    border:2px solid var(--blue);
    color:var(--blue);
    font-weight:700;
  }
  .btn.warn{
    border:2px solid var(--warn);
    color:var(--warn);
    font-weight:700;
  }
  .btn.small{ font-size:14px; padding:8px 10px; min-height:40px; }
  .muted{ color:var(--muted); font-size:13px; }
  .hr{ margin:12px 0; border-top:1px solid var(--line); }
  .metaGrid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:8px;
    margin-top:10px;
  }
  .metaItem{
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 12px;
    background:#fafafa;
  }
  .metaItem .k{ font-size:12px; color:var(--muted); }
  .metaItem .v{ font-size:15px; font-weight:600; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style>
</head>

<body>

<h2>Progression Entry ver1.0.2</h2>
<div class="muted">
取得は「GASへ遷移→戻り」の方式（CORSなし）。ERA/Rank/Part → 取得 → コード入力 → 反映。
</div>

<div class="card">
  <div class="row">
    <button class="btn small" onclick="location.href='./index.html'">ゲームへ戻る</button>
    <button class="btn small" onclick="location.href='./songs.html'">楽曲リスト</button>
    <button class="btn small" onclick="location.href='../../index.html'">ポータル</button>
  </div>

  <div class="row">
    <div style="flex:1; min-width:180px;">
      <label>ERA</label>
      <select id="inEra">
        <option value="1970s">1970s</option>
        <option value="1980s" selected>1980s</option>
        <option value="1990s">1990s</option>
        <option value="2000s">2000s</option>
        <option value="2010s">2010s</option>
        <option value="2020s">2020s</option>
      </select>
    </div>
    <div style="flex:1; min-width:140px;">
      <label>Rank</label>
      <input id="inRank" inputmode="numeric" placeholder="例：150" />
    </div>
    <div style="flex:1; min-width:160px;">
      <label>Part</label>
      <select id="inPart">
        <option value="intro">intro</option>
        <option value="Aメロ">Aメロ</option>
        <option value="Bメロ">Bメロ</option>
        <option value="サビ">サビ</option>
      </select>
    </div>
  </div>

  <div class="row" style="margin-top:8px;">
    <button class="btn primary" id="btnLookup">取得</button>
    <button class="btn" id="btnFill">既存コードをBOXへ（任意）</button>
    <button class="btn primary" id="btnUpdate">反映（更新）</button>
    <span class="muted" id="statusMsg"></span>
  </div>
</div>

<div class="card">
  <div class="muted">取得したメタ情報（表示のみ）</div>
  <div class="metaGrid" id="metaGrid"></div>
</div>

<div class="card">
  <div class="row" style="justify-content:space-between;">
    <div class="muted">小節入力：前半(A)／後半(B)</div>
    <div class="row">
      <button class="btn small" id="btnHalfA">前半(A)</button>
      <button class="btn small" id="btnHalfB">後半(B)</button>
      <button class="btn small warn" id="btnClearBar">選択小節クリア</button>
      <button class="btn small" id="btnSwap">A⇔B入替</button>
    </div>
  </div>

  <div class="grid" id="barGrid"></div>
</div>

<div class="card">
  <div class="row">
    <div style="flex:1;">
      <div class="muted">①ルート（押すと即上書き）</div>
      <div class="kbd" id="rootPad"></div>
    </div>
  </div>
  <div style="height:10px;"></div>
  <div class="row">
    <div style="flex:1;">
      <div class="muted">②クオリティ（押すと即上書き）</div>
      <div class="kbd" id="qualPad"></div>
    </div>
  </div>

  <div style="height:10px;"></div>
  <div class="row">
    <button class="btn" id="btnBassMode">オンベース入力（/）</button>
    <button class="btn warn" id="btnBassClear">オンベース解除</button>
    <button class="btn warn" id="btnQualClear">クオリティ解除</button>
  </div>
  <div class="muted">オンベース：押す→次にルートで /Root（例：C/E）</div>
</div>

<script>
/* ===== 設定：あなたのGAS WebアプリURL ===== */
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwLyrVpKlQSAWCJXRufi1HIRBfJYVrXg1NGCeCtP9lRqM0N-8TyevnsNKoV0n8UMb1D/exec";

/* ===== State ===== */
const PLAY_BARS = 8;
const state = Array.from({length: PLAY_BARS}, () => ({
  A:{root:"",qual:"",bass:""},
  B:{root:"",qual:"",bass:""}
}));
let selectedBar = 1;
let selectedHalf = "A";
let bassMode = false;
let lastLookup = null; // {ok, action, rowIndex, meta, originalChords}

/* ===== helpers ===== */
function $(id){ return document.getElementById(id); }
function val(id){ return String($(id).value||"").trim(); }

function toast(msg){
  const d=document.createElement("div");
  d.textContent=msg;
  d.style.position="fixed";
  d.style.left="50%";
  d.style.bottom="24px";
  d.style.transform="translateX(-50%)";
  d.style.background="#111";
  d.style.color="#fff";
  d.style.padding="10px 14px";
  d.style.borderRadius="999px";
  d.style.fontSize="14px";
  d.style.opacity="0.95";
  d.style.zIndex="9999";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1400);
}

function setStatus(msg){ $("statusMsg").textContent = msg || ""; }

function esc(s){
  return String(s??"")
    .replaceAll("&","&amp;").replaceAll("<","&lt;")
    .replaceAll(">","&gt;").replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function slot(){ return state[selectedBar-1][selectedHalf]; }

function buildChordString(s){
  const r=(s.root||"").trim(), q=(s.qual||"").trim(), b=(s.bass||"").trim();
  if(!r) return "";
  let out = r + q;
  if(b) out += "/" + b;
  return out;
}
function buildBarChord(i){
  const a = buildChordString(state[i].A);
  const b = buildChordString(state[i].B);
  if(a && b) return `${a}│${b}`;
  if(a) return a;
  if(b) return b;
  return "";
}

/* ===== UI render ===== */
function renderHalfButtons(){
  $("btnHalfA").classList.toggle("primary", selectedHalf==="A");
  $("btnHalfB").classList.toggle("primary", selectedHalf==="B");
}

function renderBars(){
  const grid = $("barGrid");
  grid.innerHTML = "";
  for(let i=1;i<=PLAY_BARS;i++){
    const row=document.createElement("div");
    row.className="bar";

    const idx=document.createElement("div");
    idx.className="idx";
    idx.textContent=i;

    const aStr=buildChordString(state[i-1].A);
    const bStr=buildChordString(state[i-1].B);

    const slotA=document.createElement("div");
    slotA.className="slot"+(selectedBar===i && selectedHalf==="A" ? " active" : "");
    slotA.onclick=()=>{selectedBar=i;selectedHalf="A";bassMode=false;renderAll();};
    slotA.innerHTML=`<div class="txt">${esc(aStr||"（前半）")}</div><div class="badge">A</div>`;

    const slotB=document.createElement("div");
    slotB.className="slot"+(selectedBar===i && selectedHalf==="B" ? " active" : "");
    slotB.onclick=()=>{selectedBar=i;selectedHalf="B";bassMode=false;renderAll();};
    slotB.innerHTML=`<div class="txt">${esc(bStr||"（後半）")}</div><div class="badge">B</div>`;

    row.appendChild(idx); row.appendChild(slotA); row.appendChild(slotB);
    grid.appendChild(row);
  }
}

function renderMeta(){
  const g = $("metaGrid");
  g.innerHTML = "";
  if(!lastLookup || !lastLookup.ok){
    g.innerHTML = `<div class="muted">（未取得）</div>`;
    return;
  }
  const m = lastLookup.meta || {};
  const items = [
    ["Artist", m.Artist], ["title", m.title],
    ["words", m.words], ["music", m.music],
    ["arrange", m.arrange], ["Year", m.Year],
    ["original_key", m.original_key], ["Quiz_key", m.Quiz_key],
    ["row", lastLookup.rowIndex]
  ];
  for(const [k,v] of items){
    const div=document.createElement("div");
    div.className="metaItem";
    div.innerHTML = `<div class="k">${esc(k)}</div><div class="v">${esc(v||"")}</div>`;
    g.appendChild(div);
  }
}

function renderPads(){
  const roots=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B","D♭","E♭","G♭","A♭","B♭"];
  const rootPad=$("rootPad");
  rootPad.innerHTML="";
  roots.forEach(r=>{
    const b=document.createElement("button");
    b.className="btn";
    b.textContent=r;
    b.onclick=()=>applyRoot(r);
    rootPad.appendChild(b);
  });

  const quals=["","m","7","m7","maj7","mM7","dim","aug","sus4","m7-5","add9","9","6","m6"];
  const qualPad=$("qualPad");
  qualPad.innerHTML="";
  quals.forEach(q=>{
    const b=document.createElement("button");
    b.className="btn";
    b.textContent=(q===""?"（なし）":q);
    b.onclick=()=>applyQuality(q);
    qualPad.appendChild(b);
  });
}

function renderAll(){
  renderHalfButtons();
  renderBars();
  renderMeta();
  document.title = `Progression Entry ver1.0.2`;
}

/* ===== input actions ===== */
function setHalf(h){ selectedHalf=h; bassMode=false; renderAll(); }
function clearSelected(){ state[selectedBar-1][selectedHalf]={root:"",qual:"",bass:""}; bassMode=false; renderAll(); }
function swapHalf(){ const bar=state[selectedBar-1]; const t=bar.A; bar.A=bar.B; bar.B=t; bassMode=false; renderAll(); }

function toggleBassMode(){ bassMode=!bassMode; toast(bassMode?"オンベース：次にルート":"オンベース解除"); }
function clearBass(){ slot().bass=""; bassMode=false; renderAll(); }
function clearQuality(){ slot().qual=""; renderAll(); }

function applyRoot(root){
  const s=slot();
  if(bassMode){ s.bass=root; bassMode=false; }
  else{ s.root=root; }
  renderAll();
}
function applyQuality(q){ slot().qual=q; renderAll(); }

function parseToSlot_(chord, slotObj){
  const s = String(chord||"").trim();
  const slash = s.split("/");
  const head = (slash[0]||"").trim();
  const bass = (slash[1]||"").trim();

  const m = head.match(/^([A-G](?:#|♭|b)?)(.*)$/);
  slotObj.root = m ? m[1].replaceAll("b","♭") : "";
  slotObj.qual = m ? (m[2]||"") : "";
  slotObj.bass = bass ? bass.replaceAll("b","♭") : "";
}

function fillFromExisting(){
  if(!lastLookup || !lastLookup.ok){ toast("先に取得"); return; }
  const arr=(lastLookup.originalChords||[]).concat(["","","","","","","",""]).slice(0,8);
  for(let i=0;i<8;i++){
    state[i].A={root:"",qual:"",bass:""}; state[i].B={root:"",qual:"",bass:""};
    const raw=String(arr[i]||"").trim();
    if(!raw) continue;
    const parts=raw.split("│").map(x=>x.trim()).filter(Boolean);
    if(parts.length>=2){ parseToSlot_(parts[0],state[i].A); parseToSlot_(parts[1],state[i].B); }
    else{ parseToSlot_(raw,state[i].A); }
  }
  toast("既存コードをBOXへ");
  renderAll();
}

/* ===== Redirect flow ===== */
function lookup(){
  const era=val("inEra"), rank=val("inRank"), part=val("inPart");
  if(!era || !rank || !part){ toast("ERA/Rank/Part"); return; }
  const url = new URL(WEBAPP_URL);
  url.searchParams.set("action","lookup_redirect");
  url.searchParams.set("era", era);
  url.searchParams.set("rank", rank);
  url.searchParams.set("part", part);
  location.href = url.toString();
}

function applyUpdate(){
  if(!lastLookup || !lastLookup.ok){ toast("先に取得"); return; }
  const era=val("inEra"), rank=val("inRank"), part=val("inPart");
  const url = new URL(WEBAPP_URL);
  url.searchParams.set("action","update_redirect");
  url.searchParams.set("era", era);
  url.searchParams.set("rank", rank);
  url.searchParams.set("part", part);
  for(let i=1;i<=8;i++){
    url.searchParams.set("c"+i, buildBarChord(i-1));
  }
  location.href = url.toString();
}

function readPayloadFromHash_(){
  const h = location.hash || "";
  const m = h.match(/payload=([^&]+)/);
  if(!m) return null;
  try{
    const b64 = m[1];
    const json = decodeURIComponent(escape(atob(b64.replace(/-/g,'+').replace(/_/g,'/'))));
    return JSON.parse(json);
  }catch(e){
    return null;
  }
}

function clearHash_(){
  history.replaceState(null, "", location.pathname + location.search);
}

/* ===== wire & init ===== */
$("btnLookup").onclick = lookup;
$("btnFill").onclick = fillFromExisting;
$("btnUpdate").onclick = applyUpdate;

$("btnHalfA").onclick = ()=>setHalf("A");
$("btnHalfB").onclick = ()=>setHalf("B");
$("btnClearBar").onclick = clearSelected;
$("btnSwap").onclick = swapHalf;

$("btnBassMode").onclick = toggleBassMode;
$("btnBassClear").onclick = clearBass;
$("btnQualClear").onclick = clearQuality;

renderPads();

const payload = readPayloadFromHash_();
if(payload){
  if(payload.ok && payload.action==="lookup"){
    lastLookup = payload;
    toast(`取得OK（行 ${payload.rowIndex}）`);
    setStatus(`取得OK（行 ${payload.rowIndex}）`);
  }else if(payload.ok && payload.action==="update"){
    toast(`反映OK（行 ${payload.updatedRow}）`);
    setStatus(`反映OK（行 ${payload.updatedRow}）`);
  }else{
    toast(payload.error ? `ERROR: ${payload.error}` : "ERROR");
    setStatus(payload.error ? `ERROR: ${payload.error}` : "ERROR");
  }
  clearHash_();
}

renderAll();
</script>

</body>
</html>
