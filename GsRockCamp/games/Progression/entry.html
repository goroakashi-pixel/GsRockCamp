<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Progression Entry ver1.0.4</title>
<style>
  :root{
    --text:#111;
    --muted:#666;
    --line:#ddd;
    --bg:#fff;
    --card:#fff;
    --blue:#1d4ed8;
    --warn:#b91c1c;
    --ok:#0f766e;
    --btn-radius:14px;
    --tap-min-h:44px;
  }

  *{box-sizing:border-box;}

  body{
    font-family:-apple-system,system-ui,"Segoe UI",sans-serif;
    margin:16px;
    color:var(--text);
    background:var(--bg);
    padding-bottom:120px;
  }

  h2{
    margin:0 0 10px;
    font-size:20px;
  }

  .row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
  }

  .card{
    border:1px solid var(--line);
    border-radius:16px;
    padding:12px;
    background:var(--card);
    margin:10px 0;
  }

  label{
    font-size:13px;
    color:var(--muted);
    display:block;
    margin:8px 0 4px;
  }

  input,select{
    width:100%;
    font-size:16px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:12px;
    min-height:var(--tap-min-h);
    background:#fff;
  }

  .btn{
    min-height:var(--tap-min-h);
    padding:10px 12px;
    border-radius:var(--btn-radius);
    border:1px solid var(--line);
    background:#fff;
    font-size:16px;
    cursor:pointer;
  }

  .btn.primary{
    border:2px solid var(--blue);
    color:var(--blue);
    font-weight:700;
  }

  .btn.warn{
    border:2px solid var(--warn);
    color:var(--warn);
    font-weight:700;
  }

  .btn.ok{
    border:2px solid var(--ok);
    color:var(--ok);
    font-weight:700;
  }

  .btn.small{
    font-size:14px;
    padding:8px 10px;
    min-height:40px;
  }

  .btn[disabled]{
    opacity:0.45;
    cursor:not-allowed;
  }

  .muted{
    color:var(--muted);
    font-size:13px;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
  }

  .bar{
    display:grid;
    grid-template-columns:60px 1fr 1fr;
    gap:8px;
    align-items:stretch;
  }

  .bar .idx{
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid var(--line);
    border-radius:12px;
    background:#fafafa;
    font-weight:700;
  }

  .slot{
    border:2px solid var(--line);
    border-radius:12px;
    padding:10px 10px;
    min-height:var(--tap-min-h);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    background:#fff;
  }

  .slot.active{
    border-color:var(--blue);
    box-shadow:0 0 0 2px rgba(29,78,216,0.12);
  }

  .slot .txt{
    font-size:16px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .badge{
    font-size:12px;
    color:var(--muted);
    border:1px solid var(--line);
    padding:2px 8px;
    border-radius:999px;
    background:#f7f7f7;
    flex:0 0 auto;
  }

  .kbd{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .metaGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:10px;
  }

  .metaItem{
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 12px;
    background:#fafafa;
  }

  .metaItem .k{
    font-size:12px;
    color:var(--muted);
  }

  .metaItem .v{
    font-size:15px;
    font-weight:600;
    margin-top:4px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .previewGrid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:8px;
    margin-top:10px;
  }

  .previewItem{
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 12px;
    background:#fff;
  }

  .previewItem .k{
    font-size:12px;
    color:var(--muted);
    margin-bottom:4px;
  }

  .previewItem .v{
    font-size:15px;
    font-weight:600;
    min-height:22px;
    word-break:break-word;
  }

  .statusBox{
    margin-top:8px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:12px;
    background:#fafafa;
    font-size:14px;
  }

  .statusBox.ok{
    border-color:#99f6e4;
    background:#f0fdfa;
  }

  .statusBox.err{
    border-color:#fecaca;
    background:#fef2f2;
  }

  @media (max-width: 720px){
    .metaGrid,
    .previewGrid{
      grid-template-columns:1fr;
    }
  }
</style>
</head>

<body>

<h2>Progression Entry ver1.0.4</h2>
<div class="muted">取得は「GASへ遷移→戻り」。ERA / Rank / Part で行を取得し、8小節を入力してDBへ反映します。</div>

<div class="card">
  <div class="row">
    <button class="btn small" onclick="location.href='./index.html'">ゲームへ戻る</button>
    <button class="btn small" onclick="location.href='./songs.html'">楽曲リスト</button>
    <button class="btn small" onclick="location.href='../../index.html'">ポータル</button>
  </div>

  <div class="row">
    <div style="flex:1; min-width:180px;">
      <label>ERA</label>
      <select id="inEra">
        <option value="1970s">1970s</option>
        <option value="1980s" selected>1980s</option>
        <option value="1990s">1990s</option>
        <option value="2000s">2000s</option>
        <option value="2010s">2010s</option>
        <option value="2020s">2020s</option>
      </select>
    </div>

    <div style="flex:1; min-width:140px;">
      <label>Rank</label>
      <input id="inRank" inputmode="numeric" placeholder="例：150" />
    </div>

    <div style="flex:1; min-width:160px;">
      <label>Part</label>
      <select id="inPart">
        <option value="intro">intro</option>
        <option value="Aメロ">Aメロ</option>
        <option value="Bメロ">Bメロ</option>
        <option value="サビ">サビ</option>
      </select>
    </div>
  </div>

  <div class="row" style="margin-top:8px;">
    <button class="btn primary" id="btnLookup">取得</button>
    <button class="btn" id="btnFill">既存コードをBOXへ（任意）</button>
    <button class="btn ok" id="btnUpdate" disabled>反映（更新）</button>
  </div>

  <div id="statusBox" class="statusBox">まだ取得していません。</div>
</div>

<div class="card">
  <div class="muted">取得したメタ情報（表示のみ）</div>
  <div class="metaGrid" id="metaGrid"></div>
</div>

<div class="card">
  <div class="muted">今回反映する8小節</div>
  <div class="previewGrid" id="previewGrid"></div>
</div>

<div class="card">
  <div class="row" style="justify-content:space-between;">
    <div class="muted">小節入力：前半(A)／後半(B)</div>
    <div class="row">
      <button class="btn small" id="btnHalfA">前半(A)</button>
      <button class="btn small" id="btnHalfB">後半(B)</button>
      <button class="btn small warn" id="btnClearBar">選択小節クリア</button>
      <button class="btn small" id="btnSwap">A⇔B入替</button>
    </div>
  </div>
  <div class="grid" id="barGrid"></div>
</div>

<div class="card">
  <div class="row">
    <div style="flex:1;">
      <div class="muted">①ルート（押すと即上書き）</div>
      <div class="kbd" id="rootPad"></div>
    </div>
  </div>

  <div style="height:10px;"></div>

  <div class="row">
    <div style="flex:1;">
      <div class="muted">②クオリティ（押すと即上書き）</div>
      <div class="kbd" id="qualPad"></div>
    </div>
  </div>

  <div style="height:10px;"></div>

  <div class="row">
    <button class="btn" id="btnBassMode">オンベース入力（/）</button>
    <button class="btn warn" id="btnBassClear">オンベース解除</button>
    <button class="btn warn" id="btnQualClear">クオリティ解除</button>
  </div>

  <div class="muted">オンベース：押す → 次にルートで /Root（例：C/E）</div>
</div>

<script>
/* ===== 設定 ===== */
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwLyrVpKlQSAWCJXRufi1HIRBfJYVrXg1NGCeCtP9lRqM0N-8TyevnsNKoV0n8UMb1D/exec";
const ENTRY_VER = "ver1.0.4";

/* ===== State ===== */
const PLAY_BARS = 8;
const state = Array.from({length: PLAY_BARS}, () => ({
  A:{root:"",qual:"",bass:""},
  B:{root:"",qual:"",bass:""}
}));

let selectedBar = 1;
let selectedHalf = "A";
let bassMode = false;
let lastLookup = null;

function $(id){ return document.getElementById(id); }
function val(id){ return String($(id)?.value || "").trim(); }

function esc(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function toast(msg){
  const d = document.createElement("div");
  d.textContent = msg;
  d.style.position = "fixed";
  d.style.left = "50%";
  d.style.bottom = "24px";
  d.style.transform = "translateX(-50%)";
  d.style.background = "#111";
  d.style.color = "#fff";
  d.style.padding = "10px 14px";
  d.style.borderRadius = "999px";
  d.style.fontSize = "14px";
  d.style.opacity = "0.95";
  d.style.zIndex = "9999";
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 1400);
}

function setStatus(msg, type){
  const el = $("statusBox");
  if(!el) return;
  el.textContent = msg || "";
  el.className = "statusBox";
  if(type === "ok") el.classList.add("ok");
  if(type === "err") el.classList.add("err");
}

function currentSlot(){
  return state[selectedBar - 1][selectedHalf];
}

function buildChordString(s){
  const r = String(s.root || "").trim();
  const q = String(s.qual || "").trim();
  const b = String(s.bass || "").trim();

  if(!r) return "";

  let out = r + q;
  if(b) out += "/" + b;
  return out;
}

function buildBarChord(i){
  const a = buildChordString(state[i].A);
  const b = buildChordString(state[i].B);

  if(a && b) return `${a}│${b}`;
  if(a) return a;
  if(b) return b;
  return "";
}

function getAllBarChords(){
  return Array.from({length: PLAY_BARS}, (_, i) => buildBarChord(i));
}

function hasLookup(){
  return !!(lastLookup && lastLookup.ok);
}

function renderHalfButtons(){
  $("btnHalfA")?.classList.toggle("primary", selectedHalf === "A");
  $("btnHalfB")?.classList.toggle("primary", selectedHalf === "B");
  $("btnBassMode")?.classList.toggle("primary", bassMode);
}

function renderBars(){
  const grid = $("barGrid");
  if(!grid) return;

  grid.innerHTML = "";

  for(let i = 1; i <= PLAY_BARS; i++){
    const row = document.createElement("div");
    row.className = "bar";

    const idx = document.createElement("div");
    idx.className = "idx";
    idx.textContent = i;

    const aStr = buildChordString(state[i - 1].A);
    const bStr = buildChordString(state[i - 1].B);

    const slotA = document.createElement("div");
    slotA.className = "slot" + (selectedBar === i && selectedHalf === "A" ? " active" : "");
    slotA.onclick = () => {
      selectedBar = i;
      selectedHalf = "A";
      bassMode = false;
      renderAll();
    };
    slotA.innerHTML = `<div class="txt">${esc(aStr || "（前半）")}</div><div class="badge">A</div>`;

    const slotB = document.createElement("div");
    slotB.className = "slot" + (selectedBar === i && selectedHalf === "B" ? " active" : "");
    slotB.onclick = () => {
      selectedBar = i;
      selectedHalf = "B";
      bassMode = false;
      renderAll();
    };
    slotB.innerHTML = `<div class="txt">${esc(bStr || "（後半）")}</div><div class="badge">B</div>`;

    row.appendChild(idx);
    row.appendChild(slotA);
    row.appendChild(slotB);
    grid.appendChild(row);
  }
}

function renderMeta(){
  const g = $("metaGrid");
  if(!g) return;

  g.innerHTML = "";

  if(!hasLookup()){
    g.innerHTML = `<div class="muted">（未取得）</div>`;
    return;
  }

  const m = lastLookup.meta || {};
  const items = [
    ["ID", m.ID],
    ["row", lastLookup.rowIndex],
    ["Rank", m.Rank],
    ["number", m.number],
    ["Artist", m.Artist],
    ["title", m.title],
    ["words", m.words],
    ["music", m.music],
    ["arrange", m.arrange],
    ["Year", m.Year],
    ["original_key", m.original_key],
    ["Quiz_key", m.Quiz_key],
    ["ERA", m.ERA],
    ["Part", m.Part]
  ];

  for(const [k, v] of items){
    const div = document.createElement("div");
    div.className = "metaItem";
    div.innerHTML = `<div class="k">${esc(k)}</div><div class="v">${esc(v || "")}</div>`;
    g.appendChild(div);
  }
}

function renderPreview(){
  const g = $("previewGrid");
  if(!g) return;

  g.innerHTML = "";

  const arr = getAllBarChords();
  for(let i = 0; i < PLAY_BARS; i++){
    const div = document.createElement("div");
    div.className = "previewItem";
    div.innerHTML = `
      <div class="k">小節 ${i + 1}</div>
      <div class="v">${esc(arr[i] || "（空欄）")}</div>
    `;
    g.appendChild(div);
  }
}

function renderPads(){
  const rootPad = $("rootPad");
  const qualPad = $("qualPad");
  if(!rootPad || !qualPad) return;

  const roots = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B","D♭","E♭","G♭","A♭","B♭"];
  rootPad.innerHTML = "";
  roots.forEach(r => {
    const b = document.createElement("button");
    b.className = "btn";
    b.textContent = r;
    b.onclick = () => applyRoot(r);
    rootPad.appendChild(b);
  });

  const quals = ["","m","7","m7","maj7","mM7","dim","aug","sus4","m7-5","add9","9","6","m6"];
  qualPad.innerHTML = "";
  quals.forEach(q => {
    const b = document.createElement("button");
    b.className = "btn";
    b.textContent = (q === "" ? "（なし）" : q);
    b.onclick = () => applyQuality(q);
    qualPad.appendChild(b);
  });
}

function syncControls(){
  const canUpdate = hasLookup();
  $("btnUpdate").disabled = !canUpdate;
}

function renderAll(){
  document.title = `Progression Entry ${ENTRY_VER}`;
  renderHalfButtons();
  renderBars();
  renderMeta();
  renderPreview();
  syncControls();
}

/* ===== actions ===== */
function setHalf(h){
  selectedHalf = h;
  bassMode = false;
  renderAll();
}

function clearSelected(){
  state[selectedBar - 1][selectedHalf] = {root:"", qual:"", bass:""};
  bassMode = false;
  renderAll();
}

function swapHalf(){
  const bar = state[selectedBar - 1];
  const temp = bar.A;
  bar.A = bar.B;
  bar.B = temp;
  bassMode = false;
  renderAll();
}

function toggleBassMode(){
  bassMode = !bassMode;
  toast(bassMode ? "オンベース：次にルートを押してください" : "オンベース解除");
  renderAll();
}

function clearBass(){
  currentSlot().bass = "";
  bassMode = false;
  renderAll();
}

function clearQuality(){
  currentSlot().qual = "";
  renderAll();
}

function applyRoot(root){
  const s = currentSlot();
  if(bassMode){
    s.bass = root;
    bassMode = false;
  }else{
    s.root = root;
  }
  renderAll();
}

function applyQuality(q){
  currentSlot().qual = q;
  renderAll();
}

function parseToSlot_(chord, slotObj){
  const s = String(chord || "").trim();
  const slash = s.split("/");
  const head = (slash[0] || "").trim();
  const bass = (slash[1] || "").trim();

  const m = head.match(/^([A-G](?:#|♭|b)?)(.*)$/);

  slotObj.root = m ? m[1].replaceAll("b","♭") : "";
  slotObj.qual = m ? (m[2] || "") : "";
  slotObj.bass = bass ? bass.replaceAll("b","♭") : "";
}

function fillFromExisting(){
  if(!hasLookup()){
    toast("先に取得してください");
    return;
  }

  const arr = (lastLookup.originalChords || []).concat(["","","","","","","",""]).slice(0, 8);

  for(let i = 0; i < 8; i++){
    state[i].A = {root:"", qual:"", bass:""};
    state[i].B = {root:"", qual:"", bass:""};

    const raw = String(arr[i] || "").trim();
    if(!raw) continue;

    const parts = raw.split("│").map(x => x.trim()).filter(Boolean);

    if(parts.length >= 2){
      parseToSlot_(parts[0], state[i].A);
      parseToSlot_(parts[1], state[i].B);
    }else{
      parseToSlot_(raw, state[i].A);
    }
  }

  toast("既存コードをBOXへ入れました");
  renderAll();
}

/* ===== redirect flow ===== */
function lookup(){
  const era = val("inEra");
  const rank = val("inRank");
  const part = val("inPart");

  if(!era || !rank || !part){
    toast("ERA / Rank / Part を入れてください");
    return;
  }

  const url = new URL(WEBAPP_URL);
  url.searchParams.set("action", "lookup_redirect");
  url.searchParams.set("era", era);
  url.searchParams.set("rank", rank);
  url.searchParams.set("part", part);

  location.href = url.toString();
}

function applyUpdate(){
  if(!hasLookup()){
    toast("先に取得してください");
    return;
  }

  const era = val("inEra");
  const rank = val("inRank");
  const part = val("inPart");
  const arr = getAllBarChords();

  const url = new URL(WEBAPP_URL);
  url.searchParams.set("action", "update_redirect");
  url.searchParams.set("era", era);
  url.searchParams.set("rank", rank);
  url.searchParams.set("part", part);
  url.searchParams.set("rowIndex", String(lastLookup.rowIndex || ""));
  url.searchParams.set("recordId", String((lastLookup.meta && lastLookup.meta.ID) || ""));

  for(let i = 1; i <= 8; i++){
    url.searchParams.set("c" + i, arr[i - 1] || "");
  }

  location.href = url.toString();
}

function readPayloadFromHash_(){
  const h = location.hash || "";
  const m = h.match(/payload=([^&]+)/);
  if(!m) return null;

  try{
    const b64 = m[1];
    const json = decodeURIComponent(escape(atob(b64.replace(/-/g,'+').replace(/_/g,'/'))));
    return JSON.parse(json);
  }catch(_e){
    return null;
  }
}

function clearHash_(){
  history.replaceState(null, "", location.pathname + location.search);
}

function applyLookupToInputs(payload){
  if(!payload || !payload.meta) return;

  if(payload.meta.ERA) $("inEra").value = payload.meta.ERA;
  if(payload.meta.Rank != null) $("inRank").value = payload.meta.Rank;
  if(payload.meta.Part) $("inPart").value = payload.meta.Part;
}

document.addEventListener("DOMContentLoaded", () => {
  $("btnLookup").onclick = lookup;
  $("btnFill").onclick = fillFromExisting;
  $("btnUpdate").onclick = applyUpdate;

  $("btnHalfA").onclick = () => setHalf("A");
  $("btnHalfB").onclick = () => setHalf("B");
  $("btnClearBar").onclick = clearSelected;
  $("btnSwap").onclick = swapHalf;

  $("btnBassMode").onclick = toggleBassMode;
  $("btnBassClear").onclick = clearBass;
  $("btnQualClear").onclick = clearQuality;

  renderPads();

  const payload = readPayloadFromHash_();
  if(payload){
    if(payload.ok && payload.action === "lookup"){
      lastLookup = payload;
      applyLookupToInputs(payload);
      toast(`取得OK（行 ${payload.rowIndex}）`);
      setStatus(`取得OK：row ${payload.rowIndex} / ID ${((payload.meta && payload.meta.ID) || "なし")}`, "ok");
    }else if(payload.ok && payload.action === "update"){
      if(payload.lookup){
        lastLookup = payload.lookup;
        applyLookupToInputs(payload.lookup);
      }
      toast(`反映OK（行 ${payload.updatedRow}）`);
      setStatus(`反映OK：row ${payload.updatedRow} に保存しました。`, "ok");
    }else{
      toast(payload.error ? `ERROR: ${payload.error}` : "ERROR");
      setStatus(payload.error ? `ERROR: ${payload.error}` : "ERROR", "err");
    }

    clearHash_();
  }

  renderAll();
});
</script>

</body>
</html>
