<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Progression Entry (Tap UI)</title>
<style>
  :root{
    --text:#111;
    --muted:#666;
    --line:#ddd;
    --bg:#fff;
    --card:#fff;
    --blue:#1d4ed8;
    --warn:#b91c1c;
    --btn-radius:14px;
    --tap-min-h:44px;
  }
  body{
    font-family:-apple-system, system-ui, "Segoe UI", sans-serif;
    margin:16px;
    color:var(--text);
    background:var(--bg);
    padding-bottom:120px;
  }
  h2{ margin:0 0 10px; font-size:20px; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .card{
    border:1px solid var(--line);
    border-radius:16px;
    padding:12px;
    background:var(--card);
    margin:10px 0;
  }
  label{ font-size:13px; color:var(--muted); display:block; margin:8px 0 4px; }
  input, select, textarea{
    width:100%;
    font-size:16px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:12px;
    min-height:var(--tap-min-h);
    box-sizing:border-box;
  }
  textarea{ min-height:80px; }
  .grid{
    display:grid;
    grid-template-columns: 1fr;
    gap:8px;
  }
  .bar{
    display:grid;
    grid-template-columns: 60px 1fr 1fr;
    gap:8px;
    align-items:stretch;
  }
  .bar .idx{
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid var(--line);
    border-radius:12px;
    background:#fafafa;
    font-weight:700;
  }
  .slot{
    border:2px solid var(--line);
    border-radius:12px;
    padding:10px 10px;
    min-height:var(--tap-min-h);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    background:#fff;
  }
  .slot.active{
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(29,78,216,0.12);
  }
  .slot .txt{
    font-size:16px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .badge{
    font-size:12px;
    color:var(--muted);
    border:1px solid var(--line);
    padding:2px 8px;
    border-radius:999px;
    background:#f7f7f7;
  }
  .kbd{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .btn{
    min-height:var(--tap-min-h);
    padding:10px 12px;
    border-radius:var(--btn-radius);
    border:1px solid var(--line);
    background:#fff;
    font-size:16px;
    cursor:pointer;
  }
  .btn.primary{
    border:2px solid var(--blue);
    color:var(--blue);
    font-weight:700;
  }
  .btn.warn{
    border:2px solid var(--warn);
    color:var(--warn);
    font-weight:700;
  }
  .btn.small{ font-size:14px; padding:8px 10px; min-height:40px; }
  .muted{ color:var(--muted); font-size:13px; }
  .out{
    width:100%;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size:13px;
    line-height:1.4;
    white-space:pre;
    padding:12px;
    border:1px solid var(--line);
    border-radius:12px;
    overflow:auto;
    max-height:260px;
    background:#fbfbfb;
  }
  .splitHint{ font-size:13px; color:var(--muted); }
  .pillRow{ display:flex; gap:8px; flex-wrap:wrap; }
</style>
</head>
<body>

<h2>Progression Entry（タップ即反映）</h2>
<div class="muted">小節(A/B)を選ぶ → ルート → クオリティ。押した瞬間にBOXへ反映します（文字追加ではなく上書き）。</div>

<div class="card">
  <div class="row">
    <button class="btn small" onclick="location.href='./index.html'">ゲームへ戻る</button>
    <button class="btn small" onclick="location.href='./songs.html'">楽曲リスト</button>
    <button class="btn small" onclick="location.href='../../index.html'">ポータル</button>
  </div>

  <label>Artist</label>
  <input id="artist" placeholder="例：寺尾聰" />

  <label>Title</label>
  <input id="title" placeholder="例：ルビーの指環" />

  <div class="row">
    <div style="flex:1; min-width:180px;">
      <label>Part</label>
      <select id="part">
        <option value="intro">intro</option>
        <option value="Aメロ">Aメロ</option>
        <option value="Bメロ">Bメロ</option>
        <option value="サビ">サビ</option>
      </select>
    </div>
    <div style="flex:1; min-width:180px;">
      <label>ERA</label>
      <select id="era">
        <option value="1970s">1970s</option>
        <option value="1980s" selected>1980s</option>
        <option value="1990s">1990s</option>
        <option value="2000s">2000s</option>
        <option value="2010s">2010s</option>
        <option value="2020s">2020s</option>
      </select>
    </div>
    <div style="flex:1; min-width:140px;">
      <label>Rank</label>
      <input id="rank" inputmode="numeric" placeholder="例：150" />
    </div>
  </div>

  <div class="row">
    <div style="flex:1; min-width:180px;">
      <label>words</label>
      <input id="words" placeholder="例：松本隆" />
    </div>
    <div style="flex:1; min-width:180px;">
      <label>music</label>
      <input id="music" placeholder="例：筒美京平" />
    </div>
    <div style="flex:1; min-width:180px;">
      <label>arrange</label>
      <input id="arrange" placeholder="例：井上鑑" />
    </div>
  </div>

  <div class="row">
    <div style="flex:1; min-width:180px;">
      <label>original_key</label>
      <input id="okey" placeholder="例：E" />
    </div>
    <div style="flex:1; min-width:180px;">
      <label>Quiz_key</label>
      <input id="qkey" placeholder="例：C" value="C" />
    </div>
    <div style="flex:1; min-width:140px;">
      <label>Year</label>
      <input id="year" inputmode="numeric" placeholder="例：1981" />
    </div>
  </div>

  <label>Tag（任意：4つまで）</label>
  <div class="row">
    <input id="tag1" placeholder="Tag1" style="flex:1; min-width:160px;">
    <input id="tag2" placeholder="Tag2" style="flex:1; min-width:160px;">
    <input id="tag3" placeholder="Tag3" style="flex:1; min-width:160px;">
    <input id="tag4" placeholder="Tag4" style="flex:1; min-width:160px;">
  </div>

  <label>メモ（任意）</label>
  <textarea id="comment" placeholder="耳トレ視点の一言など"></textarea>
</div>

<div class="card">
  <div class="row" style="justify-content:space-between;">
    <div class="splitHint">小節入力：前半(A)／後半(B)</div>
    <div class="pillRow">
      <button class="btn small" id="btnHalfA" onclick="setHalf('A')">前半(A)</button>
      <button class="btn small" id="btnHalfB" onclick="setHalf('B')">後半(B)</button>
      <button class="btn small warn" onclick="clearSelected()">選択小節クリア</button>
      <button class="btn small" onclick="swapHalf()">A⇔B入替</button>
    </div>
  </div>

  <div class="grid" id="barGrid"></div>
</div>

<div class="card">
  <div class="row">
    <div style="flex:1;">
      <div class="muted">①ルート（押すと即上書き反映）</div>
      <div class="kbd" id="rootPad"></div>
    </div>
  </div>
  <div style="height:10px;"></div>
  <div class="row">
    <div style="flex:1;">
      <div class="muted">②クオリティ（押すと即上書き反映）</div>
      <div class="kbd" id="qualPad"></div>
    </div>
  </div>

  <div style="height:10px;"></div>
  <div class="row">
    <button class="btn" onclick="toggleBassMode()">オンベース入力（/）</button>
    <button class="btn warn" onclick="clearBass()">オンベース解除</button>
    <button class="btn warn" onclick="clearQuality()">クオリティ解除</button>
  </div>
  <div class="muted">オンベース：押す→次にルートを押すと /Root が付きます（例：C/E）。</div>
</div>

<div class="card">
  <div class="row">
    <button class="btn primary" onclick="generateJson()">JSON生成</button>
    <button class="btn" onclick="copyJson()">コピー</button>
    <button class="btn primary" onclick="pushToSheet()">更新（スプシへ追記）</button>
    <button class="btn" onclick="resetAll()">全部リセット</button>
  </div>
  <div style="height:10px;"></div>
  <div class="out" id="outJson">{}</div>
  <div class="muted">「更新」は Google Apps Script Webアプリを用意すると動きます（URLは下の設定）。</div>
</div>

<script>
  // ====== Settings ======
  // ここに Apps Script の WebアプリURLを入れる（後述のGASをデプロイしたURL）
  const SHEET_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwLyrVpKlQSAWCJXRufi1HIRBfJYVrXg1NGCeCtP9lRqM0N-8TyevnsNKoV0n8UMb1D/exec"; // 例: "https://script.google.com/macros/s/XXXX/exec"

  const PLAY_BARS = 8;

  // ====== State ======
  // 各スロットを「構造」で保持（文字の足し算はしない）
  const state = Array.from({length: PLAY_BARS}, () => ({
    A: {root:"", qual:"", bass:""},
    B: {root:"", qual:"", bass:""}
  }));

  let selectedBar = 1;
  let selectedHalf = "A";
  let bassMode = false; // trueの時、次のルートはbassへ入れる

  // ====== Helpers ======
  function slot(){ return state[selectedBar-1][selectedHalf]; }

  function buildChordString(slotObj){
    const r = (slotObj.root||"").trim();
    const q = (slotObj.qual||"").trim();
    const b = (slotObj.bass||"").trim();
    if(!r) return "";
    let s = r + q;
    if(b) s += "/" + b;
    return s;
  }

  function buildBarChord(i){
    const a = buildChordString(state[i].A);
    const b = buildChordString(state[i].B);
    if(a && b) return `${a}│${b}`;
    if(a) return a;
    if(b) return b;
    return "";
  }

  function setHalf(h){
    selectedHalf = h;
    bassMode = false;
    renderAll();
  }

  function swapHalf(){
    const bar = state[selectedBar-1];
    const tmp = bar.A;
    bar.A = bar.B;
    bar.B = tmp;
    bassMode = false;
    renderAll();
  }

  function clearSelected(){
    state[selectedBar-1][selectedHalf] = {root:"", qual:"", bass:""};
    bassMode = false;
    renderAll();
  }

  function clearQuality(){
    slot().qual = "";
    renderAll();
  }

  function clearBass(){
    slot().bass = "";
    bassMode = false;
    renderAll();
  }

  function toggleBassMode(){
    bassMode = !bassMode;
    toast(bassMode ? "オンベース入力：次にルートを押してください" : "オンベース入力：解除");
    renderAll();
  }

  function applyRoot(root){
    const s = slot();
    if(bassMode){
      s.bass = root; // bassは上書き
      bassMode = false;
    }else{
      s.root = root; // rootは上書き
    }
    renderAll();
  }

  function applyQuality(qual){
    // qualは上書き（押すたび置き換え）
    const s = slot();
    s.qual = qual;
    renderAll();
  }

  function escapeHtml(s){
    return String(s??"")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#39;");
  }

  function val(id){
    const el=document.getElementById(id);
    return (el && el.value!=null) ? String(el.value).trim() : "";
  }
  function numOrText(id){
    const s = val(id);
    if(s==="") return "";
    const n = Number(s);
    return Number.isFinite(n) ? n : s;
  }

  // ====== UI Render ======
  function renderBars(){
    const grid = document.getElementById("barGrid");
    grid.innerHTML = "";
    for(let i=1;i<=PLAY_BARS;i++){
      const row = document.createElement("div");
      row.className = "bar";

      const idx = document.createElement("div");
      idx.className = "idx";
      idx.textContent = i;

      const aStr = buildChordString(state[i-1].A);
      const bStr = buildChordString(state[i-1].B);

      const slotA = document.createElement("div");
      slotA.className = "slot" + (selectedBar===i && selectedHalf==="A" ? " active" : "");
      slotA.onclick = ()=>{ selectedBar=i; selectedHalf="A"; bassMode=false; renderAll(); };
      slotA.innerHTML = `<div class="txt">${escapeHtml(aStr || "（前半）")}</div><div class="badge">A</div>`;

      const slotB = document.createElement("div");
      slotB.className = "slot" + (selectedBar===i && selectedHalf==="B" ? " active" : "");
      slotB.onclick = ()=>{ selectedBar=i; selectedHalf="B"; bassMode=false; renderAll(); };
      slotB.innerHTML = `<div class="txt">${escapeHtml(bStr || "（後半）")}</div><div class="badge">B</div>`;

      row.appendChild(idx);
      row.appendChild(slotA);
      row.appendChild(slotB);
      grid.appendChild(row);
    }
  }

  function renderPads(){
    // ルート：#と♭両方入れる（入力しやすさ重視）
    const roots = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B","D♭","E♭","G♭","A♭","B♭"];
    const rootPad = document.getElementById("rootPad");
    rootPad.innerHTML = "";
    roots.forEach(r=>{
      const b=document.createElement("button");
      b.className="btn";
      b.textContent=r;
      b.onclick=()=>applyRoot(r);
      rootPad.appendChild(b);
    });

    // クオリティ：M7削除、mM7追加
    const quals = [
      "", "m", "7", "m7", "maj7", "mM7", "dim", "aug",
      "sus4", "m7-5", "add9", "9", "6", "m6"
    ];
    const qualPad = document.getElementById("qualPad");
    qualPad.innerHTML = "";
    quals.forEach(q=>{
      const b=document.createElement("button");
      b.className="btn";
      b.textContent = (q==="") ? "（なし）" : q;
      b.onclick=()=>applyQuality(q);
      qualPad.appendChild(b);
    });
  }

  function renderHalfButtons(){
    document.getElementById("btnHalfA").classList.toggle("primary", selectedHalf==="A");
    document.getElementById("btnHalfB").classList.toggle("primary", selectedHalf==="B");
  }

  function renderTitle(){
    const s = slot();
    const now = buildChordString(s);
    document.title = now ? `入力中: ${now}` : "Progression Entry (Tap UI)";
  }

  function renderAll(){
    renderBars();
    renderHalfButtons();
    renderTitle();
  }

  // ====== JSON / Copy / Push ======
  function generateJson(){
    const chords = [];
    for(let i=0;i<PLAY_BARS;i++){
      chords.push(buildBarChord(i));
    }

    const obj = {
      artist: val("artist"),
      title: val("title"),
      part: val("part"),
      ERA: val("era"),
      rank: numOrText("rank"),
      year: numOrText("year"),
      words: val("words"),
      music: val("music"),
      arrange: val("arrange"),
      original_key: val("okey"),
      quiz_key: val("qkey") || "C",
      tag1: val("tag1"),
      tag2: val("tag2"),
      tag3: val("tag3"),
      tag4: val("tag4"),
      comment: val("comment"),
      chords: chords,
      // degreesは今は空（必要になったら同様にタップUI化できます）
      degrees: ["","","","","","","",""]
    };

    document.getElementById("outJson").textContent = JSON.stringify(obj, null, 2);
    return obj;
  }

  async function copyJson(){
    const txt = document.getElementById("outJson").textContent;
    try{
      await navigator.clipboard.writeText(txt);
      toast("コピーしました");
    }catch(e){
      const ta=document.createElement("textarea");
      ta.value=txt;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      toast("コピーしました（互換モード）");
    }
  }

  async function pushToSheet(){
    const obj = generateJson();
    if(!SHEET_WEBAPP_URL){
      toast("SHEET_WEBAPP_URL が未設定です");
      return;
    }
    try{
      const r = await fetch(SHEET_WEBAPP_URL, {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(obj)
      });
      const t = await r.text();
      if(!r.ok){
        console.error(t);
        toast("更新失敗（ログ参照）");
        return;
      }
      toast("スプシに追記しました");
    }catch(e){
      console.error(e);
      toast("更新失敗（通信エラー）");
    }
  }

  function resetAll(){
    for(let i=0;i<PLAY_BARS;i++){
      state[i].A = {root:"", qual:"", bass:""};
      state[i].B = {root:"", qual:"", bass:""};
    }
    document.getElementById("outJson").textContent="{}";
    bassMode=false;
    renderAll();
  }

  function toast(msg){
    const d=document.createElement("div");
    d.textContent=msg;
    d.style.position="fixed";
    d.style.left="50%";
    d.style.bottom="24px";
    d.style.transform="translateX(-50%)";
    d.style.background="#111";
    d.style.color="#fff";
    d.style.padding="10px 14px";
    d.style.borderRadius="999px";
    d.style.fontSize="14px";
    d.style.opacity="0.95";
    d.style.zIndex="9999";
    document.body.appendChild(d);
    setTimeout(()=>{ d.remove(); }, 1400);
  }

  // init
  renderPads();
  renderAll();
</script>

</body>
</html>
