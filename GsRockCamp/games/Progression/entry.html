<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Progression Entry（取得→反映）</title>
<style>
  :root{
    --text:#111;
    --muted:#666;
    --line:#ddd;
    --bg:#fff;
    --card:#fff;
    --blue:#1d4ed8;
    --warn:#b91c1c;
    --tap-min-h:44px;
    --radius:16px;
  }
  body{
    font-family:-apple-system, system-ui, "Segoe UI", sans-serif;
    margin:16px;
    color:var(--text);
    background:var(--bg);
    padding-bottom:120px;
  }
  h2{ margin:0 0 10px; font-size:20px; }
  .muted{ color:var(--muted); font-size:13px; }
  .card{
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:12px;
    background:var(--card);
    margin:10px 0;
  }
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  label{ font-size:13px; color:var(--muted); display:block; margin:8px 0 4px; }
  input, select, textarea{
    width:100%;
    font-size:16px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:12px;
    min-height:var(--tap-min-h);
    box-sizing:border-box;
    background:#fff;
  }
  textarea{ min-height:70px; }
  .btn{
    min-height:var(--tap-min-h);
    padding:10px 12px;
    border-radius:14px;
    border:1px solid var(--line);
    background:#fff;
    font-size:16px;
    cursor:pointer;
  }
  .btn.primary{
    border:2px solid var(--blue);
    color:var(--blue);
    font-weight:700;
  }
  .btn.warn{
    border:2px solid var(--warn);
    color:var(--warn);
    font-weight:700;
  }
  .btn.small{ font-size:14px; padding:8px 10px; min-height:40px; }

  /* meta view */
  .metaGrid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:8px;
  }
  .metaItem{
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 12px;
    background:#fafafa;
  }
  .metaItem .k{ font-size:12px; color:var(--muted); }
  .metaItem .v{ font-size:15px; font-weight:600; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* bars */
  .grid{ display:grid; grid-template-columns:1fr; gap:8px; }
  .bar{
    display:grid;
    grid-template-columns: 60px 1fr 1fr;
    gap:8px;
    align-items:stretch;
  }
  .idx{
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid var(--line);
    border-radius:12px;
    background:#fafafa;
    font-weight:700;
  }
  .slot{
    border:2px solid var(--line);
    border-radius:12px;
    padding:10px 10px;
    min-height:var(--tap-min-h);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    background:#fff;
  }
  .slot.active{
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(29,78,216,0.12);
  }
  .slot .txt{
    font-size:16px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .badge{
    font-size:12px;
    color:var(--muted);
    border:1px solid var(--line);
    padding:2px 8px;
    border-radius:999px;
    background:#f7f7f7;
  }
  .kbd{ display:flex; gap:8px; flex-wrap:wrap; }
  .out{
    width:100%;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size:13px;
    line-height:1.4;
    white-space:pre;
    padding:12px;
    border:1px solid var(--line);
    border-radius:12px;
    overflow:auto;
    max-height:220px;
    background:#fbfbfb;
  }
  .hr{ margin:12px 0; border-top:1px solid var(--line); }
</style>
</head>
<body>

<h2>Progression Entry（取得→反映）</h2>
<div class="muted">
ERA / Rank / Part で「取得」→メタ表示 → コードをタップ入力 → 「反映」でスプシの original_Chord_1〜8 を更新します。
</div>

<script>
  // ===== 設定：あなたのGAS WebアプリURL =====
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwLyrVpKlQSAWCJXRufi1HIRBfJYVrXg1NGCeCtP9lRqM0N-8TyevnsNKoV0n8UMb1D/exec";
</script>

<div class="card">
  <div class="row">
    <button class="btn small" onclick="location.href='./index.html'">ゲームへ戻る</button>
    <button class="btn small" onclick="location.href='./songs.html'">楽曲リスト</button>
    <button class="btn small" onclick="location.href='../../index.html'">ポータル</button>
  </div>

  <div class="row">
    <div style="flex:1; min-width:180px;">
      <label>ERA</label>
      <select id="inEra">
        <option value="1970s">1970s</option>
        <option value="1980s" selected>1980s</option>
        <option value="1990s">1990s</option>
        <option value="2000s">2000s</option>
        <option value="2010s">2010s</option>
        <option value="2020s">2020s</option>
      </select>
    </div>
    <div style="flex:1; min-width:140px;">
      <label>Rank</label>
      <input id="inRank" inputmode="numeric" placeholder="例：150" />
    </div>
    <div style="flex:1; min-width:160px;">
      <label>Part</label>
      <select id="inPart">
        <option value="intro">intro</option>
        <option value="Aメロ">Aメロ</option>
        <option value="Bメロ">Bメロ</option>
        <option value="サビ">サビ</option>
      </select>
    </div>
  </div>

  <div class="row" style="margin-top:8px;">
    <button class="btn primary" onclick="lookup()">取得</button>
    <button class="btn" onclick="fillFromExisting()">既存コードをBOXへ（任意）</button>
    <button class="btn warn" onclick="clearAll()">クリア</button>
    <div class="muted" id="statusMsg"></div>
  </div>
</div>

<div class="card">
  <div class="muted">取得したメタ情報（表示のみ）</div>
  <div class="hr"></div>
  <div class="metaGrid" id="metaGrid"></div>
</div>

<div class="card">
  <div class="row" style="justify-content:space-between;">
    <div class="muted">小節入力：前半(A)／後半(B)　（押した瞬間にBOXへ反映）</div>
    <div class="row">
      <button class="btn small" id="btnHalfA" onclick="setHalf('A')">前半(A)</button>
      <button class="btn small" id="btnHalfB" onclick="setHalf('B')">後半(B)</button>
      <button class="btn small warn" onclick="clearSelected()">選択小節クリア</button>
      <button class="btn small" onclick="swapHalf()">A⇔B入替</button>
    </div>
  </div>

  <div class="grid" id="barGrid"></div>
</div>

<div class="card">
  <div class="row">
    <div style="flex:1;">
      <div class="muted">①ルート（押すと即上書き）</div>
      <div class="kbd" id="rootPad"></div>
    </div>
  </div>
  <div style="height:10px;"></div>
  <div class="row">
    <div style="flex:1;">
      <div class="muted">②クオリティ（押すと即上書き）</div>
      <div class="kbd" id="qualPad"></div>
    </div>
  </div>

  <div style="height:10px;"></div>
  <div class="row">
    <button class="btn" onclick="toggleBassMode()">オンベース入力（/）</button>
    <button class="btn warn" onclick="clearBass()">オンベース解除</button>
    <button class="btn warn" onclick="clearQuality()">クオリティ解除</button>
  </div>
  <div class="muted">オンベース：押す→次にルートを押すと /Root が付きます（例：C/E）。</div>
</div>

<div class="card">
  <div class="row">
    <button class="btn primary" onclick="applyUpdate()">反映（スプシ更新）</button>
    <button class="btn" onclick="preview()">プレビュー</button>
    <button class="btn" onclick="copyPreview()">コピー</button>
  </div>
  <div style="height:10px;"></div>
  <div class="out" id="outPreview">{}</div>
</div>

<script>
  // ===== State =====
  const PLAY_BARS = 8;
  const state = Array.from({length: PLAY_BARS}, () => ({
    A: {root:"", qual:"", bass:""},
    B: {root:"", qual:"", bass:""}
  }));
  let selectedBar = 1;
  let selectedHalf = "A";
  let bassMode = false;
  let lastLookup = null; // {ok,rowIndex,meta,originalChords}

  // ===== Util =====
  function $(id){ return document.getElementById(id); }
  function val(id){ return String($(id).value||"").trim(); }

  function toast(msg){
    const d=document.createElement("div");
    d.textContent=msg;
    d.style.position="fixed";
    d.style.left="50%";
    d.style.bottom="24px";
    d.style.transform="translateX(-50%)";
    d.style.background="#111";
    d.style.color="#fff";
    d.style.padding="10px 14px";
    d.style.borderRadius="999px";
    d.style.fontSize="14px";
    d.style.opacity="0.95";
    d.style.zIndex="9999";
    document.body.appendChild(d);
    setTimeout(()=>{ d.remove(); }, 1400);
  }

  function setStatus(msg){
    $("statusMsg").textContent = msg || "";
  }

  function esc(s){
    return String(s??"")
      .replaceAll("&","&amp;").replaceAll("<","&lt;")
      .replaceAll(">","&gt;").replaceAll('"',"&quot;")
      .replaceAll("'","&#39;");
  }

  function slot(){ return state[selectedBar-1][selectedHalf]; }

  function buildChordString(s){
    const r=(s.root||"").trim();
    const q=(s.qual||"").trim();
    const b=(s.bass||"").trim();
    if(!r) return "";
    let out = r + q;
    if(b) out += "/" + b;
    return out;
  }

  function buildBarChord(i){
    const a = buildChordString(state[i].A);
    const b = buildChordString(state[i].B);
    if(a && b) return `${a}│${b}`;
    if(a) return a;
    if(b) return b;
    return "";
  }

  // ===== Render =====
  function renderHalfButtons(){
    $("btnHalfA").classList.toggle("primary", selectedHalf==="A");
    $("btnHalfB").classList.toggle("primary", selectedHalf==="B");
  }

  function renderBars(){
    const grid = $("barGrid");
    grid.innerHTML = "";
    for(let i=1;i<=PLAY_BARS;i++){
      const row = document.createElement("div");
      row.className = "bar";

      const idx = document.createElement("div");
      idx.className = "idx";
      idx.textContent = i;

      const aStr = buildChordString(state[i-1].A);
      const bStr = buildChordString(state[i-1].B);

      const slotA = document.createElement("div");
      slotA.className = "slot" + (selectedBar===i && selectedHalf==="A" ? " active" : "");
      slotA.onclick = ()=>{ selectedBar=i; selectedHalf="A"; bassMode=false; renderAll(); };
      slotA.innerHTML = `<div class="txt">${esc(aStr || "（前半）")}</div><div class="badge">A</div>`;

      const slotB = document.createElement("div");
      slotB.className = "slot" + (selectedBar===i && selectedHalf==="B" ? " active" : "");
      slotB.onclick = ()=>{ selectedBar=i; selectedHalf="B"; bassMode=false; renderAll(); };
      slotB.innerHTML = `<div class="txt">${esc(bStr || "（後半）")}</div><div class="badge">B</div>`;

      row.appendChild(idx);
      row.appendChild(slotA);
      row.appendChild(slotB);
      grid.appendChild(row);
    }
  }

  function renderMeta(){
    const g = $("metaGrid");
    g.innerHTML = "";
    if(!lastLookup || !lastLookup.ok){
      g.innerHTML = `<div class="muted">（未取得）</div>`;
      return;
    }
    const m = lastLookup.meta || {};
    const items = [
      ["Artist", m.Artist], ["title", m.title],
      ["words", m.words], ["music", m.music],
      ["arrange", m.arrange], ["Year", m.Year],
      ["original_key", m.original_key], ["Quiz_key", m.Quiz_key],
      ["ID", m.ID], ["Rank", m.Rank],
      ["number", m.number], ["row", lastLookup.rowIndex]
    ];
    for(const [k,v] of items){
      const div=document.createElement("div");
      div.className="metaItem";
      div.innerHTML = `<div class="k">${esc(k)}</div><div class="v">${esc(v||"")}</div>`;
      g.appendChild(div);
    }
  }

  function renderPads(){
    const roots = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B","D♭","E♭","G♭","A♭","B♭"];
    const rootPad = $("rootPad");
    rootPad.innerHTML = "";
    roots.forEach(r=>{
      const b=document.createElement("button");
      b.className="btn";
      b.textContent=r;
      b.onclick=()=>applyRoot(r);
      rootPad.appendChild(b);
    });

    // M7は削除、mM7追加
    const quals = ["", "m", "7", "m7", "maj7", "mM7", "dim", "aug", "sus4", "m7-5", "add9", "9", "6", "m6"];
    const qualPad = $("qualPad");
    qualPad.innerHTML = "";
    quals.forEach(q=>{
      const b=document.createElement("button");
      b.className="btn";
      b.textContent = (q==="") ? "（なし）" : q;
      b.onclick=()=>applyQuality(q);
      qualPad.appendChild(b);
    });
  }

  function renderAll(){
    renderHalfButtons();
    renderBars();
    renderMeta();
    document.title = buildChordString(slot()) ? `入力中: ${buildChordString(slot())}` : "Progression Entry（取得→反映）";
  }

  // ===== UI actions =====
  function setHalf(h){
    selectedHalf = h;
    bassMode = false;
    renderAll();
  }

  function swapHalf(){
    const bar = state[selectedBar-1];
    const tmp = bar.A;
    bar.A = bar.B;
    bar.B = tmp;
    bassMode = false;
    renderAll();
  }

  function clearSelected(){
    state[selectedBar-1][selectedHalf] = {root:"", qual:"", bass:""};
    bassMode = false;
    renderAll();
  }

  function clearAll(){
    for(let i=0;i<PLAY_BARS;i++){
      state[i].A = {root:"", qual:"", bass:""};
      state[i].B = {root:"", qual:"", bass:""};
    }
    lastLookup = null;
    $("outPreview").textContent = "{}";
    setStatus("");
    bassMode=false;
    renderAll();
  }

  function clearQuality(){
    slot().qual = "";
    renderAll();
  }

  function clearBass(){
    slot().bass = "";
    bassMode = false;
    renderAll();
  }

  function toggleBassMode(){
    bassMode = !bassMode;
    toast(bassMode ? "オンベース入力：次にルートを押してください" : "オンベース入力：解除");
  }

  function applyRoot(root){
    const s = slot();
    if(bassMode){
      s.bass = root; // 上書き
      bassMode = false;
    }else{
      s.root = root; // 上書き
    }
    renderAll();
  }

  function applyQuality(qual){
    slot().qual = qual; // 上書き
    renderAll();
  }

  // ===== Lookup / Fill / Update =====
  async function lookup(){
    if(!WEBAPP_URL){
      toast("WEBAPP_URL未設定");
      return;
    }
    const era = val("inEra");
    const rank = val("inRank");
    const part = val("inPart");
    if(!era || !rank || !part){
      toast("ERA/Rank/Part を入れてください");
      return;
    }
    setStatus("取得中...");
    try{
      const url = new URL(WEBAPP_URL);
      url.searchParams.set("action","lookup");
      url.searchParams.set("era", era);
      url.searchParams.set("rank", rank);
      url.searchParams.set("part", part);

      const r = await fetch(url.toString(), { method:"GET" });
      const txt = await r.text();
      if(!r.ok){
        console.error(txt);
        setStatus("取得失敗");
        toast("取得失敗");
        return;
      }
      let data = null;
      try{ data = JSON.parse(txt); }catch(e){ data=null; }
      if(!data || data.ok !== true){
        console.error(txt);
        lastLookup = data;
        renderMeta();
        setStatus("見つかりません");
        toast("該当行なし");
        return;
      }
      lastLookup = data;
      setStatus(`取得OK（行 ${data.rowIndex}）`);
      toast("取得OK");
      renderAll();
    }catch(e){
      console.error(e);
      setStatus("取得失敗（通信）");
      toast("取得失敗（通信）");
    }
  }

  // 既存の originalChords を BOXへ展開したい時用（任意）
  function fillFromExisting(){
    if(!lastLookup || !lastLookup.ok){
      toast("先に取得してください");
      return;
    }
    const arr = (lastLookup.originalChords || []).concat(["","","","","","","",""]).slice(0,8);
    for(let i=0;i<8;i++){
      // "A│B" なら分割して入れる。それ以外はAだけに入れる。
      const raw = String(arr[i]||"").trim();
      state[i].A = {root:"", qual:"", bass:""};
      state[i].B = {root:"", qual:"", bass:""};
      if(!raw) continue;
      const parts = raw.split("│").map(x=>x.trim()).filter(Boolean);
      if(parts.length>=2){
        parseToSlot_(parts[0], state[i].A);
        parseToSlot_(parts[1], state[i].B);
      }else{
        parseToSlot_(raw, state[i].A);
      }
    }
    toast("既存コードをBOXへ反映");
    renderAll();
  }

  // chord文字列を slotに分解（簡易：root + rest / bass）
  function parseToSlot_(chord, slotObj){
    // 例: "Em7/B" "C#maj7" "F#m7-5"
    const s = String(chord||"").trim();
    const slash = s.split("/");
    const head = (slash[0]||"").trim();
    const bass = (slash[1]||"").trim();

    const m = head.match(/^([A-G](?:#|♭|b)?)(.*)$/);
    slotObj.root = m ? m[1].replaceAll("b","♭") : "";
    slotObj.qual = m ? (m[2]||"") : "";
    slotObj.bass = bass ? bass.replaceAll("b","♭") : "";
  }

  async function applyUpdate(){
    if(!WEBAPP_URL){
      toast("WEBAPP_URL未設定");
      return;
    }
    if(!lastLookup || !lastLookup.ok){
      toast("先に取得してください");
      return;
    }
    const era = val("inEra");
    const rank = val("inRank");
    const part = val("inPart");

    // 8小節ぶん組み立て
    const chords = [];
    for(let i=0;i<8;i++){
      chords.push(buildBarChord(i));
    }

    setStatus("反映中...");
    try{
      const params = new URLSearchParams();
      params.set("action","update");
      params.set("era", era);
      params.set("rank", rank);
      params.set("part", part);
      for(let i=1;i<=8;i++){
        params.set("c"+i, chords[i-1] || "");
      }

      // ★ヘッダは付けない（preflight回避）
      const r = await fetch(WEBAPP_URL, { method:"POST", body: params });
      const txt = await r.text();
      if(!r.ok){
        console.error(txt);
        setStatus("反映失敗");
        toast("反映失敗");
        return;
      }
      let data = null;
      try{ data = JSON.parse(txt); }catch(_e){ data=null; }
      if(data && data.ok === true){
        setStatus(`反映OK（行 ${data.updatedRow}）`);
        toast("反映OK");
      }else{
        console.error(txt);
        setStatus("反映失敗（応答）");
        toast("反映失敗（応答）");
      }
    }catch(e){
      console.error(e);
      setStatus("反映失敗（通信）");
      toast("反映失敗（通信）");
    }
  }

  function preview(){
    const era = val("inEra");
    const rank = val("inRank");
    const part = val("inPart");
    const chords = [];
    for(let i=0;i<8;i++){
      chords.push(buildBarChord(i));
    }
    const obj = {
      key: { era, rank, part },
      row: lastLookup ? lastLookup.rowIndex : null,
      original_Chord_1_8: chords
    };
    $("outPreview").textContent = JSON.stringify(obj, null, 2);
  }

  async function copyPreview(){
    const txt = $("outPreview").textContent;
    try{
      await navigator.clipboard.writeText(txt);
      toast("コピーしました");
    }catch(e){
      const ta=document.createElement("textarea");
      ta.value=txt;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      toast("コピーしました（互換）");
    }
  }

  // init
  renderPads();
  renderAll();
</script>

</body>
</html>
