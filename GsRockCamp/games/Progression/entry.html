<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Progression Entry ver1.3.17</title>
<style>
  :root{
    --text:#111; --muted:#666; --line:#ddd; --bg:#fff; --card:#fff;
    --blue:#1d4ed8; --warn:#b91c1c; --btn-radius:14px; --tap-min-h:44px;
  }
  body{font-family:-apple-system,system-ui,"Segoe UI",sans-serif;margin:16px;color:var(--text);background:var(--bg);padding-bottom:120px;}
  h2{margin:0 0 10px;font-size:20px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .card{border:1px solid var(--line);border-radius:16px;padding:12px;background:var(--card);margin:10px 0;}
  label{font-size:13px;color:var(--muted);display:block;margin:8px 0 4px;}
  input,select{width:100%;font-size:16px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;min-height:var(--tap-min-h);box-sizing:border-box;background:#fff;}
  .btn{min-height:var(--tap-min-h);padding:10px 12px;border-radius:var(--btn-radius);border:1px solid var(--line);background:#fff;font-size:16px;cursor:pointer;}
  .btn.primary{border:2px solid var(--blue);color:var(--blue);font-weight:700;}
  .btn.warn{border:2px solid var(--warn);color:var(--warn);font-weight:700;}
  .btn.small{font-size:14px;padding:8px 10px;min-height:40px;}
  .muted{color:var(--muted);font-size:13px;}
  .grid{display:grid;grid-template-columns:1fr;gap:6px;}
  .bar{display:grid;grid-template-columns:46px 1fr 1fr;gap:6px;align-items:stretch;}
  .bar .idx{display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:10px;background:#fafafa;font-weight:700;font-size:14px;min-height:26px;}
  .slot{border:2px solid var(--line);border-radius:10px;padding:4px 8px;min-height:26px;display:flex;align-items:center;justify-content:space-between;gap:6px;background:#fff;}
  .slot.active{border-color:var(--blue);box-shadow:0 0 0 2px rgba(29,78,216,0.12);}
  .slot.playing{border-color:#111;background:#f6f6f6;}
  .slot .txt{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .badge{font-size:11px;color:var(--muted);border:1px solid var(--line);padding:1px 6px;border-radius:999px;background:#f7f7f7;line-height:1.2;}
  .kbd{display:flex;gap:8px;flex-wrap:wrap;}
  .metaGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
  .metaItem{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fafafa;}
  .metaItem .k{font-size:12px;color:var(--muted);}
  .metaItem .v{font-size:15px;font-weight:600;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .toneBox{margin-top:8px;border:1px solid var(--line);border-radius:12px;padding:8px 10px;background:#fafafa;}
  .toneTitle{font-size:12px;color:var(--muted);margin-bottom:4px;}
  .toneValue{font-size:15px;font-weight:600;min-height:20px;}
</style>
</head>

<body>

<h2>Progression Entry ver1.3.17</h2>
<div class="muted">ERA/Rank/Part → 取得 → コード入力 → 視聴 / 反映。</div>

<div class="card">
  <div class="row">
    <button class="btn small" onclick="location.href='./index.html'">ゲームへ戻る</button>
    <button class="btn small" onclick="location.href='./songs.html'">楽曲リスト</button>
    <button class="btn small" onclick="location.href='../../index.html'">ポータル</button>
  </div>

  <div class="row">
    <div style="flex:1; min-width:180px;">
      <label>ERA</label>
      <select id="inEra">
        <option value="1970">1970</option>
        <option value="1980" selected>1980</option>
        <option value="1990">1990</option>
        <option value="2000">2000</option>
        <option value="2010">2010</option>
        <option value="2020">2020</option>
      </select>
    </div>
    <div style="flex:1; min-width:140px;">
      <label>Rank</label>
      <input id="inRank" inputmode="numeric" placeholder="例：150" />
    </div>
    <div style="flex:1; min-width:160px;">
      <label>Part</label>
      <select id="inPart">
        <option value="intro">intro</option>
        <option value="Aメロ">Aメロ</option>
        <option value="Bメロ">Bメロ</option>
        <option value="サビ">サビ</option>
      </select>
    </div>
  </div>

  <div class="row" style="margin-top:8px;">
    <button class="btn primary" id="btnLookup">取得</button>
    <button class="btn primary" id="btnUpdate">反映（更新）</button>
    <span class="muted" id="statusMsg"></span>
  </div>
</div>

<div class="card">
  <div class="muted">取得したメタ情報（表示のみ）</div>
  <div class="metaGrid" id="metaGrid"></div>
</div>

<div class="card">
  <div class="row" style="justify-content:space-between;">
    <div class="muted">小節入力：前半(A)／後半(B)</div>
    <div class="row">
      <button class="btn small" id="btnHalfA">前半(A)</button>
      <button class="btn small" id="btnHalfB">前半(B)</button>
      <button class="btn small warn" id="btnClearBar">選択小節クリア</button>
      <button class="btn small" id="btnSwap">A⇔B入替</button>
      <button class="btn small" id="btn4BarRep">4barRep.</button>
    </div>
  </div>
  <div class="grid" id="barGrid"></div>
</div>

<div class="card">
  <div class="row">
    <div style="flex:1;">
      <div class="muted">①ルート（押すと即上書き）</div>
      <div class="kbd" id="rootPad"></div>
    </div>
  </div>
  <div style="height:10px;"></div>
  <div class="row">
    <div style="flex:1;">
      <div class="muted">②クオリティ（押すと即上書き）</div>
      <div class="kbd" id="qualPad"></div>
    </div>
  </div>
  <div style="height:10px;"></div>
  <div class="row">
    <button class="btn" id="btnBassMode">オンベース入力（/）</button>
    <button class="btn warn" id="btnBassClear">オンベース解除</button>
    <button class="btn warn" id="btnQualClear">クオリティ解除</button>
  </div>
  <div class="muted">オンベース：押す→次にルートで /Root（例：C/E）</div>

  <div class="toneBox">
    <div class="toneTitle">構成音（選択中スロット）</div>
    <div class="toneValue" id="toneInfo">—</div>
  </div>

  <div class="row" style="margin-top:10px;">
    <button class="btn" id="btnPreview">視聴</button>
    <button class="btn warn" id="btnReset">リセット</button>
  </div>
</div>

<script>
/* ===== 設定 ===== */
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwLyrVpKlQSAWCJXRufi1HIRBfJYVrXg1NGCeCtP9lRqM0N-8TyevnsNKoV0n8UMb1D/exec";
const ENTRY_VER = "1.3.17";

/* ===== util ===== */
function $(id){ return document.getElementById(id); }
function val(id){ return String($(id)?.value || "").trim(); }
function setStatus(msg){ const el = $("statusMsg"); if(el) el.textContent = msg || ""; }
function esc(s){
  return String(s??"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}
function toast(msg){
  const d=document.createElement("div");
  d.textContent=msg;
  d.style.position="fixed";
  d.style.left="50%";
  d.style.bottom="24px";
  d.style.transform="translateX(-50%)";
  d.style.background="#111";
  d.style.color="#fff";
  d.style.padding="10px 14px";
  d.style.borderRadius="999px";
  d.style.fontSize="14px";
  d.style.opacity="0.95";
  d.style.zIndex="9999";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1400);
}

/* ===== Part → number ===== */
const PART_TO_NUMBER = {
  "intro": "1",
  "Aメロ": "2",
  "Bメロ": "3",
  "サビ": "4"
};

function selectedNumber_(){
  return PART_TO_NUMBER[String(val("inPart") || "").trim()] || "";
}

/* ===== State ===== */
const PLAY_BARS = 8;
const state = Array.from({length:PLAY_BARS},()=>({A:{root:"",qual:"",bass:""},B:{root:"",qual:"",bass:""}}));
let selectedBar = 1, selectedHalf = "A", bassMode = false;
let lastLookup = null;
let requestSeq = 0;

/* ===== audio ctx ===== */
const ctx = new (window.AudioContext || window.webkitAudioContext)();

/* ===== audio ===== */
function urlForFetch(url){
  return String(url).replaceAll("#","%23");
}

async function loadBuffer(url){
  const r = await fetch(urlForFetch(url));
  if(!r.ok) throw new Error(`fetch failed: ${url}`);
  const a = await r.arrayBuffer();
  return await ctx.decodeAudioData(a);
}

let buf = {};
let bufferErrors = {};
let activeSources = [];

function markBufferError(name){
  bufferErrors[name] = true;
}

async function safeLoadBuffer(key, url){
  try{
    buf[key] = await loadBuffer(url);
  }catch(e){
    console.error(e);
    markBufferError(key);
  }
}

async function prepareAudioForGesture(){
  if(ctx.state === "suspended") await ctx.resume();
  if(!buf.kick || !buf.pianoC || !buf.bassC){
    await Promise.all([
      safeLoadBuffer("kick", "./audio/drums/kick.wav"),
      safeLoadBuffer("snare", "./audio/drums/snare.wav"),
      safeLoadBuffer("hihat", "./audio/drums/hihat.wav"),
      safeLoadBuffer("pianoC", "./audio/piano/C.wav"),
      safeLoadBuffer("bassC", "./audio/bass/C.wav")
    ]);
  }
}

function playBuf(buffer, when, gain=1, rate=1){
  if(!buffer) return null;
  const src = ctx.createBufferSource();
  const g = ctx.createGain();
  src.buffer = buffer;
  src.playbackRate.value = rate;
  g.gain.value = gain;
  src.connect(g).connect(ctx.destination);
  src.start(when);
  activeSources.push(src);
  return { src, g };
}

function stopPreview(){
  activeSources.forEach(s=>{ try{ s.stop(0); }catch(_e){} });
  activeSources = [];
  $("btnPreview").textContent = "視聴";
  previewRunId++;
  clearPlayingSlots_();
}

function resetAll(){
  stopPreview();
  for(let i=0;i<PLAY_BARS;i++){
    state[i].A = {root:"",qual:"",bass:""};
    state[i].B = {root:"",qual:"",bass:""};
  }
  selectedBar = 1;
  selectedHalf = "A";
  bassMode = false;
  renderAll();
}

function slot(){ return state[selectedBar-1][selectedHalf]; }

function buildChordString(s){
  const r=(s.root||"").trim();
  const q=(s.qual||"").trim();
  const b=(s.bass||"").trim();
  if(!r) return "";
  let out = r + q;
  if(b) out += "/" + b;
  return out;
}

function buildBarChord(i){
  const a=buildChordString(state[i].A);
  const b=buildChordString(state[i].B);
  if(a && b) return `${a}│${b}`;
  if(a) return a;
  if(b) return b;
  return "";
}

function renderHalfButtons(){
  $("btnHalfA")?.classList.toggle("primary", selectedHalf==="A");
  $("btnHalfB")?.classList.toggle("primary", selectedHalf==="B");
}

function renderBars(){
  const grid = $("barGrid");
  if(!grid) return;
  grid.innerHTML = "";
  for(let i=1;i<=PLAY_BARS;i++){
    const row = document.createElement("div");
    row.className = "bar";

    const idx = document.createElement("div");
    idx.className = "idx";
    idx.textContent = i;

    const aStr = buildChordString(state[i-1].A);
    const bStr = buildChordString(state[i-1].B);

    const slotA = document.createElement("div");
    slotA.className = "slot" + (selectedBar===i && selectedHalf==="A" ? " active" : "");
    slotA.dataset.bar = String(i);
    slotA.dataset.half = "A";
    slotA.onclick = ()=>{
      selectedBar=i;
      selectedHalf="A";
      bassMode=false;
      renderAll();
    };
    slotA.innerHTML = `<div class="txt">${esc(aStr || "（前半）")}</div><div class="badge">A</div>`;

    const slotB = document.createElement("div");
    slotB.className = "slot" + (selectedBar===i && selectedHalf==="B" ? " active" : "");
    slotB.dataset.bar = String(i);
    slotB.dataset.half = "B";
    slotB.onclick = ()=>{
      selectedBar=i;
      selectedHalf="B";
      bassMode=false;
      renderAll();
    };
    slotB.innerHTML = `<div class="txt">${esc(bStr || "（後半）")}</div><div class="badge">B</div>`;

    row.appendChild(idx);
    row.appendChild(slotA);
    row.appendChild(slotB);
    grid.appendChild(row);
  }
}

function renderMeta(){
  const g = $("metaGrid");
  if(!g) return;
  g.innerHTML = "";

  if(!lastLookup || !lastLookup.ok){
    g.innerHTML = `<div class="muted">（未取得）</div>`;
    return;
  }

  const m = lastLookup.meta || {};
  const items = [
    ["Artist", m.Artist],
    ["title", m.title],
    ["words", m.words],
    ["music", m.music],
    ["arrange", m.arrange],
    ["Year", m.Year],
    ["original_key", m.original_key],
    ["Quiz_key", m.Quiz_key],
    ["number", m.number],
    ["Part", m.Part],
    ["row", lastLookup.rowIndex]
  ];

  for(const [k,v] of items){
    const div = document.createElement("div");
    div.className = "metaItem";
    div.innerHTML = `<div class="k">${esc(k)}</div><div class="v">${esc(v || "")}</div>`;
    g.appendChild(div);
  }
}

function renderPads(){
  const rootPad = $("rootPad");
  const qualPad = $("qualPad");
  if(!rootPad || !qualPad) return;

  const roots = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B","D♭","E♭","G♭","A♭","B♭"];
  rootPad.innerHTML = "";
  roots.forEach(r=>{
    const b=document.createElement("button");
    b.className="btn";
    b.textContent=r;
    b.onclick=()=>applyRoot(r);
    rootPad.appendChild(b);
  });

  const quals = ["","m","7","m7","maj7","mM7","dim","aug","sus4","m7-5","add9","9","6","m6"];
  qualPad.innerHTML = "";
  quals.forEach(q=>{
    const b=document.createElement("button");
    b.className="btn";
    b.textContent=(q===""?"（なし）":q);
    b.onclick=()=>applyQuality(q);
    qualPad.appendChild(b);
  });
}

function pcIndex(name){
  const pcs = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  return pcs.indexOf(name);
}

function idxToPc(i){
  const pcs = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  return pcs[(i%12+12)%12];
}

function normalizeAccidentalRoot(root){
  const map = {
    "Cb":"B",
    "Db":"C#", "D♭":"C#",
    "Eb":"D#", "E♭":"D#",
    "Fb":"E",
    "Gb":"F#", "G♭":"F#",
    "Ab":"G#", "A♭":"G#",
    "Bb":"A#", "B♭":"A#",
    "E#":"F",
    "B#":"C"
  };
  return map[root] || root;
}

function parseChordSymbol(sym){
  sym = String(sym||"").trim();
  const slashSplit = sym.split("/");
  const baseSym = (slashSplit[0]||"").trim();
  const slashBass = slashSplit[1] ? String(slashSplit[1]).trim() : "";
  const m = baseSym.match(/^([A-G](?:[#b♭])?)(.*)$/);
  const root = m ? m[1] : "C";
  const rest = m ? (m[2]||"") : "";
  return {
    root: normalizeAccidentalRoot(root.replaceAll("♭","b")),
    quality: rest,
    bass: slashBass ? normalizeAccidentalRoot(slashBass.replaceAll("♭","b")) : ""
  };
}

function getChordTones(sym){
  const p = parseChordSymbol(sym);
  const rootIdx = pcIndex(p.root);
  if(rootIdx < 0) return [];

  let intervals = [0,4,7];
  const q = p.quality;

  if(q === "m") intervals = [0,3,7];
  else if(q === "7") intervals = [0,4,7,10];
  else if(q === "m7") intervals = [0,3,7,10];
  else if(q === "maj7") intervals = [0,4,7,11];
  else if(q === "mM7") intervals = [0,3,7,11];
  else if(q === "dim") intervals = [0,3,6];
  else if(q === "aug") intervals = [0,4,8];
  else if(q === "sus4") intervals = [0,5,7];
  else if(q === "m7-5") intervals = [0,3,6,10];
  else if(q === "add9") intervals = [0,4,7,14];
  else if(q === "9") intervals = [0,4,7,10,14];
  else if(q === "6") intervals = [0,4,7,9];
  else if(q === "m6") intervals = [0,3,7,9];

  const tones = intervals.map(n => idxToPc(rootIdx + n));
  if(p.bass){
    const bassNorm = p.bass;
    return [bassNorm, ...tones.filter(t => t !== bassNorm)];
  }
  return tones;
}

function renderToneInfo(){
  const el = $("toneInfo");
  if(!el) return;
  const sym = buildChordString(slot());
  if(!sym){
    el.textContent = "—";
    return;
  }
  const tones = getChordTones(sym);
  el.textContent = tones.length ? `${sym} → ${tones.join(" / ")}` : sym;
}

function renderAll(){
  renderHalfButtons();
  renderBars();
  renderMeta();
  renderToneInfo();
  document.title="Progression Entry ver1.3.17";
}

function setHalf(h){ selectedHalf=h; bassMode=false; renderAll(); }
function clearSelected(){ state[selectedBar-1][selectedHalf]={root:"",qual:"",bass:""}; bassMode=false; renderAll(); }
function swapHalf(){ const bar=state[selectedBar-1]; const t=bar.A; bar.A=bar.B; bar.B=t; bassMode=false; renderAll(); }

function fourBarRepeat(){
  for(let i=0;i<4;i++){
    state[i+4].A = { ...state[i].A };
    state[i+4].B = { ...state[i].B };
  }
  renderAll();
}

function toggleBassMode(){ bassMode=!bassMode; toast(bassMode?"オンベース：次にルート":"オンベース解除"); }
function clearBass(){ slot().bass=""; bassMode=false; renderAll(); }
function clearQuality(){ slot().qual=""; renderAll(); }

function applyRoot(root){
  const s=slot();
  if(bassMode){
    s.bass=root;
    bassMode=false;
  } else {
    s.root=root;
  }
  renderAll();
}

function applyQuality(q){
  slot().qual=q;
  renderAll();
}

function parseToSlot_(chord, slotObj){
  const s=String(chord||"").trim();
  const slash=s.split("/");
  const head=(slash[0]||"").trim();
  const bass=(slash[1]||"").trim();
  const m=head.match(/^([A-G](?:#|♭|b)?)(.*)$/);
  slotObj.root = m ? m[1].replaceAll("b","♭") : "";
  slotObj.qual = m ? (m[2]||"") : "";
  slotObj.bass = bass ? bass.replaceAll("b","♭") : "";
}

function fillFromExistingAuto_(payload){
  const arr=(payload.originalChords||[]).concat(["","","","","","","",""]).slice(0,8);
  for(let i=0;i<8;i++){
    state[i].A={root:"",qual:"",bass:""};
    state[i].B={root:"",qual:"",bass:""};
    const raw=String(arr[i]||"").trim();
    if(!raw) continue;
    const parts=raw.split("│").map(x=>x.trim()).filter(Boolean);
    if(parts.length>=2){
      parseToSlot_(parts[0],state[i].A);
      parseToSlot_(parts[1],state[i].B);
    }else{
      parseToSlot_(raw,state[i].A);
    }
  }
}

function cleanupJsonp_(callbackName, scriptEl){
  try{ if(scriptEl && scriptEl.parentNode) scriptEl.parentNode.removeChild(scriptEl); }catch(_e){}
  try{ delete window[callbackName]; }catch(_e){ window[callbackName]=undefined; }
}

function jsonpRequest_(params, onDone){
  requestSeq += 1;
  const callbackName = "__grc_jsonp_" + requestSeq;
  const url = new URL(WEBAPP_URL);
  Object.keys(params).forEach(key => url.searchParams.set(key, params[key]));
  url.searchParams.set("callback", callbackName);
  url.searchParams.set("_", String(Date.now()));

  const script = document.createElement("script");

  window[callbackName] = function(payload){
    cleanupJsonp_(callbackName, script);
    onDone(payload);
  };

  script.onerror = function(){
    cleanupJsonp_(callbackName, script);
    onDone({ ok:false, error:"network error" });
  };

  script.src = url.toString();
  document.body.appendChild(script);
}

/* data flow */
function lookup(){
  const era=val("inEra"), rank=val("inRank"), part=val("inPart"), number=selectedNumber_();
  if(!era || !rank || !part || !number){ toast("ERA/Rank/Part"); return; }

  setStatus("取得中...");
  jsonpRequest_(
    { action:"lookup_jsonp", era, rank, number },
    function(payload){
      if(payload && payload.ok && payload.action==="lookup"){
        lastLookup = payload;
        fillFromExistingAuto_(payload);
        toast(`取得OK（行 ${payload.rowIndex}）`);
        setStatus(`取得OK（行 ${payload.rowIndex}）`);
      }else{
        toast(payload && payload.error ? `ERROR: ${payload.error}` : "ERROR");
        setStatus(payload && payload.error ? `ERROR: ${payload.error}` : "ERROR");
      }
      renderAll();
    }
  );
}

function applyUpdate(){
  if(!lastLookup || !lastLookup.ok){ toast("先に取得"); return; }

  const era=val("inEra"), rank=val("inRank"), part=val("inPart"), number=selectedNumber_();
  const params={ action:"update_jsonp", era, rank, number };
  for(let i=1;i<=8;i++) params["c"+i]=buildBarChord(i-1);

  setStatus("反映中...");
  jsonpRequest_(
    params,
    function(payload){
      if(payload && payload.ok && payload.action==="update"){
        toast(`反映OK（行 ${payload.updatedRow}）`);
        setStatus(`反映OK（行 ${payload.updatedRow}）`);
      }else{
        toast(payload && payload.error ? `ERROR: ${payload.error}` : "ERROR");
        setStatus(payload && payload.error ? `ERROR: ${payload.error}` : "ERROR");
      }
      renderAll();
    }
  );
}

/* ===== preview logic ===== */
function getLastFilledBarIndex_(){
  for(let i=PLAY_BARS-1;i>=0;i--){
    if(buildBarChord(i)) return i;
  }
  return -1;
}

function getBarSegments(barText){
  const raw = String(barText || "").trim();
  if(!raw) return [];
  const segs = raw.split("│").map(s => s.trim()).filter(Boolean);
  return segs.length ? segs : [raw];
}

function clearPlayingSlots_(){
  document.querySelectorAll(".slot.playing").forEach(el=>el.classList.remove("playing"));
}

function markPlayingSlot_(barIndex, half){
  clearPlayingSlots_();
  const el = document.querySelector(`.slot[data-bar="${barIndex+1}"][data-half="${half}"]`);
  if(el) el.classList.add("playing");
}

function semitoneFromC(pc){
  const p = normalizeAccidentalRoot(String(pc || "").replaceAll("♭","b"));
  const map = { C:0, "C#":1, D:2, "D#":3, E:4, F:5, "F#":6, G:7, "G#":8, A:9, "A#":10, B:11 };
  return map[p] ?? 0;
}

function rateFromPc(pc){
  return Math.pow(2, semitoneFromC(pc) / 12);
}

function playOneShot_(buffer, when, gainValue=1, rate=1, stopAfter=null){
  if(!buffer) return null;
  const src = ctx.createBufferSource();
  const gain = ctx.createGain();
  src.buffer = buffer;
  src.playbackRate.value = rate;
  gain.gain.value = gainValue;
  src.connect(gain).connect(ctx.destination);
  src.start(when);
  if(stopAfter != null){
    try{ src.stop(when + stopAfter); }catch(_e){}
  }
  activeSources.push(src);
  return { src, gain };
}

function scheduleDrums_(baseTime, barDur, isLastBar){
  if(buf.kick){
    playOneShot_(buf.kick, baseTime + 0.00, 0.9);
    playOneShot_(buf.kick, baseTime + 1.00, 0.9);
  }
  if(buf.snare){
    playOneShot_(buf.snare, baseTime + 0.50, 0.8);
    if(!isLastBar) playOneShot_(buf.snare, baseTime + 1.50, 0.8);
  }
  if(buf.hihat){
    for(let k=0;k<8;k++){
      const t = baseTime + 0.25*k;
      if(isLastBar && t >= baseTime + 1.5) break;
      playOneShot_(buf.hihat, t, 0.35);
    }
  }
}

function scheduleChord_(sym, when, dur, isLastSegment){
  const tones = getChordTones(sym);
  if(!tones.length) return;

  const stopAfter = isLastSegment ? Math.max(0.01, dur - 0.03) : null;
  const fadeStart = isLastSegment ? (when + Math.max(0.01, dur - 0.08)) : null;
  const stopAt = isLastSegment ? (when + Math.max(0.01, dur - 0.03)) : null;

  tones.forEach((pc, idx)=>{
    const rate = rateFromPc(pc);
    const bassLike = (idx===0);
    const node = playOneShot_(bassLike ? buf.bassC : buf.pianoC, when, bassLike ? 0.72 : 0.30, rate, stopAfter);
    if(node && isLastSegment && fadeStart != null && stopAt != null){
      try{
        node.gain.gain.setValueAtTime(node.gain.gain.value, fadeStart);
        node.gain.gain.linearRampToValueAtTime(0.0001, stopAt);
      }catch(_e){}
    }
  });
}

let previewRunId = 0;

async function previewPlay(){
  const lastFilledBar = getLastFilledBarIndex_();
  if(lastFilledBar < 0){
    toast("コード未入力");
    return;
  }

  if($("btnPreview").textContent==="停止"){
    stopPreview();
    return;
  }

  await prepareAudioForGesture();
  stopPreview();

  const runId = ++previewRunId;
  $("btnPreview").textContent="停止";

  let t = ctx.currentTime + 0.1;
  let bar = 2.0;

  for(let i=0;i<=lastFilledBar;i++){
    const baseTime = t + bar*i;
    const isLastBar = (i===lastFilledBar);
    const barText = buildBarChord(i);
    const segs = getBarSegments(barText);

    if(!String(barText||"").trim()) continue;

    scheduleDrums_(baseTime, bar, isLastBar);

    if(segs.length===1){
      const sym = segs[0];
      scheduleChord_(sym, baseTime, isLastBar ? 1.5 : 2.0, isLastBar);
      setTimeout(()=>{
        if(previewRunId!==runId) return;
        markPlayingSlot_(i, "A");
      }, Math.max(0, (baseTime - ctx.currentTime) * 1000));
    }else{
      const durA = 1.0;
      const durB = isLastBar ? 0.5 : 1.0;

      scheduleChord_(segs[0], baseTime, durA, false);
      scheduleChord_(segs[1], baseTime + 1.0, durB, isLastBar);

      setTimeout(()=>{
        if(previewRunId!==runId) return;
        markPlayingSlot_(i, "A");
      }, Math.max(0, (baseTime - ctx.currentTime) * 1000));

      setTimeout(()=>{
        if(previewRunId!==runId) return;
        markPlayingSlot_(i, "B");
      }, Math.max(0, (baseTime + 1.0 - ctx.currentTime) * 1000));
    }
  }

  const totalDur = bar * (lastFilledBar + 1) - 0.5;
  setTimeout(()=>{
    if(previewRunId!==runId) return;
    stopPreview();
  }, Math.max(0, totalDur * 1000 + 150));
}

document.addEventListener("DOMContentLoaded", ()=>{
  $("btnLookup").onclick = lookup;
  $("btnUpdate").onclick = applyUpdate;

  $("btnHalfA").onclick = ()=>setHalf("A");

  $("btnBassMode").onclick = toggleBassMode;
  $("btnBassClear").onclick = clearBass;
  $("btnQualClear").onclick = clearQuality;

  $("btnPreview").onclick = previewPlay;
  $("btnReset").onclick = resetAll;

  renderPads();
  renderAll();
});
