<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entry Tool (ERA + Rank + Part) ver1.0.0</title>

  <style>
    :root{
      --text:#111;
      --muted:#666;
      --line:#ddd;
      --bg:#fff;
      --card:#fff;
      --blue:#1d4ed8;
      --warn:#b91c1c;
      --ok:#166534;

      --btn-bg:#fff;
      --btn-on-border: 2px solid var(--blue);
      --btn-off-border: 1px solid var(--line);
      --btn-radius: 14px;

      --tap-min-h: 44px;

      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    body{
      font-family:-apple-system, system-ui, "Segoe UI", sans-serif;
      margin:16px;
      color:var(--text);
      background:var(--bg);
      padding-bottom:120px;
    }

    h1{
      font-size:20px;
      margin:0 0 10px;
      letter-spacing:0.2px;
    }

    .sub{
      color:var(--muted);
      font-size:13px;
      margin-bottom:14px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
      max-width: 980px;
    }

    .card{
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--card);
      padding:14px;
    }

    .row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:flex-end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:160px;
      flex:1;
    }
    .field.small{ min-width:120px; flex:0 0 120px;}
    .field.mid{ min-width:180px; flex:0 0 180px;}
    .field.long{ min-width:260px; flex:1 1 260px;}

    label{
      font-size:12px;
      color:var(--muted);
    }

    input, select, textarea{
      min-height: var(--tap-min-h);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:16px;
      background:#fff;
      color:var(--text);
      outline:none;
    }
    textarea{
      min-height:80px;
      resize:vertical;
    }
    input[readonly], textarea[readonly]{
      background:#fafafa;
      color:#333;
    }

    .btns{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }
    button{
      min-height: var(--tap-min-h);
      padding:10px 14px;
      border-radius: var(--btn-radius);
      border: var(--btn-off-border);
      background: var(--btn-bg);
      font-size:14px;
      cursor:pointer;
      user-select:none;
    }
    button.primary{
      border: var(--btn-on-border);
      color: var(--blue);
      font-weight:600;
    }
    button.danger{
      border: 2px solid var(--warn);
      color: var(--warn);
      font-weight:600;
    }
    button:disabled{
      opacity:0.55;
      cursor:not-allowed;
    }

    .status{
      font-size:13px;
      color:var(--muted);
      margin-top:8px;
      line-height:1.4;
    }
    .status.ok{ color:var(--ok); }
    .status.warn{ color:var(--warn); }

    .chords{
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap:10px;
    }
    @media (max-width: 760px){
      .chords{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    .chordBox{
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      background:#fff;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .chordBox .idx{
      font-size:12px;
      color:var(--muted);
    }
    .chordBox input{
      font-family: var(--mono);
      letter-spacing:0.2px;
    }

    .help{
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
      margin-top:8px;
    }

    .kbd{
      font-family: var(--mono);
      font-size:12px;
      border:1px solid var(--line);
      border-bottom-width:2px;
      padding:2px 6px;
      border-radius:6px;
      background:#fff;
      color:#222;
    }

    .split{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }
    @media (max-width: 900px){
      .split{ grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <h1>Entry Tool（ERA＋Rank＋Part）</h1>
  <div class="sub">
    既存行を呼び出して、コード（進行）だけ入力 → 保存でスプシ更新します。
  </div>

  <div class="grid">

    <!-- 1) Key + Load -->
    <div class="card">
      <div class="row">
        <div class="field small">
          <label>ERA</label>
          <input id="era" inputmode="numeric" placeholder="例：1990" />
        </div>
        <div class="field small">
          <label>Rank</label>
          <input id="rank" inputmode="numeric" placeholder="例：18" />
        </div>
        <div class="field mid">
          <label>Part</label>
          <select id="part">
            <option value="">選択</option>
            <option>intro</option>
            <option>Aメロ</option>
            <option>Bメロ</option>
            <option>サビ</option>
            <option>ブリッジ</option>
            <option>間奏</option>
            <option>アウトロ</option>
            <option>その他</option>
          </select>
        </div>

        <div class="btns">
          <button class="primary" id="btnLoad">呼び出す</button>
          <button id="btnClear">入力クリア</button>
        </div>
      </div>

      <div class="help">
        ショートカット：<span class="kbd">Ctrl</span>+<span class="kbd">Enter</span> で保存（Macは ⌘+Enter）
      </div>

      <div id="status" class="status">待機中</div>
    </div>

    <!-- 2) Metadata (read-only) + Notes -->
    <div class="card">
      <div class="split">
        <div>
          <div class="row">
            <div class="field long">
              <label>Artist（読取）</label>
              <input id="metaArtist" readonly />
            </div>
            <div class="field long">
              <label>Title（読取）</label>
              <input id="metaTitle" readonly />
            </div>
          </div>
          <div class="row">
            <div class="field mid">
              <label>Key（読取）</label>
              <input id="metaKey" readonly />
            </div>
            <div class="field mid">
              <label>ID（不偏・読取）</label>
              <input id="metaId" readonly />
            </div>
            <div class="field long">
              <label>Comment / Memo（読取）</label>
              <input id="metaMemo" readonly />
            </div>
          </div>
          <div class="help">
            ※ここは “確認用” で編集しません。編集するのは下のコードだけ。
          </div>
        </div>

        <div>
          <div class="field">
            <label>入力メモ（任意：保存対象にしたいならGAS側で反映）</label>
            <textarea id="note" placeholder="例：ここ、Aメロ2回目と同じ／代理コード候補…"></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- 3) Chord Inputs -->
    <div class="card">
      <div class="row" style="justify-content:space-between; align-items:center;">
        <div>
          <div style="font-weight:700; margin-bottom:4px;">コード入力</div>
          <div class="help">Tabで次へ。空欄OK。表記はDBルールに合わせてそのまま入れてください（勝手に変換しません）。</div>
        </div>
        <div class="btns">
          <button id="btnPasteBar">「｜」区切り貼り付け</button>
          <button id="btnCopyBar">「｜」区切りコピー</button>
        </div>
      </div>

      <div class="chords" id="chords"></div>

      <div class="help">
        「｜A｜Bm7｜E7｜A｜」みたいな貼り付けもOK（上のボタンを使用）。
      </div>
    </div>

    <!-- 4) Save -->
    <div class="card">
      <div class="row">
        <div class="btns">
          <button class="primary" id="btnSave" disabled>保存（スプシ更新）</button>
          <button class="danger" id="btnResetMeta" disabled>呼び出し解除</button>
        </div>
      </div>
      <div class="help">
        保存は「ERA＋Rank＋Part」で該当行を特定し、コード列を上書きします。
      </div>
    </div>

  </div>

<script>
/**
 * =========================
 *  設定：GAS WebApp URL
 * =========================
 * Google Apps Script を「ウェブアプリとして導入」したURLを貼ってください。
 *
 * 必要なAPI契約（推奨）：
 * 1) GET  : ?action=get&era=1990&rank=18&part=Aメロ
 *    => { ok:true, row:{ id, artist, title, key, memo, chords:[... up to 8] } }
 *
 * 2) POST : { action:"update", era, rank, part, chords:[...], note:"..." }
 *    => { ok:true, updated:true }
 */
const GAS_URL = "PASTE_YOUR_GAS_WEBAPP_URL_HERE"; // ★ここ差し替え

// chord input count
const CHORD_SLOTS = 8;

// state
let loadedRow = null;

const $ = (id) => document.getElementById(id);
const statusEl = $("status");

function setStatus(msg, kind=""){
  statusEl.className = "status" + (kind ? " " + kind : "");
  statusEl.textContent = msg;
}

function normalizeKey(s){
  return (s ?? "").toString().trim();
}

function canLoad(){
  return normalizeKey($("era").value) && normalizeKey($("rank").value) && normalizeKey($("part").value);
}

function ensureGasUrl(){
  return GAS_URL && GAS_URL.startsWith("http");
}

function buildChordInputs(){
  const wrap = $("chords");
  wrap.innerHTML = "";
  for(let i=1;i<=CHORD_SLOTS;i++){
    const box = document.createElement("div");
    box.className = "chordBox";
    box.innerHTML = `
      <div class="idx">Chord ${i}</div>
      <input id="ch${i}" placeholder="例：A / Bm7 / F#7 / CM7 ..." />
    `;
    wrap.appendChild(box);
  }

  // tab behavior: enter = next, shift+enter = prev
  for(let i=1;i<=CHORD_SLOTS;i++){
    const el = $("ch"+i);
    el.addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){
        e.preventDefault();
        const next = e.shiftKey ? i-1 : i+1;
        const target = $("ch"+next);
        if(target) target.focus();
      }
    });
  }
}

function clearInputsOnly(){
  for(let i=1;i<=CHORD_SLOTS;i++){
    $("ch"+i).value = "";
  }
  $("note").value = "";
}

function clearAll(){
  loadedRow = null;
  $("metaArtist").value = "";
  $("metaTitle").value = "";
  $("metaKey").value = "";
  $("metaId").value = "";
  $("metaMemo").value = "";
  clearInputsOnly();
  $("btnSave").disabled = true;
  $("btnResetMeta").disabled = true;
}

function fillFromRow(row){
  $("metaArtist").value = row.artist ?? "";
  $("metaTitle").value = row.title ?? "";
  $("metaKey").value = row.key ?? "";
  $("metaId").value = row.id ?? "";
  $("metaMemo").value = row.memo ?? "";

  const chords = Array.isArray(row.chords) ? row.chords : [];
  for(let i=1;i<=CHORD_SLOTS;i++){
    $("ch"+i).value = chords[i-1] ?? "";
  }

  loadedRow = row;
  $("btnSave").disabled = false;
  $("btnResetMeta").disabled = false;
}

function getKeyTriple(){
  return {
    era: normalizeKey($("era").value),
    rank: normalizeKey($("rank").value),
    part: normalizeKey($("part").value),
  };
}

function collectChords(){
  const arr = [];
  for(let i=1;i<=CHORD_SLOTS;i++){
    arr.push(($("ch"+i).value ?? "").toString().trim());
  }
  return arr;
}

async function apiGet(params){
  const url = new URL(GAS_URL);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { method:"GET" });
  if(!res.ok) throw new Error("GET failed: " + res.status);
  return await res.json();
}

async function apiPost(payload){
  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify(payload)
  });
  if(!res.ok) throw new Error("POST failed: " + res.status);
  return await res.json();
}

async function loadRow(){
  if(!ensureGasUrl()){
    setStatus("GAS_URL が未設定です（entry.html内の PASTE... を差し替え）。", "warn");
    return;
  }
  if(!canLoad()){
    setStatus("ERA / Rank / Part を全部入れてください。", "warn");
    return;
  }

  const { era, rank, part } = getKeyTriple();

  setStatus(`呼び出し中…（ERA=${era}, Rank=${rank}, Part=${part}）`);
  $("btnLoad").disabled = true;

  try{
    const data = await apiGet({ action:"get", era, rank, part });
    if(!data || data.ok !== true){
      throw new Error(data?.message || "not ok");
    }
    if(!data.row){
      setStatus("該当データが見つかりませんでした（キーが一致しない）。", "warn");
      clearAll();
      return;
    }

    fillFromRow(data.row);
    setStatus("呼び出しました。コードを入力して保存してください。", "ok");

    // focus first empty chord or chord1
    let focusIdx = 1;
    for(let i=1;i<=CHORD_SLOTS;i++){
      if(!($("ch"+i).value||"").trim()){ focusIdx=i; break; }
    }
    $("ch"+focusIdx).focus();

  }catch(err){
    console.error(err);
    setStatus("呼び出し失敗： " + (err?.message || err), "warn");
    clearAll();
  }finally{
    $("btnLoad").disabled = false;
  }
}

async function saveRow(){
  if(!ensureGasUrl()){
    setStatus("GAS_URL が未設定です。", "warn");
    return;
  }
  if(!canLoad()){
    setStatus("ERA / Rank / Part を全部入れてください。", "warn");
    return;
  }
  if(!loadedRow){
    setStatus("先に「呼び出す」で既存行を読み込んでください。", "warn");
    return;
  }

  const { era, rank, part } = getKeyTriple();
  const chords = collectChords();
  const note = ($("note").value ?? "").toString();

  setStatus("保存中…（スプシ更新）");
  $("btnSave").disabled = true;

  try{
    const payload = {
      action: "update",
      era, rank, part,
      chords,
      note,
      // IDは不偏：触らない（GAS側で row.id を維持）
      // id: loadedRow.id  // 必要ならGAS側の実装次第で付けても良い
    };

    const data = await apiPost(payload);
    if(!data || data.ok !== true){
      throw new Error(data?.message || "not ok");
    }
    if(data.updated !== true){
      throw new Error("updated=false");
    }

    setStatus("保存しました ✅", "ok");

  }catch(err){
    console.error(err);
    setStatus("保存失敗： " + (err?.message || err), "warn");
  }finally{
    $("btnSave").disabled = false;
  }
}

// 「｜」区切り貼り付け
function parseBarString(s){
  // 例：｜A｜Bm7｜E7｜A｜  または A|Bm7|E7|A
  if(!s) return [];
  s = s.trim();

  // 全角｜と半角|を統一
  s = s.replace(/\|/g, "｜");

  // 先頭末尾の｜があってもOK
  // splitして空要素除去
  const parts = s.split("｜").map(x=>x.trim()).filter(x=>x.length>0);
  return parts;
}

async function pasteBar(){
  try{
    const clip = await navigator.clipboard.readText();
    const parts = parseBarString(clip);
    if(parts.length === 0){
      setStatus("クリップボードに「｜」区切りの文字列がありません。", "warn");
      return;
    }
    for(let i=1;i<=CHORD_SLOTS;i++){
      $("ch"+i).value = parts[i-1] ?? "";
    }
    setStatus("貼り付けました。", "ok");
    $("ch1").focus();
  }catch(err){
    setStatus("貼り付け失敗（ブラウザの権限）", "warn");
  }
}

async function copyBar(){
  const arr = collectChords().filter(x => x.length > 0);
  const s = "｜" + arr.join("｜") + "｜";
  try{
    await navigator.clipboard.writeText(s);
    setStatus("コピーしました。", "ok");
  }catch(err){
    setStatus("コピー失敗（ブラウザの権限）", "warn");
  }
}

function bindEvents(){
  $("btnLoad").addEventListener("click", loadRow);
  $("btnSave").addEventListener("click", saveRow);

  $("btnClear").addEventListener("click", ()=>{
    clearInputsOnly();
    setStatus("入力欄をクリアしました。", "ok");
    $("ch1").focus();
  });

  $("btnResetMeta").addEventListener("click", ()=>{
    clearAll();
    setStatus("呼び出しを解除しました。", "ok");
  });

  $("btnPasteBar").addEventListener("click", pasteBar);
  $("btnCopyBar").addEventListener("click", copyBar);

  // Ctrl/Cmd + Enter => save
  document.addEventListener("keydown", (e)=>{
    const isMac = navigator.platform.toLowerCase().includes("mac");
    const mod = isMac ? e.metaKey : e.ctrlKey;
    if(mod && e.key === "Enter"){
      e.preventDefault();
      saveRow();
    }
  });

  // Enable load hint
  ["era","rank","part"].forEach(id=>{
    $(id).addEventListener("input", ()=>{
      if(canLoad()){
        setStatus("キー入力OK。『呼び出す』で既存行を読み込みます。");
      }
    });
    $(id).addEventListener("change", ()=>{
      if(canLoad()){
        setStatus("キー入力OK。『呼び出す』で既存行を読み込みます。");
      }
    });
  });
}

buildChordInputs();
bindEvents();
clearAll();
setStatus("ERA / Rank / Part を入れて『呼び出す』。");
</script>

</body>
</html>
