<!doctype html>

<html lang="ja">
<head>
<meta charset="utf-8">
<title>Progression_ver1.2.5</title>

<style>
body{
font-family:sans-serif;
margin:30px;
}
button{
margin:5px;
padding:10px 16px;
font-size:16px;
}
.choice{
display:block;
margin-top:10px;
min-width:320px;
text-align:left;
}
#meta{
margin:14px 0 10px;
line-height:1.6;
}
#question{
margin:10px 0;
font-size:20px;
font-weight:bold;
}
#comment{
margin-top:14px;
line-height:1.6;
}
.small{
color:#555;
font-size:13px;
}
.hr{
margin:14px 0;
border-top:1px solid #ddd;
}
</style>

</head>

<body>

<h2>Progression_ver1.2.5</h2>

<button onclick="newQuestion()">出題</button> <button onclick="playProgression()">PLAY!</button> <button onclick="hint()">ヒント</button> <button onclick="replay()">もう一回</button>

<div id="meta"></div>
<div class="hr"></div>
<div id="question"></div>
<div id="choices"></div>
<div id="comment"></div>

<script>

/* =========================
   既存の音源再生プログラム（完全採用）
   ※ただし # を含むファイル名を fetch するため、URLだけ %23 に変換して読む
   ========================= */

const ctx = new AudioContext()

function urlForFetch(url){
return String(url).replaceAll("#","%23")
}

async function loadBuffer(url){
 const r = await fetch(urlForFetch(url))
 const a = await r.arrayBuffer()
 return await ctx.decodeAudioData(a)
}

let buf={}

async function loadAll(){

if(buf.__loaded) return

buf.drum = await loadBuffer("./audio/Drum_loop.wav")

/* bass (12) */
buf["A#0_Bass"] = await loadBuffer("./audio/A#0_Bass.wav")
buf["A0_Bass"]  = await loadBuffer("./audio/A0_Bass.wav")
buf["B0_Bass"]  = await loadBuffer("./audio/B0_Bass.wav")
buf["C#1_Bass"] = await loadBuffer("./audio/C#1_Bass.wav")
buf["C1_Bass"]  = await loadBuffer("./audio/C1_Bass.wav")
buf["D#1_Bass"] = await loadBuffer("./audio/D#1_Bass.wav")
buf["D1_Bass"]  = await loadBuffer("./audio/D1_Bass.wav")
buf["E0_Bass"]  = await loadBuffer("./audio/E0_Bass.wav")
buf["F#0_Bass"] = await loadBuffer("./audio/F#0_Bass.wav")
buf["F0_Bass"]  = await loadBuffer("./audio/F0_Bass.wav")
buf["G#0_Bass"] = await loadBuffer("./audio/G#0_Bass.wav")
buf["G0_Bass"]  = await loadBuffer("./audio/G0_Bass.wav")

/* notes (12 x oct 2,3,4) + C5 */
const pcs = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]
for(let o=2;o<=4;o++){
 for(const n of pcs){
  buf[`${n}${o}`] = await loadBuffer(`./audio/${n}${o}.wav`)
 }
}
buf["C5"] = await loadBuffer("./audio/C5.wav")

buf.__loaded = true

}

function play(buffer,time,fade=false){

const s = ctx.createBufferSource()
const g = ctx.createGain()

s.buffer = buffer
s.connect(g)
g.connect(ctx.destination)

if(fade){
g.gain.setValueAtTime(1, time)
g.gain.setValueAtTime(1, time + 2.1)
g.gain.linearRampToValueAtTime(0, time + 2.2)
}

s.start(time)

}

function piano(notes,time,fade=false){

notes.forEach(n=>{
 play(buf[n],time,fade)
})

}

function bass(note,time,fade=false){

play(buf[note],time,fade)

}

function drum(time,fade=false){

play(buf.drum,time,fade)

}

/* =========================
   ゲーム部分
   ========================= */

const NON_DIATONIC_CANDIDATES = ["Ⅳm","Ⅲ7","Ⅱ7","Ⅵ7","♭Ⅶ","♭Ⅲ","♭Ⅵ","dim","aug"]

let DB=[]
let current=null
let currentQuiz=null
let correctChoice=""
let dbReadyPromise = null

function esc(s){
return String(s??"")
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;")
.replaceAll("'","&#39;")
}

async function loadDB(){
const r = await fetch("./progressions.json", {cache:"no-store"})
DB = await r.json()
}

function ensureDB(){
if(!dbReadyPromise){
 dbReadyPromise = loadDB().catch(e=>{
  console.error(e)
  DB=[]
 })
}
return dbReadyPromise
}

function hasChordData(q){
return q && Array.isArray(q.chords) && q.chords.length===4 && q.chords.every(x=>String(x).trim().length>0)
}

function hasDegreeData(q){
return q && Array.isArray(q.degrees) && q.degrees.length===4 && q.degrees.every(x=>String(x).trim().length>0)
}

function truthyNonDiatonic(v){
if(v===true) return true
if(v===false || v==null) return false
const s = String(v).trim().toLowerCase()
return s==="true" || s==="1" || s==="yes"
}

function fallbackIsNonDiatonicDegree(token){
const t = String(token||"")
if(/[b♭#]/.test(t)) return true
if(/Ⅳm|dim|aug/.test(t)) return true
if(/7/.test(t) && !/^Ⅴ7?$/.test(t)) return true
return false
}

function collectNonDiatonicIndices(q){
const idx=[]
let hasFlagKey=false
for(let i=1;i<=4;i++){
const key = `non_diatonic_${i}`
if(Object.prototype.hasOwnProperty.call(q,key)){
hasFlagKey=true
if(truthyNonDiatonic(q[key])) idx.push(i-1)
}
}
if(hasFlagKey) return idx
const degs = hasDegreeData(q) ? q.degrees : []
for(let i=0;i<degs.length;i++){
if(fallbackIsNonDiatonicDegree(degs[i])) idx.push(i)
}
return idx
}

function chooseRandom(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function shuffle(arr){
const out = arr.slice()
for(let i=out.length-1;i>0;i--){
const j = Math.floor(Math.random()*(i+1))
const tmp = out[i]
out[i] = out[j]
out[j] = tmp
}
return out
}

function degreeString(arr){
return arr.join(" → ")
}

function buildPatternAQuiz(q){
const degs = q.degrees.slice(0,4)
const nonDiaIdx = collectNonDiatonicIndices(q)
if(nonDiaIdx.length===0) return null
const hiddenIndex = chooseRandom(nonDiaIdx)
const correct = String(degs[hiddenIndex]).trim()

const choiceSet = new Set([correct])
const pool = shuffle(NON_DIATONIC_CANDIDATES.filter(x=>x!==correct))
for(const c of pool){
if(choiceSet.size>=4) break
choiceSet.add(c)
}
if(choiceSet.size<4){
const fallbackPool = shuffle(NON_DIATONIC_CANDIDATES)
for(const c of fallbackPool){
if(choiceSet.size>=4) break
choiceSet.add(c)
}
}

const choices = shuffle(Array.from(choiceSet).slice(0,4))
while(choices.length<4){
choices.push(correct)
}

const masked = degs.slice()
masked[hiddenIndex] = "？"

return {
mode:"A",
hiddenIndex,
choices,
correct,
questionText: degreeString(masked)
}
}

function splitDegreeToken(tok){

tok = String(tok||"").trim()

let base = tok
let suffix = ""

const m = tok.match(/^([b♭♯#]?)([ⅠⅡⅢⅣⅤⅥⅦ]+)(.*)$/)
if(m){
base = (m[1]||"") + (m[2]||"")
suffix = (m[3]||"")
}

return {base, suffix}

}

/* トニック：Ⅰ / Ⅵm / Ⅲm の入替 */
function applyTonicSwap(degs, mode){

const out = degs.slice()

for(let i=0;i<out.length;i++){

const t = splitDegreeToken(out[i])
const base = t.base
const suf  = t.suffix

const isI = (base==="Ⅰ")
const isVIm = (base==="Ⅵ" && suf.startsWith("m"))
const isIIIm = (base==="Ⅲ" && suf.startsWith("m"))

if(!(isI || isVIm || isIIIm)) continue

if(mode===1){
if(isI){
 out[i] = "Ⅲm"
}else if(isVIm){
 out[i] = "Ⅰ"
}else{
 out[i] = "Ⅵm"
}
}else{
if(isI){
 out[i] = "Ⅵm"
}else if(isVIm){
 out[i] = "Ⅲm"
}else{
 out[i] = "Ⅰ"
}
}

}

return out

}

/* サブドミ：Ⅳ ⇔ Ⅱm */
function applySubdomSwap(degs){

const out = degs.slice()

for(let i=0;i<out.length;i++){

const t = splitDegreeToken(out[i])
const base = t.base
const suf  = t.suffix

const isIV = (base==="Ⅳ")
const isIIm = (base==="Ⅱ" && suf.startsWith("m"))

if(isIV){
 out[i] = "Ⅱm"
}else if(isIIm){
 out[i] = "Ⅳ"
}

}

return out

}

function buildPatternBQuiz(q){
const degs = q.degrees.slice(0,4)
const correct = degreeString(degs)
const choiceSet = new Set([correct])
const generated = [
 degreeString(applyTonicSwap(degs,1)),
 degreeString(applyTonicSwap(degs,2)),
 degreeString(applySubdomSwap(degs)),
 degreeString(applySubdomSwap(applyTonicSwap(degs,1))),
 degreeString(applySubdomSwap(applyTonicSwap(degs,2)))
]
for(const g of generated){
if(choiceSet.size>=4) break
choiceSet.add(g)
}

if(choiceSet.size<4){
const dbPool = shuffle(DB.filter(row=>hasDegreeData(row) && collectNonDiatonicIndices(row).length===0))
for(const row of dbPool){
if(choiceSet.size>=4) break
choiceSet.add(degreeString(row.degrees.slice(0,4)))
}
}

const allDiatonicTokens = ["Ⅰ","Ⅱm","Ⅲm","Ⅳ","Ⅴ","Ⅵm"]
let guard = 0
while(choiceSet.size<4 && guard<40){
guard++
const arr = degs.map(d=>String(d))
for(let i=0;i<arr.length;i++){
const t = splitDegreeToken(arr[i])
const token = t.base + (t.suffix||"")
if(["Ⅰ","Ⅱm","Ⅲm","Ⅳ","Ⅴ","Ⅵm"].includes(token)){
arr[i] = chooseRandom(allDiatonicTokens)
}
}
choiceSet.add(degreeString(arr))
}

const choices = shuffle(Array.from(choiceSet).slice(0,4))
while(choices.length<4){
choices.push(correct)
}

return {
mode:"B",
choices,
correct,
questionText:""
}
}

function buildQuizForQuestion(q){
if(!hasDegreeData(q)) return null
const nonDiaIdx = collectNonDiatonicIndices(q)
if(nonDiaIdx.length>0){
return buildPatternAQuiz(q)
}
return buildPatternBQuiz(q)
}

function renderMeta(q){

const artist = esc(q.artist)
const title  = esc(q.title)
const words  = esc(q.words)
const music  = esc(q.music)
const arrange= esc(q.arrange)
const year   = esc(q.year)
const era    = esc(q.ERA ?? q.era)
const okey   = esc(q.original_key ?? q.originalKey)
const part   = esc(q.part)

document.getElementById("meta").innerHTML =
"<b>"+artist+"</b> / "+title+"<br>"+
"<span class='small'>words:</span> "+words+"<br>"+
"<span class='small'>music:</span> "+music+"<br>"+
"<span class='small'>arrange:</span> "+arrange+"<br>"+
"<span class='small'>Year:</span> "+year+
"　<span class='small'>ERA:</span> "+era+
"　<span class='small'>original_key:</span> "+okey+
"　<span class='small'>Part:</span> "+part

}

function renderQuiz(){
if(!currentQuiz) return

if(currentQuiz.mode==="A"){
document.getElementById("question").innerHTML = esc(currentQuiz.questionText)
}else{
document.getElementById("question").innerHTML = ""
}

let html=""
for(const c of currentQuiz.choices){
html += `<button class='choice' onclick="answer('${esc(c)}')">${esc(c)}</button>`
}
document.getElementById("choices").innerHTML = html
correctChoice = currentQuiz.correct
}

async function newQuestion(){

await ensureDB()

if(DB.length===0){
document.getElementById("meta").innerHTML="<b>DB未読み込み</b>"
document.getElementById("question").innerHTML=""
document.getElementById("choices").innerHTML=""
document.getElementById("comment").innerHTML=""
return
}

let pool = DB.filter(x=>hasChordData(x) && hasDegreeData(x))
if(pool.length===0){
document.getElementById("meta").innerHTML="<b>Chord/Degreeデータが存在する行がありません</b>"
document.getElementById("question").innerHTML=""
document.getElementById("choices").innerHTML=""
document.getElementById("comment").innerHTML=""
return
}

current = chooseRandom(pool)
currentQuiz = buildQuizForQuestion(current)
if(!currentQuiz){
document.getElementById("meta").innerHTML="<b>問題生成に失敗しました</b>"
document.getElementById("question").innerHTML=""
document.getElementById("choices").innerHTML=""
document.getElementById("comment").innerHTML=""
return
}

renderMeta(current)
document.getElementById("question").innerHTML = ""
document.getElementById("choices").innerHTML = ""
document.getElementById("comment").innerHTML = ""

}

function answer(c){

if(c===correctChoice){

playCorrect()
showTagsAndComment()

}else{

playCheer()
document.getElementById("comment").innerHTML=""

}

}

function showTagsAndComment(){

if(!current) return

const t1 = esc(current.tag1)
const t2 = esc(current.tag2)
const t3 = esc(current.tag3)
const t4 = esc(current.tag4)
const cm = esc(current.comment)

let html = "<b>OK</b><br>"
if(t1) html += t1+"<br>"
if(t2) html += t2+"<br>"
if(t3) html += t3+"<br>"
if(t4) html += t4+"<br>"
if(cm) html += "<div class='hr'></div>"+cm

document.getElementById("comment").innerHTML = html

}

function hint(){

if(!current) return

const t1 = String(current.tag1||"")
const t2 = String(current.tag2||"")
const t3 = String(current.tag3||"")
const t4 = String(current.tag4||"")

alert(t1+"\n"+t2+"\n"+t3+"\n"+t4)

}

function replay(){
playProgression()
}

/* SFX */
function playCorrect(){
const a = new Audio("../../assets/correct.mp3")
a.play()
}

function playCheer(){
let n = Math.floor(Math.random()*6)+1
const a = new Audio("../../assets/cheer"+n+".mp3")
a.play()
}

/* =========================
   進行の再生（DBの chord 4つを鳴らす）
   BPM120 / 1小節2秒 / 最後だけフェード
   ========================= */

function pcIndex(name){
const pcs = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]
return pcs.indexOf(name)
}

function idxToPc(i){
const pcs = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]
return pcs[(i%12+12)%12]
}

function parseChordSymbol(sym){

sym = String(sym||"").trim()

let root = ""
let rest = ""

if(sym.length>=2 && sym[1]==="#"){
root = sym.slice(0,2)
rest = sym.slice(2)
}else{
root = sym.slice(0,1)
rest = sym.slice(1)
}

let quality = "maj"
let seventh = null

if(rest.startsWith("maj7")){
quality="maj"
seventh="maj7"
}else if(rest.startsWith("m7")){
quality="min"
seventh="m7"
}else if(rest.startsWith("m")){
quality="min"
}else if(rest.startsWith("aug")){
quality="aug"
}else if(rest.startsWith("dim")){
quality="dim"
}else if(rest.startsWith("7")){
quality="maj"
seventh="7"
}else if(rest.length===0){
quality="maj"
}else{
quality="maj"
}

return {root, quality, seventh}

}

function chordToPitchClasses(sym){

const p = parseChordSymbol(sym)
const r = pcIndex(p.root)
if(r<0) return ["C","E","G"]

let third = 4
let fifth = 7

if(p.quality==="min"){ third = 3; fifth = 7 }
if(p.quality==="aug"){ third = 4; fifth = 8 }
if(p.quality==="dim"){ third = 3; fifth = 6 }

let pcs = [ idxToPc(r), idxToPc(r+third), idxToPc(r+fifth) ]

if(p.seventh==="7"){
pcs.push(idxToPc(r+10))
}
if(p.seventh==="maj7"){
pcs.push(idxToPc(r+11))
}
if(p.seventh==="m7"){
pcs.push(idxToPc(r+10))
}

return pcs

}

function bassBufferName(rootPc){

if(rootPc==="C" || rootPc==="C#" || rootPc==="D" || rootPc==="D#"){
return rootPc+"1_Bass"
}
return rootPc+"0_Bass"

}

function pianoVoicing(sym){

const pcs = chordToPitchClasses(sym)

let notes = []
for(let i=0;i<pcs.length;i++){
notes.push(pcs[i]+"3")
}

notes = notes.filter(n=>buf[n])
if(notes.length===0){
notes = ["C3","E3","G3"]
}

return notes

}

async function playProgression(){

if(!current || !currentQuiz) return
if(!hasChordData(current)) return

await loadAll()

let t = ctx.currentTime + 0.1
let bar = 2.0

const ch = current.chords.slice(0,4)

for(let i=0;i<4;i++){

const time = t + bar*i
const fade = (i===3)

const rootPc = parseChordSymbol(ch[i]).root
const bname = bassBufferName(rootPc)

drum(time, fade)
bass(bname, time, fade)
piano(pianoVoicing(ch[i]), time, fade)

}

renderQuiz()

}

/* 起動時にDB読み込み開始 */
ensureDB()

</script>

</body>
</html>
