<script>

/* =========================
   既存の音源再生プログラム（完全採用）
   ※ただし # を含むファイル名を fetch するため、URLだけ %23 に変換して読む
   ========================= */

const ctx = new AudioContext()

function urlForFetch(url){
return String(url).replaceAll("#","%23")
}

async function loadBuffer(url){
const r = await fetch(urlForFetch(url))
if(!r.ok){
throw new Error(`fetch failed: ${url}`)
}
const a = await r.arrayBuffer()
return await ctx.decodeAudioData(a)
}

let buf={}
let bufferErrors = {}
let activeSources = []

function markBufferError(name){
bufferErrors[name] = true
}

function isBufferError(name){
return !!bufferErrors[name]
}

async function safeLoadBuffer(key, url){
try{
buf[key] = await loadBuffer(url)
}catch(e){
console.error(e)
markBufferError(key)
buf[key] = null
}
}

async function loadAll(){

if(buf.__loaded) return

await safeLoadBuffer("drum", "./audio/Drum_loop.wav")

/* bass (12) */
await safeLoadBuffer("A#0_Bass", "./audio/A#0_Bass.wav")
await safeLoadBuffer("A0_Bass",  "./audio/A0_Bass.wav")
await safeLoadBuffer("B0_Bass",  "./audio/B0_Bass.wav")
await safeLoadBuffer("C#1_Bass", "./audio/C#1_Bass.wav")
await safeLoadBuffer("C1_Bass",  "./audio/C1_Bass.wav")
await safeLoadBuffer("D#1_Bass", "./audio/D#1_Bass.wav")
await safeLoadBuffer("D1_Bass",  "./audio/D1_Bass.wav")
await safeLoadBuffer("E0_Bass",  "./audio/E0_Bass.wav")
await safeLoadBuffer("F#0_Bass", "./audio/F#0_Bass.wav")
await safeLoadBuffer("F0_Bass",  "./audio/F0_Bass.wav")
await safeLoadBuffer("G#0_Bass", "./audio/G#0_Bass.wav")
await safeLoadBuffer("G0_Bass",  "./audio/G0_Bass.wav")

/* notes (12 x oct 2,3,4) + C5 */
const pcs = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]
for(let o=2;o<=4;o++){
for(const n of pcs){
await safeLoadBuffer(`${n}${o}`, `./audio/${n}${o}.wav`)
}
}
await safeLoadBuffer("C5", "./audio/C5.wav")

buf.__loaded = true

}

function play(buffer,time,fade=false,duration=null){
if(!buffer) return null
const s = ctx.createBufferSource()
const g = ctx.createGain()
s.buffer = buffer
s.connect(g)
g.connect(ctx.destination)
if(fade){
g.gain.setValueAtTime(1, time)
g.gain.setValueAtTime(1, time + 2.1)
g.gain.linearRampToValueAtTime(0, time + 2.2)
}
s.start(time)
if(duration!=null){
try{ s.stop(time + Math.max(0.05, duration)) }catch(_e){}
}
activeSources.push(s)
return s
}

function stopAllPlaying(){
for(const s of activeSources){
try{ s.stop(0) }catch(_e){}
}
activeSources = []
}

function piano(notes,time,fade=false,duration=null){
notes.forEach(n=>{ play(buf[n],time,fade,duration) })
}

function bass(note,time,fade=false,duration=null){
play(buf[note],time,fade,duration)
}

function drum(time,fade=false){
play(buf.drum,time,fade)
}

/* =========================
   ゲーム部分
   ========================= */

const NON_DIATONIC_CANDIDATES = ["Ⅳm","Ⅲ7","Ⅱ7","Ⅵ7","♭Ⅶ","♭Ⅲ","♭Ⅵ","dim","aug"]

let DB=[]
let current=null
let currentQuiz=null
let correctChoice=""
let dbReadyPromise = null
let preloadStarted = false

function esc(s){
return String(s??"")
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;")
.replaceAll("'","&#39;")
}

function normalizeDegreeForDisplay(s){
return String(s||"").replaceAll("b","♭")
}

function normalizeAccidentalRoot(root){
const map = {
"Cb":"B",
"Db":"C#", "D♭":"C#",
"Eb":"D#", "E♭":"D#",
"Fb":"E",
"Gb":"F#", "G♭":"F#",
"Ab":"G#", "A♭":"G#",
"Bb":"A#", "B♭":"A#",
"E#":"F",
"B#":"C"
}
return map[root] || root
}

async function loadDB(){
const r = await fetch("./progressions.json", {cache:"no-store"})
DB = await r.json()
}

function ensureDB(){
if(!dbReadyPromise){
dbReadyPromise = loadDB().catch(e=>{
console.error(e)
DB=[]
})
}
return dbReadyPromise
}

function hasChordData(q){
return q && Array.isArray(q.chords) && q.chords.length===4 && q.chords.every(x=>String(x).trim().length>0)
}

function hasDegreeData(q){
return q && Array.isArray(q.degrees) && q.degrees.length===4 && q.degrees.every(x=>String(x).trim().length>0)
}

function truthyNonDiatonic(v){
if(v===true) return true
if(v===false || v==null) return false
const s = String(v).trim().toLowerCase()
return s==="true" || s==="1" || s==="yes"
}

function fallbackIsNonDiatonicDegree(token){
const t = String(token||"")
if(/[b♭#]/.test(t)) return true
if(/Ⅳm|dim|aug/.test(t)) return true
if(/7/.test(t) && !/^Ⅴ7?$/.test(t)) return true
return false
}

function collectNonDiatonicIndices(q){
const idx=[]
let hasFlagKey=false
for(let i=1;i<=4;i++){
const key = `non_diatonic_${i}`
if(Object.prototype.hasOwnProperty.call(q,key)){
hasFlagKey=true
if(truthyNonDiatonic(q[key])) idx.push(i-1)
}
}
if(hasFlagKey) return idx
const degs = hasDegreeData(q) ? q.degrees : []
for(let i=0;i<degs.length;i++){
if(fallbackIsNonDiatonicDegree(degs[i])) idx.push(i)
}
return idx
}

function chooseRandom(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function shuffle(arr){
const out = arr.slice()
for(let i=out.length-1;i>0;i--){
const j = Math.floor(Math.random()*(i+1))
const tmp = out[i]
out[i] = out[j]
out[j] = tmp
}
return out
}

function degreeString(arr){
return arr.map(normalizeDegreeForDisplay).join(" → ")
}

function buildPatternAQuiz(q){
const degs = q.degrees.slice(0,4)
const nonDiaIdx = collectNonDiatonicIndices(q)
if(nonDiaIdx.length===0) return null
const hiddenIndex = chooseRandom(nonDiaIdx)
const correct = normalizeDegreeForDisplay(String(degs[hiddenIndex]).trim())

const choiceSet = new Set([correct])
const pool = shuffle(NON_DIATONIC_CANDIDATES.filter(x=>x!==correct))
for(const c of pool){
if(choiceSet.size>=4) break
choiceSet.add(c)
}
if(choiceSet.size<4){
const fallbackPool = shuffle(NON_DIATONIC_CANDIDATES)
for(const c of fallbackPool){
if(choiceSet.size>=4) break
choiceSet.add(c)
}
}

const choices = shuffle(Array.from(choiceSet).slice(0,4))
while(choices.length<4){
choices.push(correct)
}

const masked = degs.slice()
masked[hiddenIndex] = "？"

return {
mode:"A",
hiddenIndex,
choices,
correct,
questionText: degreeString(masked)
}
}

function splitDegreeToken(tok){
tok = String(tok||"").trim()
let base = tok
let suffix = ""
const m = tok.match(/^([b♭♯#]?)([ⅠⅡⅢⅣⅤⅥⅦ]+)(.*)$/)
if(m){
base = (m[1]||"") + (m[2]||"")
suffix = (m[3]||"")
}
return {base, suffix}
}

/* トニック：Ⅰ / Ⅵm / Ⅲm の入替 */
function applyTonicSwap(degs, mode){
const out = degs.slice()
for(let i=0;i<out.length;i++){
const t = splitDegreeToken(out[i])
const base = t.base
const suf  = t.suffix
const isI = (base==="Ⅰ")
const isVIm = (base==="Ⅵ" && suf.startsWith("m"))
const isIIIm = (base==="Ⅲ" && suf.startsWith("m"))
if(!(isI || isVIm || isIIIm)) continue
if(mode===1){
if(isI){
out[i] = "Ⅲm"
}else if(isVIm){
out[i] = "Ⅰ"
}else{
out[i] = "Ⅵm"
}
}else{
if(isI){
out[i] = "Ⅵm"
}else if(isVIm){
out[i] = "Ⅲm"
}else{
out[i] = "Ⅰ"
}
}
}
return out
}

/* サブドミ：Ⅳ ⇔ Ⅱm */
function applySubdomSwap(degs){
const out = degs.slice()
for(let i=0;i<out.length;i++){
const t = splitDegreeToken(out[i])
const base = t.base
const suf  = t.suffix
const isIV = (base==="Ⅳ")
const isIIm = (base==="Ⅱ" && suf.startsWith("m"))
if(isIV){
out[i] = "Ⅱm"
}else if(isIIm){
out[i] = "Ⅳ"
}
}
return out
}

function buildPatternBQuiz(q){
const degs = q.degrees.slice(0,4)
const correct = degreeString(degs)
const choiceSet = new Set([correct])
const generated = [
degreeString(applyTonicSwap(degs,1)),
degreeString(applyTonicSwap(degs,2)),
degreeString(applySubdomSwap(degs)),
degreeString(applySubdomSwap(applyTonicSwap(degs,1))),
degreeString(applySubdomSwap(applyTonicSwap(degs,2)))
]
for(const g of generated){
if(choiceSet.size>=4) break
choiceSet.add(g)
}

if(choiceSet.size<4){
const dbPool = shuffle(DB.filter(row=>hasDegreeData(row) && collectNonDiatonicIndices(row).length===0))
for(const row of dbPool){
if(choiceSet.size>=4) break
choiceSet.add(degreeString(row.degrees.slice(0,4)))
}
}

const allDiatonicTokens = ["Ⅰ","Ⅱm","Ⅲm","Ⅳ","Ⅴ","Ⅵm"]
let guard = 0
while(choiceSet.size<4 && guard<40){
guard++
const arr = degs.map(d=>String(d))
for(let i=0;i<arr.length;i++){
const t = splitDegreeToken(arr[i])
const token = t.base + (t.suffix||"")
if(["Ⅰ","Ⅱm","Ⅲm","Ⅳ","Ⅴ","Ⅵm"].includes(token)){
arr[i] = chooseRandom(allDiatonicTokens)
}
}
choiceSet.add(degreeString(arr))
}

const choices = shuffle(Array.from(choiceSet).slice(0,4))
while(choices.length<4){
choices.push(correct)
}

return {
mode:"B",
choices,
correct,
questionText:""
}
}

function buildQuizForQuestion(q){
if(!hasDegreeData(q)) return null
const nonDiaIdx = collectNonDiatonicIndices(q)
if(nonDiaIdx.length>0){
return buildPatternAQuiz(q)
}
return buildPatternBQuiz(q)
}

el.textContent = text

el.classList.add("error-cell")
}else{

function renderStatusTable(){
for(let i=1;i<=4;i++){
setCell(`st_chord_${i}`,"")
setCell(`st_degree_${i}`,"")
setCell(`st_nd_${i}`,"")
setCell(`st_p1_${i}`,"")
setCell(`st_p2_${i}`,"")
setCell(`st_p3_${i}`,"")
setCell(`st_p4_${i}`,"")
setCell(`st_bass_${i}`,"")
}
if(!current) return

const degs = current.degrees.slice(0,4)
const ch = current.chords.slice(0,4)
const ndSet = new Set(collectNonDiatonicIndices(current))

for(let i=0;i<4;i++){
const col = i+1
setCell(`st_chord_${col}`, String(ch[i]||""))
setCell(`st_degree_${col}`, normalizeDegreeForDisplay(String(degs[i]||"")))
setCell(`st_nd_${col}`, ndSet.has(i) ? "True" : "False")
const seg = getBarSegments(ch[i])[0]
const parsed = getParsedForPlayback(seg.raw, i)
const pn = pianoVoicing(seg.raw, parsed)
setCell(`st_p1_${col}`, pn[0]||"")
setCell(`st_p2_${col}`, pn[1]||"")
setCell(`st_p3_${col}`, pn[2]||"")
setCell(`st_p4_${col}`, pn[3]||"")
const rootPc = normalizeAccidentalRoot(parsed.bassRoot)
const bname = bassBufferName(rootPc)

if(pn[1] && isBufferError(pn[1])) setCell(`st_p2_${col}`, "error", true)

if(pn[3] && isBufferError(pn[3])) setCell(`st_p4_${col}`, "error", true)
if(isBufferError(bname)) setCell(`st_bass_${col}`, "error", true)
}
}

function renderQuiz(){
if(!currentQuiz) return
if(currentQuiz.mode==="A"){
document.getElementById("question").innerHTML = esc(currentQuiz.questionText)
}else{
document.getElementById("question").innerHTML = ""
}

let html=""
for(const c of currentQuiz.choices){
html += `<button class='choice' onclick="answer('${esc(c)}')">${esc(c)}</button>`
}
document.getElementById("choices").innerHTML = html
correctChoice = currentQuiz.correct
}

async function warmup(){
if(preloadStarted) return
preloadStarted = true
ensureDB()
loadAll()
}

async function prepareAudioForGesture(){
if(ctx.state !== "running"){
try{ await ctx.resume() }catch(e){ console.error(e) }
}
await loadAll()
}

async function newQuestion(){
await warmup()
await ensureDB()

if(DB.length===0){
document.getElementById("meta").innerHTML="<b>DB未読み込み</b>"
document.getElementById("question").innerHTML=""
document.getElementById("choices").innerHTML=""
document.getElementById("hints").innerHTML=""
document.getElementById("comment").innerHTML=""
renderStatusTable()
return
}

let pool = DB.filter(x=>hasChordData(x) && hasDegreeData(x))
if(pool.length===0){
document.getElementById("meta").innerHTML="<b>Chord/Degreeデータが存在する行がありません</b>"
document.getElementById("question").innerHTML=""
document.getElementById("choices").innerHTML=""
document.getElementById("hints").innerHTML=""
document.getElementById("comment").innerHTML=""
renderStatusTable()
return
}

current = chooseRandom(pool)
currentQuiz = buildQuizForQuestion(current)
if(!currentQuiz){
document.getElementById("meta").innerHTML="<b>問題生成に失敗しました</b>"
document.getElementById("question").innerHTML=""
document.getElementById("choices").innerHTML=""
document.getElementById("hints").innerHTML=""
document.getElementById("comment").innerHTML=""
renderStatusTable()
return
}

renderMeta(current)
document.getElementById("question").innerHTML = ""
document.getElementById("choices").innerHTML = ""
document.getElementById("comment").innerHTML = ""
document.getElementById("hints").innerHTML = ""
renderStatusTable()
}

/* =========================
   進行の再生（DBの chord 4つを鳴らす）
   BPM120 / 1小節2秒 / 最後だけフェード
   ========================= */

function pcIndex(name){
const pcs = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]
return pcs.indexOf(name)
}

function idxToPc(i){
const pcs = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]
return pcs[(i%12+12)%12]
}


function normalizeChordText(sym){
let s = String(sym||"").trim()
const fw = {"Ａ":"A","Ｂ":"B","Ｃ":"C","Ｄ":"D","Ｅ":"E","Ｆ":"F","Ｇ":"G","ａ":"A","ｂ":"B","ｃ":"C","ｄ":"D","ｅ":"E","ｆ":"F","ｇ":"G","＃":"#","♯":"#","－":"-","ｍ":"m"}
for(const k in fw){ s = s.replaceAll(k, fw[k]) }
return s
}

function applyDegreeHintToParsed(parsed, degreeText){
const d = String(degreeText||"")
if(!parsed.seventh){
if(/maj7|M7/.test(d)){ parsed.seventh = "maj7" }
else if(/m7/.test(d)){ parsed.seventh = "m7" }
else if(/7/.test(d)){ parsed.seventh = "7" }
}
if(!parsed.ninth && /9/.test(d)){ parsed.ninth = true }
if(!parsed.sixth && /6/.test(d)){ parsed.sixth = true }
return parsed
}

function getParsedForPlayback(chordText, barIndex){
const seg = parseChordSymbol(chordText)
if(current && Array.isArray(current.degrees)){
return applyDegreeHintToParsed(seg, current.degrees[barIndex] || "")
}
return seg
}

function parseChordSymbol(sym){
sym = normalizeChordText(sym)
const slashSplit = sym.split("/")
const baseSym = slashSplit[0].trim()
const slashBass = slashSplit[1] ? slashSplit[1].trim() : ""
const m = baseSym.match(/^([A-G](?:[#b♭])?)(.*)$/)
const root = m ? m[1] : "C"
const rest = m ? m[2] : ""

let quality = "maj"
if(rest.startsWith("m") && !rest.startsWith("maj")){ quality = "min" }
if(rest.startsWith("dim")){ quality = "dim" }
if(rest.startsWith("aug")){ quality = "aug" }

let seventh = null
if(/mM7/.test(rest)){ seventh = "maj7" }
else if(/maj7|M7/.test(rest)){ seventh = "maj7" }
else if(/m7/.test(rest)){ seventh = "m7" }
else if(/(^|[^a-zA-Z])7/.test(rest)){ seventh = "7" }

const sixth = /6/.test(rest)
const ninth = /9/.test(rest)
const bassRoot = slashBass ? slashBass : root

return {root, bassRoot, quality, seventh, sixth, ninth}
}

function chordToPitchClasses(sym, parsedOpt=null){
const p = parsedOpt || parseChordSymbol(sym)
const rootNorm = normalizeAccidentalRoot(p.root)
const r = pcIndex(rootNorm)
if(r<0) return ["C","E","G"]

let third = 4
let fifth = 7
if(p.quality==="min"){ third = 3; fifth = 7 }
if(p.quality==="aug"){ third = 4; fifth = 8 }
if(p.quality==="dim"){ third = 3; fifth = 6 }

const pcs = [ idxToPc(r), idxToPc(r+third), idxToPc(r+fifth) ]
if(p.sixth){ pcs.push(idxToPc(r+9)) }
if(p.seventh==="7"){ pcs.push(idxToPc(r+10)) }
if(p.seventh==="maj7"){ pcs.push(idxToPc(r+11)) }
if(p.seventh==="m7"){ pcs.push(idxToPc(r+10)) }
if(p.ninth){ pcs.push(idxToPc(r+14)) }

const uniq = []
for(const x of pcs){ if(!uniq.includes(x)) uniq.push(x) }
return uniq
}

function bassBufferName(rootPc){
if(rootPc==="C") return "C1_Bass"
if(rootPc==="C#" || rootPc==="D" || rootPc==="D#") return rootPc+"1_Bass"
return rootPc+"0_Bass"
}

function pianoVoicing(sym, parsedOpt=null){
const p = parsedOpt || parseChordSymbol(sym)
const rootNorm = normalizeAccidentalRoot(p.root)
const rootIdx = pcIndex(rootNorm)
let pcs = chordToPitchClasses(sym, p)

if(p.ninth){
const n9 = idxToPc(rootIdx+14)
pcs = pcs.filter(x=>x!==n9)
pcs.push(n9)
}
if(p.seventh){
const sev = p.seventh==="maj7" ? idxToPc(rootIdx+11) : idxToPc(rootIdx+10)
pcs = pcs.filter(x=>x!==sev)
pcs.push(sev)
}

while(pcs.length<3){ pcs.push(idxToPc(rootIdx+7)) }
if(pcs.length>4){
if(p.ninth){
pcs = [pcs[0], pcs[1], pcs[2], idxToPc(rootIdx+14)]
}else if(p.seventh){
const sev = p.seventh==="maj7" ? idxToPc(rootIdx+11) : idxToPc(rootIdx+10)
pcs = [pcs[0], pcs[1], pcs[2], sev]
}else{
pcs = pcs.slice(0,4)
}
}

return pcs.slice(0,4).map(x=>x+"3")
}

function getBarSegments(chordText){
const raw = String(chordText||"")
const parts = raw.split("│").map(x=>x.trim()).filter(Boolean)
if(parts.length>=2){
return [
{raw:parts[0], offset:0.0, duration:1.0},
{raw:parts[1], offset:1.0, duration:1.0}
]
}
return [{raw:raw.trim(), offset:0.0, duration:2.0}]
}

async function playProgression(){
if(!current || !currentQuiz) return
if(!hasChordData(current)) return
await prepareAudioForGesture()
stopAllPlaying()
let t = ctx.currentTime + 0.1
let bar = 2.0
const ch = current.chords.slice(0,4)
for(let i=0;i<4;i++){
const baseTime = t + bar*i
const isLastBar = (i===3)
const segs = getBarSegments(ch[i])

drum(baseTime, isLastBar)
for(let j=0;j<segs.length;j++){
const seg = segs[j]
const segTime = baseTime + seg.offset
const segFade = (isLastBar && j===segs.length-1)
const parsed = getParsedForPlayback(seg.raw, i)
const rootPc = normalizeAccidentalRoot(parsed.bassRoot)
const bname = bassBufferName(rootPc)
bass(bname, segTime, segFade, seg.duration)
piano(pianoVoicing(seg.raw, parsed), segTime, segFade, seg.duration)
}
}
renderQuiz()
renderStatusTable()
}

/* 起動時に先読み開始 */
warmup()
