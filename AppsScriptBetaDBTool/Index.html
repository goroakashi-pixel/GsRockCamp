<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>GoRockCamp DB投入支援ツール β</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d9e0ee;
      --text: #1c2434;
      --muted: #667085;
      --accent: #2563eb;
      --accent-2: #1d4ed8;
      --danger-bg: #fff0f0;
      --danger-line: #ef4444;
      --danger-text: #991b1b;
      --ok-bg: #effcf6;
      --ok-line: #10b981;
      --ok-text: #065f46;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    button, input {
      font: inherit;
    }
    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px 14px 40px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin: 0 0 10px;
    }
    .youtube-wrap {
      position: relative;
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      background: #111827;
      aspect-ratio: 16 / 9;
    }
    .youtube-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .youtube-empty {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #e5e7eb;
      padding: 12px;
      line-height: 1.6;
    }
    .control-grid {
      display: grid;
      gap: 10px;
    }
    .id-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: #fff;
    }
    .primary-btn, .ghost-btn, .candidate-btn, .tab-btn, .cell-btn {
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .primary-btn {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    .primary-btn:disabled {
      opacity: 0.55;
      cursor: progress;
    }
    .ghost-btn {
      background: #eef4ff;
      color: var(--accent-2);
      border: 1px solid #cfe0ff;
      font-weight: 700;
    }
    .status-box, .danger-box, .info-box, .log-box {
      border-radius: 14px;
      padding: 12px;
      line-height: 1.6;
    }
    .status-box {
      background: var(--ok-bg);
      border: 1px solid var(--ok-line);
      color: var(--ok-text);
    }
    .danger-box {
      display: none;
      background: var(--danger-bg);
      border: 1px solid var(--danger-line);
      color: var(--danger-text);
      font-weight: 700;
    }
    .danger-box.show {
      display: block;
    }
    .info-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .info-box {
      background: #f8fafc;
      border: 1px solid var(--line);
    }
    .label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .value {
      font-size: 16px;
      font-weight: 700;
      word-break: break-word;
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .tab-btn {
      background: #f3f6fb;
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 700;
    }
    .tab-btn.active {
      background: #dbeafe;
      border-color: #93c5fd;
      color: #1d4ed8;
    }
    .part-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .part-meta {
      color: var(--muted);
      font-size: 13px;
    }
    .bar-grid {
      display: grid;
      gap: 12px;
    }
    .bar-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: #fcfdff;
    }
    .bar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }
    .bar-number {
      font-weight: 800;
      font-size: 16px;
    }
    .bar-theory {
      text-align: right;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    .half-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .half-block {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: #fff;
      cursor: pointer;
    }
    .half-block.active {
      border: 2px solid var(--accent);
      background: #eff6ff;
    }
    .half-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }
    .half-input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 17px;
      font-weight: 700;
    }
    .half-input:focus {
      outline: 2px solid #bfdbfe;
      border-color: #60a5fa;
    }
    .candidate-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .candidate-btn {
      min-height: 40px;
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 14px;
    }
    .candidate-btn.current {
      background: #e8fff3;
      border-color: #6ee7b7;
      color: #047857;
    }
    .selected-cell {
      margin-top: 8px;
      color: var(--accent-2);
      font-weight: 700;
      font-size: 14px;
    }
    .candidate-panel {
      display: grid;
      gap: 10px;
    }
    .candidate-group {
      display: grid;
      gap: 8px;
    }
    .candidate-group-title {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }
    .candidate-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .cell-btn {
      min-width: 72px;
      min-height: 52px;
      background: #fff;
      border: 1px solid var(--line);
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
    }
    .cell-btn.small {
      min-width: 92px;
    }
    .save-row {
      display: grid;
      gap: 10px;
    }
    .log-box {
      background: #0f172a;
      color: #dbeafe;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre-wrap;
      min-height: 120px;
      font-size: 12px;
    }
    @media (min-width: 768px) {
      .control-grid { grid-template-columns: 1.2fr 1fr; }
      .save-row { grid-template-columns: 1fr auto auto; align-items: center; }
      .bar-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1 class="section-title">GoRockCamp DB投入支援ツール β</h1>
      <div class="youtube-wrap" id="youtubeWrap">
        <div class="youtube-empty">YouTube URL を読み込むと、ここに埋め込み表示します。</div>
      </div>
    </section>

    <section class="card control-grid">
      <div>
        <div class="label">先頭ID</div>
        <div class="id-row">
          <input id="baseIdInput" class="input" inputmode="numeric" placeholder="例: 201061" value="201061">
          <button id="loadButton" type="button" class="primary-btn">読み込み</button>
        </div>
      </div>
      <div>
        <div class="label">接続状態</div>
        <div id="connectionStatus" class="status-box">未接続</div>
      </div>
    </section>

    <section class="card">
      <div class="info-grid">
        <div class="info-box"><div class="label">Data</div><div id="dataValue" class="value">-</div></div>
        <div class="info-box"><div class="label">Artist</div><div id="artistValue" class="value">-</div></div>
        <div class="info-box"><div class="label">title</div><div id="titleValue" class="value">-</div></div>
        <div class="info-box"><div class="label">Rank / ERA</div><div id="rankEraValue" class="value">-</div></div>
      </div>
      <div id="dataWarning" class="danger-box" style="margin-top:10px;">Data が TRUE です。既存データ上書きに注意してください。</div>
    </section>

    <section class="card">
      <div class="tabs" id="partTabs"></div>
    </section>

    <section class="card">
      <div class="part-head">
        <div>
          <div id="partTitle" class="section-title" style="margin-bottom:2px;">Part: intro</div>
          <div id="partMeta" class="part-meta">original_key: - / Quiz_key: -</div>
        </div>
        <div id="selectedCell" class="selected-cell">選択中: intro / 1小節 / 前半</div>
      </div>
      <div id="barGrid" class="bar-grid"></div>
    </section>

    <section class="card candidate-panel">
      <div class="section-title">コード候補</div>
      <div class="candidate-group">
        <div class="candidate-group-title">よく使う候補</div>
        <div id="presetButtons" class="candidate-buttons"></div>
      </div>
      <div class="candidate-group">
        <div class="candidate-group-title">編集補助</div>
        <div class="candidate-buttons">
          <button type="button" class="cell-btn small" data-action="clear-half">選択セルを消去</button>
          <button type="button" class="cell-btn small" data-action="clear-bar">小節を消去</button>
          <button type="button" class="cell-btn small" data-action="copy-first-to-second">前半→後半</button>
          <button type="button" class="cell-btn small" data-action="copy-second-to-first">後半→前半</button>
        </div>
      </div>
    </section>

    <section class="card save-row">
      <div class="part-meta">保存時に <strong>前半 + 後半</strong> は自動で <strong>A│B</strong> に合成されます。ユーザーは │ を直接入力しません。</div>
      <button id="reloadButton" type="button" class="ghost-btn">再読込</button>
      <button id="saveButton" type="button" class="primary-btn">確定保存</button>
    </section>

    <section class="card">
      <div class="section-title">ログ</div>
      <div id="logBox" class="log-box">起動しました。読み込みボタンで開始できます。</div>
    </section>
  </main>

  <script>
    const PART_ORDER = ['intro', 'A', 'B', 'サビ'];
    const PRESET_CHORDS = [
      'C', 'Cm', 'C7', 'Cmaj7', 'Cm7', 'Cadd9', 'Csus4', 'C/G',
      'D', 'Dm', 'D7', 'Dm7', 'D/F#', 'E', 'Em', 'E7',
      'F', 'Fm', 'Fmaj7', 'G', 'G7', 'G/B', 'A', 'Am',
      'A7', 'A/C#', 'Bb', 'Bdim'
    ];

    const state = {
      loading: false,
      saving: false,
      baseId: '',
      activePart: 'intro',
      selectedBar: 1,
      selectedHalf: 'firstHalf',
      song: createEmptySong_()
    };

    function createEmptySong_() {
      return {
        ok: false,
        connection: { connected: false },
        metadata: {
          data: '', artist: '', title: '', rank: '', era: '', youtubeEmbedUrl: '', originalKey: '', quizKey: ''
        },
        parts: PART_ORDER.map((part) => createEmptyPart_(part)),
        logs: []
      };
    }

    function createEmptyPart_(part) {
      return {
        part,
        partLabel: part,
        originalKey: '',
        quizKey: '',
        bars: Array.from({ length: 8 }, (_, index) => ({
          bar: index + 1,
          combined: '',
          firstHalf: '',
          secondHalf: '',
          aiSuggestion: [],
          changeChord: '',
          degree: '',
          functionText: '',
          nonDiatonic: ''
        }))
      };
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderTabs_();
      renderPresetButtons_();
      bindEvents_();
      render_();
      log_('DOM ready: 読み込みボタンを押せます。');
    });

    function bindEvents_() {
      document.getElementById('loadButton').addEventListener('click', handleLoad_);
      document.getElementById('reloadButton').addEventListener('click', () => {
        if (!state.baseId) {
          log_('再読込前に先頭IDを読み込んでください。');
          return;
        }
        handleLoad_();
      });
      document.getElementById('saveButton').addEventListener('click', handleSave_);
      document.getElementById('baseIdInput').addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          handleLoad_();
        }
      });
      document.querySelectorAll('[data-action]').forEach((button) => {
        button.addEventListener('click', () => handleEditAction_(button.dataset.action));
      });
    }

    function handleLoad_() {
      if (state.loading || state.saving) return;
      const baseId = document.getElementById('baseIdInput').value.trim();
      state.baseId = baseId;
      setBusy_(true, false);
      log_(`loadSong(${baseId}) を呼び出します。`);

      runServer_('loadSong', baseId)
        .then((response) => {
          applySongResponse_(response, 'load');
        })
        .catch((error) => {
          handleClientError_(error, 'load');
        })
        .finally(() => {
          setBusy_(false, false);
        });
    }

    function handleSave_() {
      if (state.loading || state.saving) return;
      if (!state.baseId) {
        log_('保存前に先頭IDを読み込んでください。');
        return;
      }

      let payload;
      try {
        payload = buildSavePayload_();
      } catch (error) {
        handleClientError_(error, 'validate');
        return;
      }

      setBusy_(false, true);
      log_('saveSong(payload) を呼び出します。');
      runServer_('saveSong', payload)
        .then((response) => {
          applySongResponse_(response, 'save');
        })
        .catch((error) => {
          handleClientError_(error, 'save');
        })
        .finally(() => {
          setBusy_(false, false);
        });
    }

    function runServer_(functionName, payload) {
      return new Promise((resolve, reject) => {
        if (!window.google || !google.script || !google.script.run) {
          reject(new Error('google.script.run が見つかりません。standalone Apps Script の Web アプリとして開いてください。'));
          return;
        }

        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler((error) => {
            reject(error instanceof Error ? error : new Error(error && error.message ? error.message : String(error)));
          })[functionName](payload);
      });
    }

    function applySongResponse_(response, phase) {
      if (!response || !response.ok) {
        const message = response && response.error ? response.error : `${phase} failed`;
        throw new Error(message);
      }
      state.song = normalizeSongResponse_(response);
      if (!PART_ORDER.includes(state.activePart)) {
        state.activePart = 'intro';
      }
      render_();
      log_(`[${phase}] ${response.message || 'OK'}`);
      (response.logs || []).forEach((line) => log_(line));
      if (response.skipped && response.skipped.length) {
        response.skipped.forEach((line) => log_('SKIP: ' + line));
      }
    }

    function handleClientError_(error, phase) {
      const message = error && error.message ? error.message : String(error);
      document.getElementById('connectionStatus').textContent = `${phase} error: ${message}`;
      document.getElementById('connectionStatus').className = 'status-box';
      log_(`ERROR [${phase}] ${message}`);
    }

    function normalizeSongResponse_(response) {
      const parts = PART_ORDER.map((part) => {
        const serverPart = (response.parts || []).find((item) => item.part === part) || createEmptyPart_(part);
        return {
          ...serverPart,
          bars: Array.from({ length: 8 }, (_, index) => {
            const serverBar = (serverPart.bars || [])[index] || {};
            return {
              bar: index + 1,
              combined: serverBar.combined || '',
              firstHalf: serverBar.firstHalf || '',
              secondHalf: serverBar.secondHalf || '',
              aiSuggestion: Array.isArray(serverBar.aiSuggestion) ? serverBar.aiSuggestion : [],
              changeChord: serverBar.changeChord || '',
              degree: serverBar.degree || '',
              functionText: serverBar.functionText || '',
              nonDiatonic: serverBar.nonDiatonic || ''
            };
          })
        };
      });
      return { ...response, parts };
    }

    function buildSavePayload_() {
      const baseId = document.getElementById('baseIdInput').value.trim();
      if (!/^\d+$/.test(baseId)) {
        throw new Error('先頭IDは数値で入力してください。');
      }
      return {
        baseId,
        parts: state.song.parts.map((part) => ({
          part: part.part,
          bars: part.bars.map((bar) => {
            validateBarClient_(bar, part.part, bar.bar);
            return {
              firstHalf: sanitizeChord_(bar.firstHalf),
              secondHalf: sanitizeChord_(bar.secondHalf)
            };
          })
        }))
      };
    }

    function validateBarClient_(bar, part, barNumber) {
      const first = sanitizeChord_(bar.firstHalf);
      const second = sanitizeChord_(bar.secondHalf);
      if (!first && second) {
        throw new Error(`${part} ${barNumber}小節 は後半のみ入力できません。`);
      }
      [first, second].forEach((value) => {
        if (!value) return;
        if (value.includes('│')) {
          throw new Error(`${part} ${barNumber}小節 は │ を直接入力できません。`);
        }
        const slashCount = (value.match(/\//g) || []).length;
        if (slashCount > 1) {
          throw new Error(`${part} ${barNumber}小節 に不正な / 連続表記があります: ${value}`);
        }
        const [main, bass = ''] = value.split('/');
        if (!/^([A-G](?:#|b|♭)?)(?:[0-9A-Za-z+()#♭b\-susdimaugmajMadd]*)$/.test(main)) {
          throw new Error(`${part} ${barNumber}小節 のコード形式が不正です: ${value}`);
        }
        if (slashCount === 1 && !/^[A-G](?:#|b|♭)?$/.test(bass)) {
          throw new Error(`${part} ${barNumber}小節 のオンコード表記が不正です: ${value}`);
        }
      });
    }

    function handleEditAction_(action) {
      const bar = getSelectedBar_();
      if (!bar) return;
      if (action === 'clear-half') {
        bar[state.selectedHalf] = '';
      } else if (action === 'clear-bar') {
        bar.firstHalf = '';
        bar.secondHalf = '';
      } else if (action === 'copy-first-to-second') {
        bar.secondHalf = bar.firstHalf;
      } else if (action === 'copy-second-to-first') {
        bar.firstHalf = bar.secondHalf;
      }
      render_();
    }

    function render_() {
      renderHeader_();
      renderTabs_();
      renderBars_();
      renderYoutube_();
    }

    function renderHeader_() {
      const connected = !!(state.song.connection && state.song.connection.connected);
      const status = connected
        ? `接続OK / ${state.song.connection.sheetName} / ${state.song.connection.spreadsheetId}`
        : '未接続';
      const box = document.getElementById('connectionStatus');
      box.textContent = status;
      box.className = 'status-box';

      const meta = state.song.metadata || {};
      document.getElementById('dataValue').textContent = meta.data || '-';
      document.getElementById('artistValue').textContent = meta.artist || '-';
      document.getElementById('titleValue').textContent = meta.title || '-';
      document.getElementById('rankEraValue').textContent = [meta.rank || '-', meta.era || '-'].join(' / ');
      document.getElementById('dataWarning').classList.toggle('show', String(meta.data || '').toUpperCase() === 'TRUE');
    }

    function renderYoutube_() {
      const wrap = document.getElementById('youtubeWrap');
      const embedUrl = state.song.metadata && state.song.metadata.youtubeEmbedUrl;
      wrap.innerHTML = embedUrl
        ? `<iframe src="${escapeHtml_(embedUrl)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`
        : '<div class="youtube-empty">YouTube URL が空欄です。必要なら DB 側の youtube 列を確認してください。</div>';
    }

    function renderTabs_() {
      const tabs = document.getElementById('partTabs');
      tabs.innerHTML = '';
      PART_ORDER.forEach((part) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'tab-btn' + (state.activePart === part ? ' active' : '');
        button.textContent = part;
        button.addEventListener('click', () => {
          state.activePart = part;
          render_();
        });
        tabs.appendChild(button);
      });
    }

    function renderBars_() {
      const part = getActivePart_();
      document.getElementById('partTitle').textContent = `Part: ${part.partLabel || part.part}`;
      document.getElementById('partMeta').textContent = `original_key: ${part.originalKey || '-'} / Quiz_key: ${part.quizKey || '-'}`;
      document.getElementById('selectedCell').textContent = `選択中: ${part.part} / ${state.selectedBar}小節 / ${state.selectedHalf === 'firstHalf' ? '前半' : '後半'}`;

      const grid = document.getElementById('barGrid');
      grid.innerHTML = '';

      part.bars.forEach((bar) => {
        const card = document.createElement('div');
        card.className = 'bar-card';
        const theoryHtml = [
          bar.changeChord ? `change: ${escapeHtml_(bar.changeChord)}` : '',
          bar.degree ? `degree: ${escapeHtml_(bar.degree)}` : '',
          bar.functionText ? `Function: ${escapeHtml_(bar.functionText)}` : '',
          bar.nonDiatonic ? `non_diatonic: ${escapeHtml_(bar.nonDiatonic)}` : ''
        ].filter(Boolean).join('<br>');

        card.innerHTML = `
          <div class="bar-head">
            <div class="bar-number">${bar.bar} 小節</div>
            <div class="bar-theory">${theoryHtml || '理論列は保存後に再計算'}</div>
          </div>
          <div class="half-grid">
            ${buildHalfBlockHtml_(part.part, bar.bar, 'firstHalf', '前半', bar.firstHalf)}
            ${buildHalfBlockHtml_(part.part, bar.bar, 'secondHalf', '後半', bar.secondHalf)}
          </div>
          <div class="candidate-row" data-ai-row="${bar.bar}"></div>
        `;

        card.querySelectorAll('.half-block').forEach((block) => {
          block.addEventListener('click', () => selectCell_(part.part, Number(block.dataset.bar), block.dataset.half));
        });
        card.querySelectorAll('.half-input').forEach((input) => {
          input.addEventListener('focus', () => selectCell_(part.part, Number(input.dataset.bar), input.dataset.half));
          input.addEventListener('input', (event) => {
            updateBarValue_(part.part, Number(input.dataset.bar), input.dataset.half, event.target.value);
          });
        });

        const aiRow = card.querySelector(`[data-ai-row="${bar.bar}"]`);
        const aiValues = [];
        if (bar.firstHalf) aiValues.push({ label: `AI 前半: ${bar.firstHalf}`, value: bar.firstHalf, half: 'firstHalf', current: true });
        if (bar.secondHalf) aiValues.push({ label: `AI 後半: ${bar.secondHalf}`, value: bar.secondHalf, half: 'secondHalf', current: true });
        (bar.aiSuggestion || []).forEach((value, index) => {
          aiValues.push({ label: `AI提案 ${index + 1}: ${value}`, value, half: index === 0 ? 'firstHalf' : 'secondHalf' });
        });
        if (!aiValues.length) {
          const empty = document.createElement('button');
          empty.type = 'button';
          empty.className = 'candidate-btn';
          empty.textContent = 'AI提案なし（小節を選択）';
          empty.addEventListener('click', () => selectCell_(part.part, bar.bar, 'firstHalf'));
          aiRow.appendChild(empty);
        } else {
          aiValues.forEach((item) => {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'candidate-btn' + (item.current ? ' current' : '');
            button.textContent = item.label;
            button.addEventListener('click', () => {
              selectCell_(part.part, bar.bar, item.half);
              applyChordToSelected_(item.value);
            });
            aiRow.appendChild(button);
          });
        }

        grid.appendChild(card);
      });
    }

    function buildHalfBlockHtml_(part, bar, half, title, value) {
      const active = state.activePart === part && state.selectedBar === bar && state.selectedHalf === half;
      return `
        <div class="half-block${active ? ' active' : ''}" data-part="${part}" data-bar="${bar}" data-half="${half}">
          <div class="half-title">${title}</div>
          <input
            type="text"
            class="half-input"
            inputmode="text"
            placeholder="コードを入力"
            data-part="${part}"
            data-bar="${bar}"
            data-half="${half}"
            value="${escapeAttr_(value || '')}"
          >
        </div>
      `;
    }

    function renderPresetButtons_() {
      const wrap = document.getElementById('presetButtons');
      wrap.innerHTML = '';
      PRESET_CHORDS.forEach((chord) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'cell-btn';
        button.textContent = chord;
        button.addEventListener('click', () => applyChordToSelected_(chord));
        wrap.appendChild(button);
      });
    }

    function selectCell_(part, bar, half) {
      state.activePart = part;
      state.selectedBar = bar;
      state.selectedHalf = half;
      render_();
    }

    function updateBarValue_(part, barNumber, half, value) {
      const bar = getBar_(part, barNumber);
      if (!bar) return;
      bar[half] = sanitizeChord_(value);
      renderHeaderSelectedOnly_();
    }

    function applyChordToSelected_(value) {
      const bar = getSelectedBar_();
      if (!bar) return;
      bar[state.selectedHalf] = sanitizeChord_(value);
      render_();
    }

    function renderHeaderSelectedOnly_() {
      const part = getActivePart_();
      document.getElementById('selectedCell').textContent = `選択中: ${part.part} / ${state.selectedBar}小節 / ${state.selectedHalf === 'firstHalf' ? '前半' : '後半'}`;
    }

    function getActivePart_() {
      return state.song.parts.find((part) => part.part === state.activePart) || state.song.parts[0];
    }

    function getBar_(partName, barNumber) {
      const part = state.song.parts.find((item) => item.part === partName);
      return part ? part.bars[barNumber - 1] : null;
    }

    function getSelectedBar_() {
      return getBar_(state.activePart, state.selectedBar);
    }

    function setBusy_(loading, saving) {
      state.loading = !!loading;
      state.saving = !!saving;
      document.getElementById('loadButton').disabled = state.loading || state.saving;
      document.getElementById('reloadButton').disabled = state.loading || state.saving;
      document.getElementById('saveButton').disabled = state.loading || state.saving;
    }

    function sanitizeChord_(value) {
      return String(value == null ? '' : value)
        .replace(/\s+/g, ' ')
        .trim()
        .replace(/｜/g, '│');
    }

    function log_(message) {
      const box = document.getElementById('logBox');
      const now = new Date();
      const stamp = now.toLocaleTimeString('ja-JP', { hour12: false });
      box.textContent = `[${stamp}] ${message}\n` + box.textContent;
    }

    function escapeHtml_(value) {
      return String(value == null ? '' : value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeAttr_(value) {
      return escapeHtml_(value).replaceAll('`', '&#96;');
    }
  </script>
</body>
</html>
